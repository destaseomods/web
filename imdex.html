    <script>
        (function() {
            // ============================================================
            // SITEMAP & REDIRECT
            // ============================================================
            if (window.location.search === '?sitemap') {
                window.location.href = '/sitemap.xml';
                return;
            }

            // Redirect URL lama ke detail.html
            const params = new URLSearchParams(window.location.search);
            if (params.get('page') === 'detail') {
                const post = params.get('post');
                if (post) {
                    window.location.href = '/detail.html?post=' + encodeURIComponent(post);
                    return;
                }
            }
            if (window.location.hash.startsWith('#detail/')) {
                const post = window.location.hash.split('/')[1];
                if (post) {
                    window.location.href = '/detail.html?post=' + encodeURIComponent(post);
                    return;
                }
            }

            // ============================================================
            // FALLBACK MARKED PARSER (jika marked gagal)
            // ============================================================
            function safeMarkedParse(content) {
                try {
                    if (typeof marked !== 'undefined' && marked && typeof marked.parse === 'function') {
                        return marked.parse(content);
                    } else if (typeof marked !== 'undefined' && typeof marked === 'function') {
                        return marked(content);
                    }
                } catch (e) {
                    console.warn('Marked parse error, pakai fallback:', e);
                }
                // Fallback sederhana: ubah newline ke <br>, dan bungkus # menjadi heading
                let html = content || '';
                html = html.replace(/\n/g, '<br>');
                html = html.replace(/^# (.*$)/gm, '<h1>$1</h1>');
                html = html.replace(/^## (.*$)/gm, '<h2>$1</h2>');
                html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>');
                return html;
            }

            // ============================================================
            // KONFIGURASI
            // ============================================================
            const GITHUB_REPO = "destaseomods/web";
            const LOGO_URL = "https://avatars.githubusercontent.com/u/189899710?v=4";
            const AVATAR_URL = "https://avatars.githubusercontent.com/u/189899710?v=4";
            const QRIS_URL = "https://i.ibb.co.com/JR9twX72/20250220-123026-destaseo-wapkizs-com.png";
            const PROFILE = {
                avatar: AVATAR_URL,
                name: "Destaseo Mods",
                bio: "Premium modder & content creator.",
                links: [
                    { label: "Facebook", url: "https://fb.com/destaseo.id", icon: "fab fa-facebook" },
                    { label: "Telegram", url: "https://t.me/+wlXhR-M2BbliMDU1", icon: "fab fa-telegram-plane" }
                ]
            };
            const CACHE_KEY_LIST = 'destaseo_post_list_v4';
            const CACHE_KEY_CONTENT_PREFIX = 'destaseo_post_content_';

            // ============================================================
            // PARTIKEL
            // ============================================================
            const canvas = document.getElementById('particles');
            const ctx = canvas.getContext('2d');
            let particles = [];
            const maxParticles = 35;
            let animationFrameId = null;
            let frameSkip = 0;

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            class Particle {
                constructor() { this.reset(); }
                reset() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.vx = (Math.random() - 0.5) * 0.4;
                    this.vy = (Math.random() - 0.5) * 0.4;
                    this.radius = Math.random() * 2 + 1;
                    this.opacity = Math.random() * 0.4 + 0.1;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                    if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(168,127,255,${this.opacity})`;
                    ctx.fill();
                }
            }
            for (let i = 0; i < maxParticles; i++) particles.push(new Particle());

            function animateParticles() {
                frameSkip++;
                if (frameSkip % 2 === 0) {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    particles.forEach(p => { p.update(); p.draw(); });
                }
                animationFrameId = requestAnimationFrame(animateParticles);
            }

            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    if (animationFrameId) { cancelAnimationFrame(animationFrameId); animationFrameId = null; }
                } else {
                    if (!animationFrameId) { animateParticles(); }
                }
            });
            animateParticles();

            // ============================================================
            // DOM
            // ============================================================
            const postContainer = document.getElementById('post-container');
            const carouselTrack = document.getElementById('carousel-track');
            const loadMoreContainer = document.getElementById('load-more-container');
            const homeSection = document.getElementById('home-section');
            const profileSection = document.getElementById('profile-section');
            const searchBox = document.getElementById('search-box');
            const searchInput = document.getElementById('search-input');
            const categoryBar = document.getElementById('category-bar');
            const sortBar = document.getElementById('sort-bar');
            const sortSelect = document.getElementById('sort-select');
            const filterIndicator = document.getElementById('filter-indicator');
            const telegramBtn = document.getElementById('telegram-btn');
            const telegramDropdown = document.getElementById('telegram-dropdown');
            const qrisOverlay = document.getElementById('qris-overlay');
            const qrisCloseBtn = document.getElementById('qris-close-btn');
            const qrisDanaBtn = document.getElementById('qris-dana-btn');
            const qrisDownloadBtn = document.getElementById('qris-download-btn');
            const dailyCountEl = document.getElementById('daily-count');
            const logoArea = document.getElementById('logo-area');
            const loadingSpinnerContainer = document.getElementById('loading-spinner-container');
            const navItems = document.querySelectorAll('.nav-item');

            let postsData = [], fetchedPosts = [];
            let activeKatFilter = null;
            let currentDisplayCount = 0;
            const ITEMS_PER_PAGE = 10;
            let carouselInterval = null;
            let currentSlide = 0;
            let totalPopularSlides = 0;
            let topPopularPosts = [];

            if (LOGO_URL) document.querySelector('.logo-img').src = LOGO_URL;
            if (AVATAR_URL) {
                const a = document.getElementById('profile-avatar');
                a.style.backgroundImage = `url('${AVATAR_URL}')`;
                a.textContent = '';
            }

            // ============================================================
            // NAVIGASI
            // ============================================================
            function getPageFromQuery() {
                const params = new URLSearchParams(window.location.search);
                const page = params.get('page') || 'home';
                const q = params.get('q') || null;
                return { page, q };
            }

            function showHome() {
                showSection(homeSection);
                searchBox.classList.add('hidden');
                categoryBar.classList.remove('hidden');
                sortBar.classList.remove('hidden');
                document.getElementById('popular-section').classList.remove('hidden');
                filterIndicator.classList.add('hidden');
                setActiveNav('home');

                if (fetchedPosts.length) {
                    requestAnimationFrame(() => {
                        renderCategoryBar();
                        resetAndApplyFilters();
                        renderPopularSection();
                        startCarousel();
                    });
                }
            }

            function showSearch(q) {
                showSection(homeSection);
                searchBox.classList.remove('hidden');
                categoryBar.classList.remove('hidden');
                sortBar.classList.add('hidden');
                document.getElementById('popular-section').classList.add('hidden');
                setActiveNav('search');
                stopCarousel();
                if (q) searchInput.value = q;
                else searchInput.value = '';
                setTimeout(() => searchInput.focus(), 50);
                if (fetchedPosts.length) {
                    requestAnimationFrame(() => {
                        renderCategoryBar();
                        resetAndApplyFilters();
                    });
                }
            }

            function showProfile() {
                showSection(profileSection);
                searchBox.classList.add('hidden');
                categoryBar.classList.add('hidden');
                sortBar.classList.add('hidden');
                document.getElementById('popular-section').classList.add('hidden');
                filterIndicator.classList.add('hidden');
                setActiveNav('profile');
                stopCarousel();
                renderProfile();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            function showSection(s) {
                [homeSection, profileSection].forEach(el => {
                    if (el !== s) {
                        el.classList.add('hidden');
                        el.style.display = '';
                    }
                });
                s.classList.remove('hidden');
                s.style.display = 'block';
            }

            function setActiveNav(p) {
                navItems.forEach(i => i.classList.toggle('active', i.dataset.page === p));
            }

            // ============================================================
            // RENDER HOME
            // ============================================================
            function renderCategoryBar() {
                const kats = getAllKategori();
                let html = '<span class="category-chip' + (!activeKatFilter ? ' active' : '') +
                    '" data-kat="" role="tab" aria-selected="' + (!activeKatFilter ? 'true' : 'false') + '"><i class="fas fa-globe"></i> Semua</span>';
                kats.forEach(kat => html +=
                    `<span class="category-chip${activeKatFilter === kat ? ' active' : ''}" data-kat="${kat}" role="tab" aria-selected="${activeKatFilter === kat ? 'true' : 'false'}"><i class="fas fa-tag"></i> ${kat}</span>`
                    );
                if (activeKatFilter) html +=
                    '<button class="reset-filter" id="reset-filter"><i class="fas fa-times"></i> Hapus filter</button>';
                categoryBar.innerHTML = html;
                categoryBar.querySelectorAll('.category-chip').forEach(chip => chip.addEventListener('click', () => {
                    activeKatFilter = chip.dataset.kat || null;
                    resetAndApplyFilters();
                    renderCategoryBar();
                }));
                const resetBtn = document.getElementById('reset-filter');
                if (resetBtn) resetBtn.addEventListener('click', () => { activeKatFilter = null;
                    resetAndApplyFilters();
                    renderCategoryBar(); });
            }

            function getAllKategori() {
                const k = new Set();
                fetchedPosts.forEach(p => {
                    const kat = p.metadata.kategori || '';
                    if (kat) k.add(kat);
                });
                return Array.from(k).sort();
            }

            function getFilteredPosts() {
                const q = searchInput.value.trim().toLowerCase();
                let f = fetchedPosts;
                if (activeKatFilter) f = f.filter(p => (p.metadata.kategori || '') === activeKatFilter);
                if (q) f = f.filter(p => {
                    const t = (p.metadata.judul || p.metadata.title || p.name).toLowerCase();
                    return t.includes(q);
                });
                return f;
            }

            function sortPosts(posts) {
                const sortBy = sortSelect.value;
                const sorted = [...posts];
                const getTime = (p) => {
                    const d = p.metadata.tanggal || p.metadata.date || p.lastModified;
                    if (!d) return 0;
                    const t = new Date(d);
                    return isNaN(t.getTime()) ? 0 : t.getTime();
                };
                switch (sortBy) {
                    case 'terbaru': sorted.sort((a, b) => getTime(b) - getTime(a)); break;
                    case 'terlama': sorted.sort((a, b) => getTime(a) - getTime(b)); break;
                    case 'az': sorted.sort((a, b) => {
                        const tA = (a.metadata.judul || a.metadata.title || a.name || '').toLowerCase();
                        const tB = (b.metadata.judul || b.metadata.title || b.name || '').toLowerCase();
                        return tA.localeCompare(tB);
                    }); break;
                    case 'za': sorted.sort((a, b) => {
                        const tA = (a.metadata.judul || a.metadata.title || a.name || '').toLowerCase();
                        const tB = (b.metadata.judul || b.metadata.title || b.name || '').toLowerCase();
                        return tB.localeCompare(tA);
                    }); break;
                }
                return sorted;
            }

            function resetAndApplyFilters() {
                currentDisplayCount = 0;
                applyFilters();
            }

            function applyFilters() {
                let filtered = getFilteredPosts();
                filtered = sortPosts(filtered);
                if (activeKatFilter) {
                    filterIndicator.classList.remove('hidden');
                    filterIndicator.innerHTML =
                        `<i class="fas fa-filter"></i> Kategori: <strong>${activeKatFilter}</strong> (${filtered.length} hasil)`;
                } else filterIndicator.classList.add('hidden');
                currentDisplayCount = Math.min(ITEMS_PER_PAGE, filtered.length);
                displayPosts(filtered.slice(0, currentDisplayCount));
                renderLoadMoreButton(filtered.length);
            }

            function displayPosts(posts) {
                postContainer.innerHTML = posts.length ? posts.map((p, i) => cardHTML(p, i)).join('') :
                    '<div class="empty-text">🔍 Tidak ada postingan yang cocok.</div>';
                attachCardEvents();
            }

            function renderLoadMoreButton(t) {
                if (currentDisplayCount < t) {
                    loadMoreContainer.innerHTML =
                        `<button class="load-more-btn" id="load-more-btn"><i class="fas fa-chevron-down"></i> Muat Lebih Banyak (${t - currentDisplayCount})</button>`;
                    document.getElementById('load-more-btn').addEventListener('click', loadMorePosts);
                } else {
                    loadMoreContainer.innerHTML = '';
                }
            }

            function loadMorePosts() {
                let f = getFilteredPosts();
                f = sortPosts(f);
                const n = Math.min(currentDisplayCount + ITEMS_PER_PAGE, f.length);
                const newPosts = f.slice(currentDisplayCount, n);
                currentDisplayCount = n;
                newPosts.forEach((p, i) => {
                    const card = cardHTML(p, i);
                    postContainer.insertAdjacentHTML('beforeend', card);
                });
                attachCardEvents();
                renderLoadMoreButton(f.length);
            }

            function cardHTML(post, index) {
                const t = post.metadata.judul || post.metadata.title || post.name.replace(/[-_]/g, ' ');
                const img = fixImageUrl(post.metadata.gambar || post.metadata.image || '');
                const kategori = post.metadata.kategori || '';
                const ver = post.metadata.versi || post.metadata.version || '';
                const excerpt = getExcerpt(post.content);
                const delay = index * 0.03 + 's';

                let badges = [];
                if (post.metadata.badges) {
                    if (Array.isArray(post.metadata.badges)) { badges = post.metadata.badges; } else { badges = post
                            .metadata.badges.split(',').map(b => b.trim()).filter(b => b.length > 0); }
                }

                function getBadgeHTML(badgeText) {
                    const text = badgeText.trim();
                    const lower = text.toLowerCase();
                    let className = 'badge-custom';
                    let icon = 'fa-tag';
                    if (lower === 'premium') { className = 'badge-premium'; icon = 'fa-crown'; } else if (lower === 'vip') {
                        className = 'badge-vip'; icon = 'fa-star'; } else if (lower === 'no ads' || lower === 'noads' ||
                        lower === 'tanpa iklan' || lower === 'no iklan') { className = 'badge-noads';
                        icon = 'fa-ban'; } else if (lower === 'unlocked' || lower === 'unlock') { className =
                            'badge-unlocked'; icon = 'fa-unlock'; }
                    return `<span class="${className}"><i class="fas ${icon}"></i> ${text}</span>`;
                }

                const badgesHtml = badges.map(getBadgeHTML).join('');

                const imgTag = img ?
                    `<img src="${img}" alt="${t}" loading="lazy" onerror="this.parentElement.classList.add('error')">` :
                    '';
                const versionBadge = ver ? `<span class="version-badge-img"><i class="fas fa-code-branch"></i> v${ver}</span>` :
                    '';

                return `<div class="post-card" data-name="${post.name}" style="animation-delay:${delay};">
                    <div class="card-img${img ? '' : ' error'}">${imgTag}<span class="placeholder-icon"><i class="fas fa-box-open"></i></span>${versionBadge}</div>
                    <div class="card-body">
                        <div class="card-title">${t}</div>
                        <div class="card-meta">
                            ${kategori ? `<span class="badge" data-kat="${kategori}" role="button"><i class="fas fa-folder"></i> ${kategori}</span>` : ''}
                            ${badgesHtml}
                        </div>
                        ${excerpt ? `<p class="card-excerpt">${excerpt}</p>` : ''}
                    </div>
                </div>`;
            }

            function attachCardEvents() {
                document.querySelectorAll('.post-card').forEach(c => c.addEventListener('click', (e) => {
                    if (e.target.closest('.badge') || e.target.closest('.badge-premium') ||
                        e.target.closest('.badge-vip') || e.target.closest('.badge-noads') ||
                        e.target.closest('.badge-unlocked') || e.target.closest('.badge-custom')) return;
                    const name = c.dataset.name;
                    if (name) {
                        window.location.href = '/detail.html?post=' + encodeURIComponent(name);
                    }
                }));
                document.querySelectorAll('.badge').forEach(b => b.addEventListener('click', (e) => {
                    e.stopPropagation();
                    activeKatFilter = b.dataset.kat;
                    searchInput.value = '';
                    resetAndApplyFilters();
                    renderCategoryBar();
                }));
            }

            function stopCarousel() {
                if (carouselInterval) { clearInterval(carouselInterval); carouselInterval = null; }
            }

            function startCarousel() {
                stopCarousel();
                if (totalPopularSlides === 0) return;
                updateCarousel(0);
                carouselInterval = setInterval(() => {
                    currentSlide = (currentSlide + 1) % totalPopularSlides;
                    updateCarousel(currentSlide);
                }, 4000);
            }

            function updateCarousel(i) {
                const slides = document.querySelectorAll('.carousel-slide');
                slides.forEach((s, idx) => s.classList.toggle('active', idx === i));
                document.querySelectorAll('.carousel-counter').forEach((c, idx) => {
                    c.textContent = `${i+1}/${totalPopularSlides}`;
                });
            }

            function renderPopularSection() {
                if (!topPopularPosts.length) {
                    carouselTrack.innerHTML = '';
                    totalPopularSlides = 0;
                    return;
                }
                const pop = topPopularPosts.slice(0, 4);
                totalPopularSlides = pop.length;
                carouselTrack.innerHTML = pop.map((p, i) => {
                    const img = fixImageUrl(p.metadata.gambar || p.metadata.image || '');
                    const title = p.metadata.judul || p.metadata.title || p.name.replace(/[-_]/g, ' ');
                    return `<div class="carousel-slide${i === 0 ? ' active' : ''}" data-name="${p.name}">${img ? `<img src="${img}" alt="${title}" loading="lazy" onerror="this.style.display='none'">` : ''}<div class="slide-overlay"><div class="slide-title">${title}</div><span class="carousel-counter">${i+1}/${pop.length}</span></div></div>`;
                }).join('');
                document.querySelectorAll('.carousel-slide').forEach(s => s.addEventListener('click', () => {
                    const name = s.dataset.name;
                    if (name) {
                        window.location.href = '/detail.html?post=' + encodeURIComponent(name);

            async function sortPostsByView() {
                const viewPromises = fetchedPosts.map(p => getPostViewCount(p.name, false));
                const views = await Promise.all(viewPromises);
                const postsWithViews = fetchedPosts.map((p, i) => ({ ...p, viewCount: views[i] || 0 }));
                postsWithViews.sort((a, b) => (b.viewCount || 0) - (a.viewCount || 0));
                const hasViewData = postsWithViews.some(p => p.viewCount > 0);
                if (!hasViewData) {
                    let fallback = fetchedPosts.filter(p => p.metadata.populer && p.metadata.populer.toLowerCase() ===
                        'true');
                    if (fallback.length === 0) fallback = fetchedPosts.slice(0, 4);
                    topPopularPosts = fallback;
                } else {
                    topPopularPosts = postsWithViews;
                }
            }

            // ============================================================
            // CACHE
            // ============================================================
            function getCachedList() {
                const raw = localStorage.getItem(CACHE_KEY_LIST);
                if (!raw) return null;
                try { const data = JSON.parse(raw); return data.posts; } catch (e) { return null; }
            }

            function setCachedList(posts) {
                localStorage.setItem(CACHE_KEY_LIST, JSON.stringify({ posts }));
            }

            function getCachedContent(postName) {
                const key = CACHE_KEY_CONTENT_PREFIX + postName;
                const raw = localStorage.getItem(key);
                if (!raw) return null;
                try { const data = JSON.parse(raw); return data.content; } catch (e) { return null; }
            }

            function setCachedContent(postName, content) {
                const key = CACHE_KEY_CONTENT_PREFIX + postName;
                localStorage.setItem(key, JSON.stringify({ content }));
            }

            // ============================================================
            // FETCH
            // ============================================================
            async function fetchPostList(forceRefresh = false) {
                const cached = getCachedList();
                if (cached && cached.length && !forceRefresh) {
                    postsData = cached;
                    return true;
                }

                const fallbackPosts = [
                    { filename: "capcut-mod-premium.md", name: "capcut-mod-premium", download_url: "https://raw.githubusercontent.com/destaseomods/web/main/posts/capcut-mod-premium.md" },
                    { filename: "snapchat-mod-premium.md", name: "snapchat-mod-premium", download_url: "https://raw.githubusercontent.com/destaseomods/web/main/posts/snapchat-mod-premium.md" },
                    { filename: "instagram-mod-premium.md", name: "instagram-mod-premium", download_url: "https://raw.githubusercontent.com/destaseomods/web/main/posts/instagram-mod-premium.md" },
                    { filename: "whatsapp-mod-premium.md", name: "whatsapp-mod-premium", download_url: "https://raw.githubusercontent.com/destaseomods/web/main/posts/whatsapp-mod-premium.md" }
                ];

                const apiUrl = `https://api.github.com/repos/${GITHUB_REPO}/contents/posts`;

                for (let attempt = 1; attempt <= 3; attempt++) {
                    try {
                        const controller = new AbortController();
                        const timeout = setTimeout(() => controller.abort(), 5000);
                        const res = await fetch(apiUrl, {
                            signal: controller.signal,
                            headers: {
                                'Accept': 'application/vnd.github.v3+json',
                                'User-Agent': 'DestaseoMods/1.0'
                            }
                        });
                        clearTimeout(timeout);

                        if (!res.ok) {
                            if (res.status === 403) {
                                console.warn('⚠️ GitHub API rate limit, pakai cache/fallback.');
                                if (!cached || !cached.length) { postsData = fallbackPosts; setCachedList(postsData); }
                                return false;
                            }
                            throw new Error(`HTTP ${res.status}`);
                        }

                        const files = await res.json();
                        const mdFiles = files.filter(f => f.name.endsWith('.md'));
                        if (!mdFiles.length) throw new Error('Tidak ada file .md');

                        postsData = mdFiles.map(f => ({
                            filename: f.name,
                            name: f.name.replace('.md', ''),
                            download_url: f.download_url
                        }));

                        setCachedList(postsData);
                        return true;

                    } catch (err) {
                        console.warn(`❌ Percobaan ${attempt} gagal:`, err.message);
                        if (attempt === 3) {
                            if (!cached || !cached.length) { postsData = fallbackPosts; setCachedList(postsData); }
                            return false;
                        }
                        await new Promise(r => setTimeout(r, 1000 * attempt));
                    }
                }
                return false;
            }

            function parseFrontmatter(md) {
                const m = md.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
                if (!m) return { metadata: {}, content: md };
                const meta = {};
                m[1].split('\n').forEach(line => {
                    const i = line.indexOf(':');
                    if (i > 0) meta[line.slice(0, i).trim()] = line.slice(i + 1).trim().replace(/^["']|["']$/g, '');
                });
                return { metadata: meta, content: m[2] };
            }

            async function fetchPost(p, forceRefresh = false) {
                if (!forceRefresh) {
                    const cachedContent = getCachedContent(p.name);
                    if (cachedContent) {
                        const { metadata, content } = parseFrontmatter(cachedContent);
                        const html = safeMarkedParse(content);
                        return { ...p, metadata, content, html, lastModified: null, fromCache: true };
                    }
                }

                if (!p.download_url) {
                    return { ...p, metadata: {}, content: '', html: '<p>Konten tidak tersedia.</p>', lastModified: null };
                }

                try {
                    const r = await fetch(p.download_url);
                    if (!r.ok) throw new Error('fail');
                    const md = await r.text();
                    setCachedContent(p.name, md);
                    const { metadata, content } = parseFrontmatter(md);
                    const lastModified = r.headers.get('Last-Modified');
                    const html = safeMarkedParse(content);
                    return { ...p, metadata, content, lastModified, html, fromCache: false };
                } catch (err) {
                    const fallbackContent = getCachedContent(p.name);
                    if (fallbackContent) {
                        const { metadata, content } = parseFrontmatter(fallbackContent);
                        const html = safeMarkedParse(content);
                        return { ...p, metadata, content, html, lastModified: null, fromCache: true };
                    }
                    return { ...p, metadata: {}, content: '', html: '<p>Gagal memuat konten.</p>', lastModified: null };
                }
            }

            function fixImageUrl(url) {
                if (!url) return '';
                if (url.includes('github.com') && !url.includes('raw.githubusercontent.com')) {
                    url = url.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
                }
                return url;
            }

            function getExcerpt(c) {
                if (!c) return '';
                let t = c.replace(/[#*`>\[\]()!|]/g, '').replace(/\n/g, ' ').trim();
                if (t.length > 80) t = t.slice(0, 80) + '...';
                return t;
            }

            function formatDate(d) {
                if (!d) return '';
                const dt = new Date(d);
                if (isNaN(dt.getTime())) return '';
                const m = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
                return `${dt.getDate()} ${m[dt.getMonth()]} ${dt.getFullYear()}`;
            }

            // ============================================================
            // RENDER HOME (UTAMA)
            // ============================================================
            async function renderHome() {
                const hasCache = getCachedList() && getCachedList().length > 0;

                if (!hasCache) {
                    loadingSpinnerContainer.style.display = 'block';

                } else {

                    loadMoreContainer.style.display = 'block';
                    sortBar.style.display = 'flex';
                    filterIndicator.style.display = 'flex';
                    categoryBar.style.display = 'flex';
                }

                try {
                    const cachedData = getCachedList();
                    if (cachedData && cachedData.length) {
                        postsData = cachedData;
                        const cachedFetched = await Promise.all(postsData.map(p => fetchPost(p, false)));
                        fetchedPosts = cachedFetched;
                        await sortPostsByView();

                        renderPopularSection();
                        renderCategoryBar();

                        fetchBackgroundUpdates();

                    }

                    sortBar.style.display = 'none';
                    filterIndicator.style.display = 'none';
                    categoryBar.style.display = 'none';

                    const fromCache = await fetchPostList(false);
                    if (!postsData.length) {
                        postContainer.style.display = 'block';
                        postContainer.innerHTML =
                            '<div class="empty-text"><i class="far fa-folder-open"></i> Tidak ada postingan.</div>';
                        loadMoreContainer.style.display = 'block';
                        loadingSpinnerContainer.style.display = 'none';
                        return;
                    }

                    fetchedPosts = await Promise.all(postsData.map(p => fetchPost(p, false)));
                    await sortPostsByView();

                    loadingSpinnerContainer.style.display = 'none';
                    postContainer.style.display = 'grid';
                    loadMoreContainer.style.display = 'block';
                    sortBar.style.display = 'flex';
                    filterIndicator.style.display = 'flex';
                    categoryBar.style.display = 'flex';

                    renderPopularSection();
                    renderCategoryBar();
                    resetAndApplyFilters();
                    startCarousel();

                    if (!fromCache) { fetchBackgroundUpdates(); }

                    const { page, q } = getPageFromQuery();
                    if (page === 'search') { showSearch(q || ''); } else if (page === 'profile') { showProfile(); }

                } catch (err) {
                    loadingSpinnerContainer.style.display = 'none';
                    postContainer.style.display = 'block';
                    postContainer.innerHTML = `
                        <div class="error-text">
                            ⚠️ Gagal memuat data. Coba refresh halaman. <br>
                            <small>${err.message}</small>
                            <br><br>
                            <button onclick="location.reload()" style="background:var(--accent2);color:#04040e;border:none;padding:10px 24px;border-radius:30px;font-weight:700;cursor:pointer;">
                                <i class="fas fa-sync"></i> Coba Lagi
                            </button>

                    `;

                }
            }

            async function fetchBackgroundUpdates() {
                try {
                    const success = await fetchPostList(true);
                    if (success) {
                        const newFetched = await Promise.all(postsData.map(p => fetchPost(p, true)));
                        let hasChange = false;
                        if (newFetched.length !== fetchedPosts.length) { hasChange = true; } else {
                            for (let i = 0; i < newFetched.length; i++) {
                                if (newFetched[i].metadata.judul !== fetchedPosts[i]?.metadata.judul) { hasChange = true; break; }
                            }
                        }
                        if (hasChange) {
                            fetchedPosts = newFetched;
                            await sortPostsByView();
                            renderPopularSection();
                            renderCategoryBar();
                            resetAndApplyFilters();
                            startCarousel();
                        }
                    }
                } catch (e) { console.warn('Background update gagal:', e); }
            }

            // ============================================================
            // COUNTER VIEW
            // ============================================================
            async function getPostViewCount(postName, increment = true) {
                const storageKey = 'view_' + postName.replace(/[^a-zA-Z0-9]/g, '_');
                const today = new Date().toISOString().slice(0, 10);
                const key = 'destaseomods-' + postName.replace(/[^a-zA-Z0-9]/g, '-');

                let localData = null;
                try { const raw = localStorage.getItem(storageKey); if (raw) localData = JSON.parse(raw); } catch (_) {}

                if (!increment && localData) return localData.count;

                if (increment && (!localData || localData.date !== today)) {
                    try {
                        const res = await fetch(`https://countapi.mileshilliard.com/api/v1/hit/${key}`);
                        if (res.ok) {
                            const data = await res.json();
                            const count = data.value || 0;
                            localStorage.setItem(storageKey, JSON.stringify({ count, date: today }));
                            return count;
                        }
                    } catch (e) {}
                    const prev = localData ? localData.count : 0;
                    const count = prev + 1;
                    localStorage.setItem(storageKey, JSON.stringify({ count, date: today }));
                    return count;
                }

                if (!increment && !localData) {
                    try {
                        const res = await fetch(`https://countapi.mileshilliard.com/api/v1/get/${key}`);
                        if (res.ok) {
                            const data = await res.json();
                            const count = data.value || 0;
                            localStorage.setItem(storageKey, JSON.stringify({ count, date: today }));
                            return count;
                        }
                    } catch (e) {}
                    return 0;
                }
                return localData ? localData.count : 0;
            }

            // ============================================================
            // DAILY VISITOR
            // ============================================================
            async function getDailyVisitorCount() {
                const url = `https://abacus.jasoncameron.dev/hit/destaseomods.web.id/daily`;
                const storageKey = 'daily_visitor';
                const today = new Date().toISOString().slice(0, 10);
                let localData = null;
                try { const raw = localStorage.getItem(storageKey); if (raw) localData = JSON.parse(raw); } catch (_) {}
                if (localData && localData.date === today) return localData.count;
                try {
                    const controller = new AbortController();
                    const timeout = setTimeout(() => controller.abort(), 2000);
                    const res = await fetch(url, { method: 'GET', signal: controller.signal, headers: { 'Content-Type': 'application/json' } });
                    clearTimeout(timeout);
                    if (res.ok) {
                        const data = await res.json();
                        const count = data.value || data.count || data.views || data.hits || 1;
                        if (typeof count === 'number' && count > 0) {
                            localStorage.setItem(storageKey, JSON.stringify({ count, date: today }));
                            return count;
                        }
                    }
                } catch (e) {}
                const prevCount = (localData && typeof localData.count === 'number') ? localData.count : 0;
                const newCount = prevCount + 1;
                localStorage.setItem(storageKey, JSON.stringify({ count: newCount, date: today }));
                return newCount;
            }

            // ============================================================
