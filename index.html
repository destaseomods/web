    <style>
        /* ===== RESET & VARIABLES ===== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg: #04040e;
            --surface: rgba(15, 15, 30, 0.7);
            --surface2: rgba(25, 25, 45, 0.8);
            --border: rgba(255, 255, 255, 0.07);

            --container-max: 760px;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;

            }
            100% {
                background-position: 100% center;
            }

        }

        .carousel-slide .slide-overlay {

            height: 100%;

            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            color: #fff;

        }
        .card-title {
            font-weight: 800;
            font-size: clamp(0.75rem, 1.6vw, 0.9rem);
            line-height: 1.3;
            color: #fff;
        }
        .card-meta {
            font-size: clamp(0.55rem, 1vw, 0.7rem);
            color: var(--text2);
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .badge {
            background: rgba(168, 127, 255, 0.2);
            color: #cfc4ff;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 700;
            font-size: clamp(0.5rem, 0.9vw, 0.65rem);

        .hidden {

        /* ===== SPINNER & EMPTY/ERROR DI TENGAH ===== */
        #post-container .spinner,

        .empty-text {

        /* ===== DETAIL ===== */
        .detail-header,

            background: var(--surface);

            border: 1px solid var(--border);

    <script>
        (function() {
            'use strict';

            // ===== KONFIGURASI =====
            const GITHUB_REPO = "destaseomods/web";
            const AD_URL = "https://www.effectivecpmnetwork.com/fb7g7n19e?key=6d1b0c2ece436780ddfd67417e4cd713";
            const AD_INTERVAL = 1 * 60 * 60 * 1000;
            const AD_STORAGE_KEY = 'lastAdClickTimestamp';
            const LOGO_URL = "https://avatars.githubusercontent.com/u/189899710?v=4";
            const AVATAR_URL = "https://avatars.githubusercontent.com/u/189899710?v=4";
            const QRIS_URL = "https://i.ibb.co.com/JR9twX72/20250220-123026-destaseo-wapkizs-com.png";
            const PROFILE = {
                avatar: AVATAR_URL,
                name: "Destaseo Mods",
                bio: "Premium modder & content creator.",
                links: [
                    { label: "Facebook", url: "https://fb.com/destaseo.id", icon: "fab fa-facebook" },
                    { label: "Telegram", url: "https://t.me/+wlXhR-M2BbliMDU1", icon: "fab fa-telegram-plane" }
                ]
            };
            const VIEW_API_BASE = "https://abacus.jasoncameron.dev/hit/destaseomods.web.id/visits";
            const CACHE_KEY = 'destaseo_premium_cache_v68';
            const CACHE_TIME = 10 * 60 * 1000;
            const ITEMS_PER_PAGE = 10;

            // ===== DOM REFS =====
            const $ = id => document.getElementById(id);
            const qs = (sel, ctx = document) => ctx.querySelector(sel);
            const qsa = (sel, ctx = document) => [...ctx.querySelectorAll(sel)];

            const postContainer = $('post-container');
            const carouselTrack = $('carousel-track');
            const loadMoreContainer = $('load-more-container');
            const homeSection = $('home-section');
            const detailSection = $('detail-section');
            const profileSection = $('profile-section');
            const detailContent = $('detail-content');
            const detailBack = $('detail-back');
            const navItems = qsa('.nav-item');
            const searchBox = $('search-box');
            const searchInput = $('search-input');
            const categoryBar = $('category-bar');
            const sortBar = $('sort-bar');
            const sortSelect = $('sort-select');
            const filterIndicator = $('filter-indicator');
            const telegramBtn = $('telegram-btn');
            const telegramDropdown = $('telegram-dropdown');
            const qrisOverlay = $('qris-overlay');
            const qrisCloseBtn = $('qris-close-btn');
            const qrisDanaBtn = $('qris-dana-btn');
            const qrisDownloadBtn = $('qris-download-btn');

            // ===== STATE =====
            let postsData = [],
                fetchedPosts = [];
            let activeKatFilter = null;
            let currentDisplayCount = 0;
            let carouselInterval = null;
            let currentSlide = 0;
            let totalPopularSlides = 0;
            let isDetailMode = false;
            let isInitialLoad = true;

            // ===== PARTICLES (optimized) =====
            const canvas = document.getElementById('particles');
            if (canvas && window.innerWidth > 640) {
                const ctx = canvas.getContext('2d');
                let particles = [];
                const maxParticles = 35;
                let animId = null;

                function resizeCanvas() {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                }
                window.addEventListener('resize', resizeCanvas);
                resizeCanvas();

                class Particle {
                    constructor() { this.reset(); }
                    reset() {
                        this.x = Math.random() * canvas.width;
                        this.y = Math.random() * canvas.height;
                        this.vx = (Math.random() - 0.5) * 0.3;
                        this.vy = (Math.random() - 0.5) * 0.3;
                        this.radius = Math.random() * 2 + 0.8;
                        this.opacity = Math.random() * 0.4 + 0.1;
                    }
                    update() {
                        this.x += this.vx;
                        this.y += this.vy;
                        if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                        if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
                    }
                    draw() {
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(168,127,255,${this.opacity})`;
                        ctx.fill();
                    }
                }
                for (let i = 0; i < maxParticles; i++) particles.push(new Particle());

                function animateParticles() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    particles.forEach(p => { p.update();
                        p.draw(); });
                    animId = requestAnimationFrame(animateParticles);
                }
                animateParticles();

                document.addEventListener('visibilitychange', () => {
                    if (document.hidden) {
                        if (animId) cancelAnimationFrame(animId);
                    } else {
                        if (!animId) animateParticles();
                    }
                });
            }

            // ===== SETUP LOGO & AVATAR =====
            if (LOGO_URL) {
                const logo = document.querySelector('.logo-img');
                if (logo) logo.src = LOGO_URL;
            }
            if (AVATAR_URL) {
                const a = $('profile-avatar');
                if (a) { a.style.backgroundImage = `url('${AVATAR_URL}')`;
                    a.textContent = ''; }
            }

            // ===== VIEW COUNT =====
            async function incrementViewCount(postName) {
                try {
                    const url = `${VIEW_API_BASE}/${encodeURIComponent(postName)}`;
                    const resp = await fetch(url, { method: 'GET', headers: { 'Accept': 'application/json' } });
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    const data = await resp.json();
                    const raw = data.count ?? data.visits ?? data.views ?? data;
                    const count = typeof raw === 'number' ? raw : parseInt(raw, 10);
                    if (!isNaN(count) && count >= 0) return count;
                    return 0;
                } catch (e) {
                    return incrementViewCountLocal(postName);
                }
            }

            function incrementViewCountLocal(name) {
                const KEY = `view_count_${name}`;
                const TS_KEY = `view_ts_${name}`;
                const now = Date.now();
                const lastTs = parseInt(localStorage.getItem(TS_KEY) || '0', 10);
                const current = parseInt(localStorage.getItem(KEY) || '0', 10);
                if (!lastTs || (now - lastTs) > 86400000) {
                    const nc = current + 1;
                    localStorage.setItem(KEY, nc.toString());
                    localStorage.setItem(TS_KEY, now.toString());
                    return nc;
                }
                return current || 1;
            }

            // ===== UTILITY =====
            function fixImageUrl(url) {
                if (!url) return '';
                if (url.includes('github.com') && !url.includes('raw.githubusercontent.com')) {
                    url = url.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
                }
                return url;
            }

            function getExcerpt(c) {
                if (!c) return '';
                let t = c.replace(/[#*`>\[\]()!|]/g, '').replace(/\n/g, ' ').trim();
                return t.length > 80 ? t.slice(0, 80) + '...' : t;
            }

            function formatDate(d) {
                if (!d) return '';
                const dt = new Date(d);
                if (isNaN(dt.getTime())) return '';
                const m = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
                return `${dt.getDate()} ${m[dt.getMonth()]} ${dt.getFullYear()}`;
            }

            function getAllKategori() {
                const k = new Set();
                fetchedPosts.forEach(p => { const kat = p.metadata.kategori || '';
                    if (kat) k.add(kat); });
                return Array.from(k).sort();
            }

            function debounce(fn, ms = 300) {
                let timer;
                return function(...args) {
                    clearTimeout(timer);
                    timer = setTimeout(() => fn.apply(this, args), ms);
                };
            }

            // ===== CACHE =====
            function getCache() {
                try {
                    const r = localStorage.getItem(CACHE_KEY);
                    if (!r) return null;
                    const d = JSON.parse(r);
                    if (Date.now() - d.t < CACHE_TIME) return d.posts;
                    return null;
                } catch { return null; }
            }

            function setCache(posts) {
                try {
                    localStorage.setItem(CACHE_KEY, JSON.stringify({ t: Date.now(), posts }));
                } catch {}
            }

            // ===== FETCH POSTS =====
            async function fetchPostList() {
                const cached = getCache();
                if (cached) { postsData = cached; return; }
                const apiUrl = `https://api.github.com/repos/${GITHUB_REPO}/contents/posts`;
                const res = await fetch(apiUrl, { headers: { 'Accept': 'application/vnd.github.v3+json' } });
                if (!res.ok) {
                    const old = localStorage.getItem(CACHE_KEY);
                    if (old) {
                        try { const d = JSON.parse(old);
                            postsData = d.posts; return; } catch {}
                    }
                    throw new Error(`Gagal fetch (${res.status}).`);
                }
                const files = await res.json();
                const mdFiles = files.filter(f => f.name.endsWith('.md'));
                if (!mdFiles.length) throw new Error('Tidak ada file .md di posts/.');
                postsData = mdFiles.map(f => ({ filename: f.name, name: f.name.replace('.md', ''), download_url: f
                        .download_url }));
                setCache(postsData);
            }

            function parseFrontmatter(md) {
                const m = md.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
                if (!m) return { metadata: {}, content: md };
                const meta = {};
                m[1].split('\n').forEach(line => {
                    const i = line.indexOf(':');
                    if (i > 0) meta[line.slice(0, i).trim()] = line.slice(i + 1).trim().replace(/^["']|["']$/g, '');
                });
                return { metadata: meta, content: m[2] };
            }

            async function fetchPost(p) {
                try {
                    const r = await fetch(p.download_url);
                    if (!r.ok) throw new Error('fail');
                    const md = await r.text();
                    const { metadata, content } = parseFrontmatter(md);
                    const lastModified = r.headers.get('Last-Modified');
                    return { ...p, metadata, content, lastModified, html: marked ? marked.parse(content) :
                            `<pre>${content}</pre>` };
                } catch {
                    return { ...p, metadata: {}, content: '', html: '<p>Gagal memuat.</p>', lastModified: null };
                }
            }

            // ===== RENDER FUNCTIONS =====
            function renderCategoryBar() {
                const kats = getAllKategori();
                let html = '<span class="category-chip' + (!activeKatFilter ? ' active' : '') + '" data-kat=""><i class="fas fa-globe"></i> Semua</span>';
                kats.forEach(kat => {
                    html +=
                        `<span class="category-chip${activeKatFilter === kat ? ' active' : ''}" data-kat="${kat}"><i class="fas fa-tag"></i> ${kat}</span>`;
                });
                if (activeKatFilter) {
                    html += '<button class="reset-filter" id="reset-filter"><i class="fas fa-times"></i> Hapus filter</button>';
                }
                categoryBar.innerHTML = html;
                categoryBar.querySelectorAll('.category-chip').forEach(chip => {
                    chip.addEventListener('click', () => {
                        activeKatFilter = chip.dataset.kat || null;
                        resetAndApplyFilters();
                    });
                });
                const resetBtn = document.getElementById('reset-filter');
                if (resetBtn) resetBtn.addEventListener('click', () => { activeKatFilter = null;
                    resetAndApplyFilters(); });
            }

            function getFilteredPosts() {
                const q = searchInput.value.trim().toLowerCase();
                let f = fetchedPosts;
                if (activeKatFilter) f = f.filter(p => (p.metadata.kategori || '') === activeKatFilter);
                if (q) f = f.filter(p => {
                    const t = (p.metadata.judul || p.metadata.title || p.name).toLowerCase();
                    return t.includes(q);
                });
                return f;
            }

            function sortPosts(posts) {
                const sortBy = sortSelect.value;
                const sorted = [...posts];
                const getTime = (p) => {
                    const d = p.metadata.tanggal || p.metadata.date || p.lastModified;
                    if (!d) return 0;
                    const t = new Date(d);
                    return isNaN(t.getTime()) ? 0 : t.getTime();
                };
                switch (sortBy) {
                    case 'terbaru':
                        sorted.sort((a, b) => getTime(b) - getTime(a));
                        break;
                    case 'terlama':
                        sorted.sort((a, b) => getTime(a) - getTime(b));
                        break;
                    case 'az':
                        sorted.sort((a, b) => {
                            const tA = (a.metadata.judul || a.metadata.title || a.name || '').toLowerCase();
                            const tB = (b.metadata.judul || b.metadata.title || b.name || '').toLowerCase();
                            return tA.localeCompare(tB);
                        });
                        break;
                    case 'za':
                        sorted.sort((a, b) => {
                            const tA = (a.metadata.judul || a.metadata.title || a.name || '').toLowerCase();
                            const tB = (b.metadata.judul || b.metadata.title || b.name || '').toLowerCase();
                            return tB.localeCompare(tA);
                        });
                        break;
                }
                return sorted;
            }

            function resetAndApplyFilters() { currentDisplayCount = 0;
                applyFilters(); }

            function applyFilters() {
                let filtered = getFilteredPosts();
                filtered = sortPosts(filtered);
                if (activeKatFilter) {
                    filterIndicator.classList.remove('hidden');
                    filterIndicator.innerHTML =
                        `<i class="fas fa-filter"></i> Kategori: <strong>${activeKatFilter}</strong> (${filtered.length} hasil)`;
                } else filterIndicator.classList.add('hidden');
                currentDisplayCount = Math.min(ITEMS_PER_PAGE, filtered.length);
                displayPosts(filtered.slice(0, currentDisplayCount));
                renderLoadMoreButton(filtered.length);
            }

            function displayPosts(posts) {
                if (!posts.length) {
                    postContainer.innerHTML = '<div class="empty-text">🔍 Tidak ada postingan yang cocok.</div>';
                    return;
                }
                const fragment = document.createDocumentFragment();
                posts.forEach((p, i) => {
                    const card = createCardElement(p, i);
                    fragment.appendChild(card);
                });
                postContainer.innerHTML = '';
                postContainer.appendChild(fragment);
                attachCardEvents();
            }

            function createCardElement(post, index) {
                const t = post.metadata.judul || post.metadata.title || post.name.replace(/[-_]/g, ' ');
                const img = fixImageUrl(post.metadata.gambar || post.metadata.image || '');
                const kategori = post.metadata.kategori || '';
                const ver = post.metadata.versi || post.metadata.version || '';
                const excerpt = getExcerpt(post.content);
                const delay = index * 0.04 + 's';
                const imgTag = img ?
                    `<img src="${img}" alt="${t}" loading="lazy" decoding="async" onerror="this.parentElement.classList.add('error')">` :
                    '';
                const versionBadge = ver ? `<span class="version-badge-img"><i class="fas fa-code-branch"></i> v${ver}</span>` :
                    '';
                const div = document.createElement('div');
                div.className = 'post-card';
                div.dataset.name = post.name;
                div.style.animationDelay = delay;
                div.setAttribute('role', 'listitem');
                div.innerHTML = `
                    <div class="card-img${img ? '' : ' error'}">${imgTag}<span class="placeholder-icon"><i class="fas fa-box-open"></i></span>${versionBadge}</div>
                    <div class="card-body"><div class="card-title">${t}</div><div class="card-meta">${kategori ? `<span class="badge" data-kat="${kategori}"><i class="fas fa-folder"></i> ${kategori}</span>` : ''}</div>${excerpt ? `<p class="card-excerpt">${excerpt}</p>` : ''}</div>
                `;
                return div;
            }

            function attachCardEvents() {
                postContainer.querySelectorAll('.post-card').forEach(c => {
                    c.addEventListener('click', (e) => {
                        if (e.target.closest('.badge')) return;
                        setHash('detail', c.dataset.name);
                    });
                });
                postContainer.querySelectorAll('.badge').forEach(b => {
                    b.addEventListener('click', (e) => {
                        e.stopPropagation();
                        activeKatFilter = b.dataset.kat;
                        searchInput.value = '';
                        resetAndApplyFilters();
                        renderCategoryBar();
                    });
                });
            }

            function renderLoadMoreButton(total) {
                if (currentDisplayCount < total) {
                    loadMoreContainer.innerHTML =
                        `<button class="load-more-btn" id="load-more-btn"><i class="fas fa-chevron-down"></i> Muat Lebih Banyak (${total - currentDisplayCount})</button>`;
                    document.getElementById('load-more-btn').addEventListener('click', loadMorePosts);
                } else {
                    loadMoreContainer.innerHTML = '';
                }
            }

            function loadMorePosts() {
                let f = getFilteredPosts();
                f = sortPosts(f);
                const n = Math.min(currentDisplayCount + ITEMS_PER_PAGE, f.length);
                const newPosts = f.slice(currentDisplayCount, n);
                currentDisplayCount = n;
                const fragment = document.createDocumentFragment();
                newPosts.forEach((p, i) => {
                    const card = createCardElement(p, i);
                    fragment.appendChild(card);
                });
                postContainer.appendChild(fragment);
                attachCardEvents();
                renderLoadMoreButton(f.length);
            }

            // ===== CAROUSEL =====
            function stopCarousel() {
                if (carouselInterval) { clearInterval(carouselInterval);
                    carouselInterval = null; }
            }

            function startCarousel() {
                stopCarousel();
                if (totalPopularSlides === 0 || isDetailMode) return;
                updateCarousel(0);
                carouselInterval = setInterval(() => {
                    currentSlide = (currentSlide + 1) % totalPopularSlides;
                    updateCarousel(currentSlide);
                }, 4000);
            }

            function updateCarousel(i) {
                const slides = carouselTrack.querySelectorAll('.carousel-slide');
                slides.forEach((s, idx) => s.classList.toggle('active', idx === i));
                carouselTrack.querySelectorAll('.carousel-counter').forEach((c) => {
                    c.textContent = `${i+1}/${totalPopularSlides}`;
                });
            }

            function renderPopularSection() {
                if (!fetchedPosts.length) { carouselTrack.innerHTML = '';
                    totalPopularSlides = 0; return; }
                let pop = fetchedPosts.filter(p => p.metadata.populer && p.metadata.populer.toLowerCase() === 'true');
                if (pop.length === 0) pop = fetchedPosts.slice(0, 4);
                else pop = pop.slice(0, 4);
                totalPopularSlides = pop.length;
                carouselTrack.innerHTML = pop.map((p, i) => {
                    const img = fixImageUrl(p.metadata.gambar || p.metadata.image || '');
                    const title = p.metadata.judul || p.metadata.title || p.name.replace(/[-_]/g, ' ');
                    return `<div class="carousel-slide${i === 0 ? ' active' : ''}" data-name="${p.name}">${img ? `<img src="${img}" alt="${title}" loading="lazy" decoding="async" onerror="this.style.display='none'">` : ''}<div class="slide-overlay"><div class="slide-title">${title}</div><span class="carousel-counter">${i+1}/${pop.length}</span></div></div>`;
                }).join('');
                carouselTrack.querySelectorAll('.carousel-slide').forEach(s => {
                    s.addEventListener('click', () => setHash('detail', s.dataset.name));
                });
                startCarousel();
            }

            // ===== HOME =====
            async function renderHome() {
                postContainer.innerHTML = '<div class="spinner"></div>';
                loadMoreContainer.innerHTML = '';
                categoryBar.innerHTML = '';
                carouselTrack.innerHTML = '';
                stopCarousel();
                isDetailMode = false;
                try {
                    await fetchPostList();
                    if (!postsData.length) {
                        postContainer.innerHTML = '<div class="empty-text"><i class="far fa-folder-open"></i> Tidak ada postingan.</div>';
                        return;
                    }
                    const fetchPromises = postsData.map(fetchPost);
                    fetchedPosts = await Promise.all(fetchPromises);
                    renderPopularSection();
                    renderCategoryBar();
                    resetAndApplyFilters();
                } catch (err) {
                    postContainer.innerHTML = `<div class="error-text">⚠️ ${err.message}</div>`;
                }
            }

            // ===== SCREENSHOT =====
            function buildScreenshotGallery(str) {
                if (!str) return '';
                const urls = str.split(',').map(u => fixImageUrl(u.trim())).filter(u => u.length > 0);
                if (urls.length === 0) return '';
                const lim = urls.slice(0, 5);
                return `<div class="screenshot-scroll">${lim.map(u => `<img src="${u}" alt="Screenshot" loading="lazy" decoding="async" onclick="event.stopPropagation(); openLightbox('${u}')">`).join('')}</div>`;
            }
            window.openLightbox = function(url) {
                const lb = document.createElement('div');
                lb.className = 'lightbox';
                lb.innerHTML = `<img src="${url}" alt="Screenshot" loading="lazy">`;
                lb.addEventListener('click', () => lb.remove());
                document.body.appendChild(lb);
            };

            // ===== DOWNLOAD =====
            function startDownloadWithAd(btn, url) {
                const now = Date.now();
                const last = localStorage.getItem(AD_STORAGE_KEY);
                if (!last || (now - parseInt(last)) > AD_INTERVAL) {
                    localStorage.setItem(AD_STORAGE_KEY, now.toString());
                    if (AD_URL) window.open(AD_URL, '_blank');
                    let sec = 5;
                    btn.textContent = `⏳ ${sec} detik`;
                    btn.classList.add('counting');
                    const timer = setInterval(() => {
                        sec--;
                        if (sec <= 0) {
                            clearInterval(timer);
                            btn.innerHTML = '<i class="fas fa-download"></i> Download APK';
                            btn.classList.remove('counting');
                            window.open(url, '_blank');
                        } else {
                            btn.textContent = `⏳ ${sec} detik`;
                        }
                    }, 1000);
                } else {
                    window.open(url, '_blank');
                }
            }

            // ===== REKOMENDASI =====
            function getRecommendedPosts(currentPost, limit = 4) {
                if (!fetchedPosts.length) return [];
                const currentName = currentPost.name;
                const currentKat = currentPost.metadata.kategori || '';
                const currentTags = (currentPost.metadata.tag || '')
                    .split(',')
                    .map(t => t.trim().toLowerCase())
                    .filter(Boolean);

                let candidates = fetchedPosts.filter(p =>
                    p.name !== currentName &&
                    (p.metadata.kategori || '') === currentKat
                );

                if (candidates.length < limit && currentTags.length) {
                    const tagCandidates = fetchedPosts.filter(p =>
                        p.name !== currentName &&
                        (p.metadata.kategori || '') !== currentKat &&
                        currentTags.some(tag => (p.metadata.tag || '').toLowerCase().includes(tag))
                    );
                    candidates = [...candidates, ...tagCandidates];
                }

                if (candidates.length < limit) {
                    const others = fetchedPosts
                        .filter(p => p.name !== currentName && !candidates.includes(p))
                        .sort(() => Math.random() - 0.5);
                    candidates = [...candidates, ...others];
                }

                const seen = new Set();
                const unique = [];
                for (const p of candidates) {
                    if (!seen.has(p.name)) { seen.add(p.name);
                        unique.push(p); }
                }
                return unique.slice(0, limit);
            }

            function renderRecommendedPosts(posts, currentPost) {
                if (!posts.length) return '';
                let html = `
                    <div class="rekomendasi-section">
                        <div class="rekomendasi-title"><i class="fas fa-lightbulb"></i> Rekomendasi untuk Anda</div>
                        <div class="rekomendasi-grid">
                `;
                posts.forEach(p => {
                    const title = p.metadata.judul || p.metadata.title || p.name.replace(/[-_]/g, ' ');
                    const img = fixImageUrl(p.metadata.gambar || p.metadata.image || '');
                    const kategori = p.metadata.kategori || '';
                    const imgTag = img ?
                        `<img src="${img}" alt="${title}" loading="lazy" decoding="async" onerror="this.parentElement.classList.add('error')">` :
                        '';
                    const catBadge = kategori ?
                        `<span class="badge" data-kat="${kategori}"><i class="fas fa-folder"></i> ${kategori}</span>` :
                        '';
                    html += `
                        <div class="rekomendasi-card" data-name="${p.name}">
                            <div class="card-img${img ? '' : ' error'}">${imgTag}<span class="placeholder-icon"><i class="fas fa-box-open"></i></span></div>
                            <div class="card-body">
                                <div class="card-title">${title}</div>
                                <div class="card-meta">${catBadge}</div>
                            </div>
                        </div>
                    `;
                });
                html += `</div></div>`;
                return html;
            }

            function attachRekomendasiEvents() {
                document.querySelectorAll('.rekomendasi-card').forEach(card => {
                    card.addEventListener('click', function() {
                        const name = this.dataset.name;
                        if (name) setHash('detail', name);
                    });
                });
            }

            // ===== DETAIL (langsung tampilkan loading) =====
            async function showDetail(name) {
                showSection(detailSection);
                detailContent.innerHTML = '<div class="spinner"></div>';
                setActiveNav('detail');
                stopCarousel();
                isDetailMode = true;
                window.scrollTo({ top: 0 });

                const post = fetchedPosts.find(p => p.name === name);
                if (!post) {
                    detailContent.innerHTML = '<p class="error-text">Postingan tidak ditemukan.</p>';
                    return;
                }

                const t = post.metadata.judul || post.metadata.title || post.name.replace(/[-_]/g, ' ');
                const img = fixImageUrl(post.metadata.gambar || post.metadata.image || '');
                const v = post.metadata.versi || post.metadata.version || '?';
                const s = post.metadata.ukuran || post.metadata.size || '?';
                const dev = post.metadata.developer || post.metadata.dev || 'Destaseo';
                const dwn = post.metadata.download || post.metadata.link || '';
                const kategori = post.metadata.kategori || '';
                const tags = post.metadata.tag ? post.metadata.tag.split(',').map(t => t.trim()).filter(t => t) : [];
                const dateRaw = post.metadata.tanggal || post.metadata.date || post.lastModified || '';
                const dateFormatted = formatDate(dateRaw);
                const screenshots = post.metadata.screenshot || post.metadata.screenshots || '';
                const galleryHtml = buildScreenshotGallery(screenshots);
                const hasDownload = dwn && dwn !== '#';

                let viewCount = 0;
                try {
                    viewCount = await incrementViewCount(name);
                } catch (e) { viewCount = 0; }

                const tagsHtml = tags.length > 0 ?
                    `<div class="tags-container">${tags.map(tag => `<span class="tag-badge"><i class="fas fa-tag"></i> ${tag}</span>`).join('')}</div>` :
                    '';

                const downloadBtn = hasDownload ?
                    `<button class="big-download" id="detail-download-btn"><i class="fas fa-download"></i> Download APK</button>` :
                    `<div class="big-download disabled"><i class="fas fa-exclamation-circle"></i> Link Download Tidak Tersedia</div>`;

                const recPosts = getRecommendedPosts(post, 4);
                const recHtml = renderRecommendedPosts(recPosts, post);

                detailContent.innerHTML = `
                    <div class="detail-header">
                        ${img ? `<img src="${img}" class="detail-img" alt="${t}" loading="lazy" decoding="async" onerror="this.style.display='none'">` : '<div class="detail-img" style="display:flex;align-items:center;justify-content:center;font-size:3rem;"><i class="fas fa-box"></i></div>'}
                        <h1 class="detail-title">${t}</h1>
                        <div class="detail-meta-grid">
                            <div class="meta-item"><i class="fas fa-code-branch"></i> <strong>Versi</strong> ${v}</div>
                            <div class="meta-item"><i class="fas fa-weight-hanging"></i> <strong>Ukuran</strong> ${s}</div>
                            <div class="meta-item"><i class="fas fa-user"></i> <strong>Developer</strong> ${dev}</div>
                            ${kategori ? `<div class="meta-item"><i class="fas fa-folder"></i> <strong>Kategori</strong> ${kategori}</div>` : ''}
                            ${dateFormatted ? `<div class="meta-item"><i class="far fa-calendar-alt"></i> <strong>Tanggal</strong> ${dateFormatted}</div>` : ''}
                            <div class="meta-item"><i class="fas fa-eye"></i> <strong>Dilihat</strong> <span id="view-count-display">${viewCount || 0}</span> kali</div>
                        </div>
                        ${galleryHtml}
                        ${tagsHtml}
                    </div>
                    <div class="content-box">${post.html || '<p><i class="far fa-file-alt"></i> Tidak ada deskripsi.</p>'}</div>
                    ${downloadBtn}
                    ${recHtml}
                `;

                if (hasDownload) {
                    const dBtn = document.getElementById('detail-download-btn');
                    if (dBtn) {
                        dBtn.addEventListener('click', function(e) {
                            e.preventDefault();
                            if (this.classList.contains('counting')) return;
                            startDownloadWithAd(this, dwn);
                        });
                    }
                }

                attachRekomendasiEvents();
            }

            // ===== NAVIGATION =====
            function getHashPage() {
                const h = window.location.hash.slice(1);
                if (!h || h === 'home') return { page: 'home' };
                if (h === 'search') return { page: 'search' };
                if (h === 'profile') return { page: 'profile' };
                if (h.startsWith('detail/')) return { page: 'detail', postName: h.split('/')[1] };
                return { page: 'home' };
            }

            function setHash(p, param) {
                if (p === 'home') window.location.hash = 'home';
                else if (p === 'search') window.location.hash = 'search';
                else if (p === 'profile') window.location.hash = 'profile';
                else if (p === 'detail' && param) window.location.hash = 'detail/' + param;
            }

            function showSection(s) {
                [homeSection, detailSection, profileSection].forEach(x => x.classList.add('hidden'));
                s.classList.remove('hidden');
            }

            function setActiveNav(p) {
                navItems.forEach(i => {
                    i.classList.toggle('active', i.dataset.page === p || (p === 'detail' && i.dataset.page ===
                        'home'));
                });
            }

            function navigate(p, postName) {
                if (p === 'home') {
                    showSection(homeSection);
                    searchBox.classList.add('hidden');
                    categoryBar.classList.remove('hidden');
                    sortBar.classList.remove('hidden');
                    document.getElementById('popular-section').classList.remove('hidden');
                    setActiveNav('home');
                    isDetailMode = false;
                    startCarousel();
                } else if (p === 'search') {
                    showSection(homeSection);
                    searchBox.classList.remove('hidden');
                    categoryBar.classList.remove('hidden');
                    sortBar.classList.add('hidden');
                    document.getElementById('popular-section').classList.add('hidden');
                    setActiveNav('search');
                    isDetailMode = false;
                    stopCarousel();
                    setTimeout(() => searchInput.focus(), 100);
                } else if (p === 'profile') {
                    showSection(profileSection);
                    searchBox.classList.add('hidden');
                    categoryBar.classList.add('hidden');
                    sortBar.classList.add('hidden');
                    document.getElementById('popular-section').classList.add('hidden');
                    filterIndicator.classList.add('hidden');
                    setActiveNav('profile');
                    isDetailMode = false;
                    stopCarousel();
                    renderProfile();
                } else if (p === 'detail' && postName) {
                    showDetail(postName);
                }
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            function renderProfile() {
                document.getElementById('profile-name').textContent = PROFILE.name;
                document.getElementById('profile-bio').textContent = PROFILE.bio;
                document.getElementById('social-links').innerHTML = PROFILE.links.map(l =>
                    `<a href="${l.url}" target="_blank" rel="noopener" class="social-link"><i class="${l.icon}"></i> ${l.label}</a>`
                ).join('');
            }

            // ===== EVENTS =====
            detailBack.addEventListener('click', () => setHash('home'));
            navItems.forEach(i => i.addEventListener('click', () => setHash(i.dataset.page)));

            const debouncedSearch = debounce(() => resetAndApplyFilters(), 300);
            searchInput.addEventListener('input', debouncedSearch);
            sortSelect.addEventListener('change', () => resetAndApplyFilters());

            telegramBtn.addEventListener('click', (e) => { e.stopPropagation();
                telegramDropdown.classList.toggle('show'); });
            document.addEventListener('click', () => telegramDropdown.classList.remove('show'));
            telegramDropdown.addEventListener('click', (e) => e.stopPropagation());

            if (qrisDanaBtn) qrisDanaBtn.addEventListener('click', () => qrisOverlay.classList.remove('hidden'));
            qrisCloseBtn.addEventListener('click', () => qrisOverlay.classList.add('hidden'));
            qrisOverlay.addEventListener('click', (e) => { if (e.target === qrisOverlay) qrisOverlay.classList.add(
                    'hidden'); });
            qrisDownloadBtn.addEventListener('click', async () => {
                try {
                    const r = await fetch(QRIS_URL);
                    const b = await r.blob();
                    const u = URL.createObjectURL(b);
                    const a = document.createElement('a');
                    a.href = u;
                    a.download = 'qris-destaseo.png';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(u);
                } catch { window.open(QRIS_URL, '_blank'); }
            });

            window.addEventListener('hashchange', () => {
                const { page, postName } = getHashPage();
                if (page === 'detail' && postName) {
                    if (fetchedPosts.length === 0) {
                        renderHome().then(() => navigate('detail', postName));
                    } else {
                        navigate('detail', postName);
                    }
                } else {
                    navigate(page);
                }
            });

            // ===== SITEMAP =====
            async function generateSitemap() {
                if (window.location.search !== '?sitemap') return;
                const baseUrl = window.location.origin + window.location.pathname.replace(/\/[^/]*$/, '');
                let urls = [baseUrl];
                try {
                    const apiUrl = `https://api.github.com/repos/${GITHUB_REPO}/contents/posts`;
                    const res = await fetch(apiUrl);
                    if (res.ok) {
                        const files = await res.json();
                        const mdFiles = files.filter(f => f.name.endsWith('.md'));
                        mdFiles.forEach(f => {
                            const name = f.name.replace('.md', '');
                            urls.push(`${baseUrl}#detail/${name}`);
                        });
                    }
                } catch (e) {}
                const sitemap = `<?xml version="1.0" encoding="UTF-8"?>
        <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
          ${urls.map(u => `<url><loc>${u}</loc><lastmod>${new Date().toISOString().split('T')[0]}</lastmod></url>`).join('\n  ')}
        </urlset>`;
                document.body.innerHTML =
                    `<pre style="color:#fff;background:#111;padding:20px;font-family:monospace;white-space:pre-wrap;word-break:break-all;">${sitemap.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>`;
                throw new Error('SITEMAP_DISPLAY');
            }

            // ===== BOOT =====
            (async () => {
                try { await generateSitemap(); } catch (e) {
                    if (e.message === 'SITEMAP_DISPLAY') return;
                }
                await renderHome();
                const { page, postName } = getHashPage();
                if (page === 'detail' && postName) navigate('detail', postName);
                else navigate(page);
            })();

        })();
    </script>
</body>
</html>
