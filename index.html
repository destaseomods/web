    <style>
        /* ============================================================
           RESET & VARIABLES
           ============================================================ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg: #080818;
            --surface: rgba(20, 20, 45, 0.6);
            --surface-hover: rgba(30, 30, 60, 0.8);
            --border: rgba(255, 255, 255, 0.06);
            --text: #f0f0ff;
            --text-secondary: #a8a8c8;
            --text-muted: #7878a0;
            --accent: #a87fff;
            --accent2: #3ee0ff;
            --gradient-primary: linear-gradient(135deg, #a87fff, #3ee0ff);
            --gradient-text: linear-gradient(135deg, #c084fc, #60a5fa, #34d399);
            --radius: 24px;
            --radius-sm: 14px;
            --radius-full: 9999px;
            --nav-height: 72px;
            --safe-bottom: env(safe-area-inset-bottom, 16px);
            --shadow-card: 0 12px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.03);
            --shadow-premium: 0 20px 60px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.04), 0 0 80px rgba(168, 127, 255, 0.06);
            --shadow-glow: 0 0 40px rgba(168, 127, 255, 0.08);
            --transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --container-max: 820px;
        }
        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            padding-bottom: calc(var(--nav-height) + var(--safe-bottom) + 20px);
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            position: relative;
        }
        body.no-scroll {
            overflow: hidden !important;
        }

        /* ============================================================
           ANIMATED BACKGROUND
           ============================================================ */
        .bg-container {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background: var(--bg);
        }
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            will-change: transform, opacity;
            animation: orbFloat 25s ease-in-out infinite alternate;
        }
        .bg-orb-1 {
            width: 500px;
            height: 500px;
            top: -200px;
            right: -150px;
            background: radial-gradient(circle, rgba(168, 127, 255, 0.25), transparent 70%);
            animation-duration: 28s;
        }
        .bg-orb-2 {
            width: 400px;
            height: 400px;
            bottom: -100px;
            left: -100px;
            background: radial-gradient(circle, rgba(62, 224, 255, 0.18), transparent 70%);
            animation-duration: 32s;
            animation-delay: -8s;
        }
        .bg-orb-3 {
            width: 300px;
            height: 300px;
            top: 40%;
            left: 50%;
            transform: translateX(-50%);
            background: radial-gradient(circle, rgba(168, 127, 255, 0.12), transparent 70%);
            animation-duration: 35s;
            animation-delay: -15s;
        }
        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 0.5; }
            33% { transform: translate(40px, -30px) scale(1.1) rotate(5deg); opacity: 0.8; }
            66% { transform: translate(-20px, 20px) scale(0.9) rotate(-3deg); opacity: 0.6; }
            100% { transform: translate(10px, -10px) scale(1.05) rotate(2deg); opacity: 0.7; }
        }
        .bg-grid {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.012) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.012) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridPulse 20s ease-in-out infinite alternate;
        }
        @keyframes gridPulse {
            0% { opacity: 0.2; }
            50% { opacity: 0.5; }
            100% { opacity: 0.2; }
        }
        #particles-bg {
            position: absolute;
            inset: 0;
            z-index: 1;
            display: block;
        }
        .bg-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 20% 50%, rgba(168, 127, 255, 0.04), transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(62, 224, 255, 0.03), transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(168, 127, 255, 0.02), transparent 50%);
            z-index: 2;
            animation: gradientShift 30s ease-in-out infinite alternate;
        }
        @keyframes gradientShift {
            0% { opacity: 0.5; transform: scale(1) rotate(0deg); }
            50% { opacity: 1; transform: scale(1.03) rotate(1deg); }
            100% { opacity: 0.6; transform: scale(1) rotate(-1deg); }
        }

        /* ============================================================
           CONTAINER
           ============================================================ */
        .container {
            max-width: var(--container-max);
            margin: 0 auto;
            padding: 12px 16px;
            position: relative;
            z-index: 2;
        }

        /* ============================================================
           TOPBAR
           ============================================================ */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: rgba(10, 10, 30, 0.7);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-full);
            margin: 8px auto 16px;
            max-width: 700px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.03);
            position: sticky;
            top: 8px;
            z-index: 99;
            transition: all var(--transition);
        }
        .topbar:hover {
            border-color: rgba(168, 127, 255, 0.12);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.7), 0 0 30px rgba(168, 127, 255, 0.03);
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .logo-img {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(168, 127, 255, 0.25);
            box-shadow: 0 0 20px rgba(168, 127, 255, 0.15);
            flex-shrink: 0;
            transition: transform var(--transition);
        }
        .logo-img:hover {
            transform: rotate(-6deg) scale(1.05);
        }
        .logo-text {
            font-family: 'Outfit', system-ui, sans-serif;
            font-weight: 900;
            font-size: clamp(1rem, 3.5vw, 1.5rem);
            letter-spacing: -0.5px;
            background: var(--gradient-text);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientText 5s ease-in-out infinite alternate;
        }
        @keyframes gradientText {
            0% { background-position: 0% center; }
            100% { background-position: 100% center; }
        }
        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .telegram-btn {
            background: rgba(62, 224, 255, 0.07);
            border: 1px solid rgba(62, 224, 255, 0.1);
            color: var(--accent2);
            padding: 5px 14px;
            border-radius: var(--radius-full);
            font-size: clamp(0.6rem, 1.2vw, 0.75rem);
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all var(--transition);
            backdrop-filter: blur(8px);
            white-space: nowrap;
        }
        .telegram-btn:hover {
            background: rgba(62, 224, 255, 0.14);
            border-color: var(--accent2);
            box-shadow: 0 0 30px rgba(62, 224, 255, 0.1);
            transform: translateY(-1px);
        }
        .telegram-btn i {
            font-size: 0.8rem;
        }
        .telegram-wrapper {
            position: relative;
        }
        .telegram-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: rgba(12, 12, 32, 0.95);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 18px;
            padding: 6px;
            min-width: 170px;
            display: none;
            flex-direction: column;
            gap: 2px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.7);
            z-index: 150;
        }
        .telegram-dropdown.show {
            display: flex;
        }
        .telegram-dropdown a {
            color: var(--text);
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 14px;
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
        }
        .telegram-dropdown a:hover {
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
        }
        .telegram-dropdown a i {
            width: 18px;
            text-align: center;
            color: var(--accent2);
            font-size: 0.8rem;
        }

        /* ============================================================
           WELCOME / HERO
           ============================================================ */
        .hero-section {
            text-align: center;
            padding: 10px 0 20px;
        }
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(168, 127, 255, 0.08);
            border: 1px solid rgba(168, 127, 255, 0.08);
            padding: 4px 16px 4px 12px;
            border-radius: var(--radius-full);
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 0.3px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .hero-badge i {
            font-size: 0.5rem;
            color: var(--accent2);
        }
        .hero-title {
            font-family: 'Outfit', system-ui, sans-serif;
            font-weight: 900;
            font-size: clamp(1.8rem, 5vw, 2.6rem);
            letter-spacing: -0.5px;
            line-height: 1.1;
            margin-bottom: 6px;
            background: var(--gradient-text);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientText 6s ease-in-out infinite alternate;
        }
        .hero-sub {
            color: var(--text-secondary);
            font-size: clamp(0.85rem, 1.4vw, 1rem);
            font-weight: 400;
            max-width: 480px;
            margin: 0 auto;
            opacity: 0.8;
        }

        /* ============================================================
           SEARCH & CATEGORY
           ============================================================ */
        .search-container {
            margin: 6px 0 14px;
            display: flex;
            gap: 8px;
        }
        .search-input {
            flex: 1;
            background: rgba(15, 15, 40, 0.5);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-full);
            padding: 10px 20px;
            color: #fff;
            font-size: clamp(0.8rem, 1.6vw, 0.9rem);
            font-family: inherit;
            outline: none;
            transition: all var(--transition);
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.2);
        }
        .search-input:focus {
            border-color: rgba(168, 127, 255, 0.2);
            box-shadow: 0 0 0 3px rgba(168, 127, 255, 0.04), 0 4px 24px rgba(168, 127, 255, 0.04);
        }
        .search-input::placeholder {
            color: var(--text-muted);
        }

        .category-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
            align-items: center;
        }
        .category-chip {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 5px 14px;
            border-radius: var(--radius-full);
            color: var(--text-secondary);
            font-size: clamp(0.6rem, 1vw, 0.7rem);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            backdrop-filter: blur(8px);
            white-space: nowrap;
        }
        .category-chip i {
            margin-right: 4px;
            font-size: 0.6rem;
            opacity: 0.6;
        }
        .category-chip.active,
        .category-chip:hover {
            background: rgba(168, 127, 255, 0.08);
            border-color: rgba(168, 127, 255, 0.15);
            color: #fff;
            transform: translateY(-1px);
            box-shadow: 0 2px 16px rgba(168, 127, 255, 0.04);
        }
        .reset-filter {
            background: none;
            border: none;
            color: var(--accent2);
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 10px;
            opacity: 0.6;
            transition: var(--transition);
        }
        .reset-filter:hover {
            opacity: 1;
        }

        /* ============================================================
           CAROUSEL - PREMIUM
           ============================================================ */
        .popular-section {
            margin-bottom: 4px;
        }
        .carousel-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: var(--radius);
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: var(--shadow-premium);
            height: clamp(180px, 28vw, 240px);
        }
        .carousel-track {
            display: flex;
            height: 100%;
            position: relative;
        }
        .carousel-slide {
            position: absolute;
            inset: 0;
            cursor: pointer;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.9s ease-in-out, transform 0.9s ease;
            transform: scale(1.02);
            will-change: transform, opacity;
        }
        .carousel-slide.active {
            opacity: 1;
            z-index: 1;
            transform: scale(1);
        }
        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            inset: 0;
            transition: transform 7s ease;
        }
        .carousel-slide.active img {
            transform: scale(1.04);
        }
        .carousel-slide .slide-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 18px 22px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.8) 60%);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .carousel-slide .slide-title {
            font-weight: 800;
            font-size: clamp(0.85rem, 2vw, 1.15rem);
            line-height: 1.3;
            max-width: 70%;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
        }
        .carousel-title-top {
            position: absolute;
            top: 12px;
            left: 14px;
            font-size: clamp(0.6rem, 1.2vw, 0.7rem);
            font-weight: 700;
            color: #fff;
            z-index: 5;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 3px 14px;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            gap: 6px;
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.3);
        }
        .carousel-counter {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            color: #fff;
            padding: 2px 10px;
            border-radius: var(--radius-full);
            font-size: clamp(0.5rem, 0.8vw, 0.65rem);
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .carousel-dots {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 5;
        }
        .carousel-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transition: all 0.5s ease;
            cursor: pointer;
        }
        .carousel-dot.active {
            background: var(--accent2);
            width: 22px;
            border-radius: 4px;
            box-shadow: 0 0 16px rgba(62, 224, 255, 0.2);
        }

        /* ============================================================
           SORT BAR
           ============================================================ */
        .sort-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        .sort-label {
            color: var(--text-muted);
            font-size: clamp(0.6rem, 0.9vw, 0.7rem);
            font-weight: 500;
        }
        .sort-select {
            background: rgba(15, 15, 40, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: var(--radius-full);
            padding: 4px 14px;
            color: #fff;
            font-size: clamp(0.6rem, 0.9vw, 0.7rem);
            font-family: inherit;
            outline: none;
            cursor: pointer;
            transition: all var(--transition);
        }
        .sort-select:hover {
            border-color: rgba(168, 127, 255, 0.1);
        }
        .filter-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 10px;
            font-size: clamp(0.7rem, 1vw, 0.8rem);
            color: var(--accent2);
        }
        .filter-indicator.hidden {
            display: none;
        }

        /* ============================================================
           POST GRID - PREMIUM
           ============================================================ */
        .post-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }
        .post-card {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            flex-direction: column;
            animation: fadeUp 0.7s ease forwards;
            opacity: 0;
            transform: translateY(24px);
            position: relative;
            box-shadow: var(--shadow-card);
        }
        .post-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius);
            padding: 1px;
            background: linear-gradient(135deg, rgba(168, 127, 255, 0.06), transparent 50%, rgba(62, 224, 255, 0.04));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            transition: var(--transition);
        }
        .post-card:hover {
            transform: translateY(-6px) scale(1.01);
            border-color: rgba(255, 255, 255, 0.06);
            box-shadow: var(--shadow-premium), var(--shadow-glow);
        }
        .post-card:hover::after {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
        }
        .post-card:active {
            transform: scale(0.97);
        }
        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .card-img {
            width: 100%;
            height: clamp(110px, 22vw, 140px);
            object-fit: cover;
            background: linear-gradient(135deg, #14142e, #0a0a1a);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 2rem;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }
        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.7s ease;
        }
        .post-card:hover .card-img img {
            transform: scale(1.05);
        }
        .card-img .placeholder-icon {
            display: none;
            font-size: 2rem;
            opacity: 0.3;
        }
        .card-img.error .placeholder-icon {
            display: block;
        }
        .card-img.error img {
            display: none;
        }
        .version-badge-img {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #fff;
            padding: 2px 10px;
            border-radius: var(--radius-full);
            font-size: clamp(0.45rem, 0.8vw, 0.55rem);
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            z-index: 2;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .card-body {
            padding: 12px 14px 14px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .card-title {
            font-weight: 700;
            font-size: clamp(0.7rem, 1.4vw, 0.85rem);
            line-height: 1.3;
            color: #fff;
        }
        .card-meta {
            font-size: clamp(0.5rem, 0.8vw, 0.6rem);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
        }
        .badge {
            background: rgba(168, 127, 255, 0.08);
            color: #cfc4ff;
            padding: 1px 10px;
            border-radius: var(--radius-full);
            font-weight: 600;
            font-size: clamp(0.45rem, 0.7vw, 0.55rem);
            cursor: pointer;
            transition: all var(--transition);
            border: 1px solid rgba(168, 127, 255, 0.04);
        }
        .badge:hover {
            background: rgba(168, 127, 255, 0.18);
            color: #fff;
        }
        .card-excerpt {
            font-size: clamp(0.55rem, 0.8vw, 0.65rem);
            color: var(--text-muted);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-top: 2px;
        }

        .load-more-btn {
            display: block;
            margin: 18px auto 0;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: var(--accent2);
            padding: 10px 28px;
            border-radius: var(--radius-full);
            font-weight: 700;
            font-size: clamp(0.75rem, 1.2vw, 0.85rem);
            cursor: pointer;
            transition: all var(--transition);
            backdrop-filter: blur(12px);
        }
        .load-more-btn:hover {
            border-color: var(--accent2);
            box-shadow: 0 0 30px rgba(62, 224, 255, 0.04);
            background: rgba(62, 224, 255, 0.04);
            transform: translateY(-2px);
        }
        .hidden {
            display: none !important;
        }

        /* ============================================================
           DETAIL PAGE
           ============================================================ */
        .detail-header {
            background: var(--surface);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: var(--radius);
            padding: clamp(20px, 3vw, 32px);
            margin-bottom: 16px;
            box-shadow: var(--shadow-premium);
            position: relative;
            overflow: hidden;
        }
        .detail-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(168, 127, 255, 0.04), transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(62, 224, 255, 0.03), transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        .detail-header>* {
            position: relative;
            z-index: 1;
        }
        .detail-img {
            display: block;
            width: clamp(120px, 18vw, 160px);
            height: clamp(120px, 18vw, 160px);
            object-fit: cover;
            border-radius: 50%;
            margin: 0 auto 14px;
            box-shadow: 0 0 0 3px rgba(168, 127, 255, 0.1), 0 0 0 10px rgba(168, 127, 255, 0.02), 0 12px 40px rgba(0, 0, 0, 0.4);
            transition: all 0.5s ease;
            border: 2px solid transparent;
            background-clip: padding-box;
        }
        .detail-img:hover {
            transform: scale(1.03);
            box-shadow: 0 0 0 4px rgba(168, 127, 255, 0.15), 0 0 0 14px rgba(168, 127, 255, 0.03), 0 16px 50px rgba(0, 0, 0, 0.5);
        }
        .detail-title {
            font-size: clamp(1.2rem, 3vw, 1.6rem);
            font-weight: 800;
            letter-spacing: -0.3px;
            text-align: center;
            margin-bottom: 2px;
            background: var(--gradient-text);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientText 5s ease-in-out infinite alternate;
            line-height: 1.2;
        }
        .detail-subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: clamp(0.7rem, 1vw, 0.85rem);
            font-weight: 500;
            margin-bottom: 12px;
            padding: 4px 0 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .detail-subtitle .cat-badge-premium {
            background: linear-gradient(135deg, rgba(168, 127, 255, 0.12), rgba(62, 224, 255, 0.06));
            border: 1px solid rgba(168, 127, 255, 0.08);
            padding: 3px 16px;
            border-radius: var(--radius-full);
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--accent2);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .detail-subtitle .date-badge {
            color: var(--text-muted);
            font-size: 0.65rem;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .detail-subtitle .date-badge i {
            color: var(--accent2);
            font-size: 0.6rem;
        }

        .detail-meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 10px;
            margin: 14px 0 10px;
        }
        .meta-item {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 10px 6px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            min-height: 64px;
        }
        .meta-item:hover {
            background: rgba(255, 255, 255, 0.04);
            transform: translateY(-2px);
            border-color: rgba(168, 127, 255, 0.08);
            box-shadow: 0 4px 20px rgba(168, 127, 255, 0.02);
        }
        .meta-item .meta-icon {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            background: rgba(168, 127, 255, 0.06);
            margin-bottom: 3px;
            font-size: clamp(0.7rem, 1vw, 0.85rem);
            color: var(--accent2);
        }
        .meta-item .meta-label {
            font-size: clamp(0.45rem, 0.6vw, 0.55rem);
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        .meta-item .meta-value {
            font-size: clamp(0.65rem, 0.9vw, 0.8rem);
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #fff, #c8c8e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .meta-item .meta-value.glow {
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .screenshot-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 8px 2px 12px;
            margin-top: 14px;
            scrollbar-width: thin;
            scrollbar-color: var(--accent2) transparent;
            -webkit-overflow-scrolling: touch;
        }
        .screenshot-scroll::-webkit-scrollbar {
            height: 3px;
        }
        .screenshot-scroll::-webkit-scrollbar-thumb {
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 10px;
        }
        .screenshot-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .screenshot-scroll img {
            flex: 0 0 auto;
            width: clamp(100px, 18vw, 140px);
            height: clamp(140px, 26vw, 210px);
            object-fit: cover;
            border-radius: 16px;
            cursor: pointer;
            transition: all var(--transition);
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }
        .screenshot-scroll img:hover {
            transform: scale(1.04) translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3), 0 0 20px rgba(168, 127, 255, 0.04);
            border-color: rgba(168, 127, 255, 0.1);
        }

        .lightbox-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
            animation: fadeIn 0.3s ease;
            padding: 20px;
        }
        .lightbox-overlay .lightbox-close {
            position: absolute;
            top: 20px;
            right: 24px;
            font-size: 1.8rem;
            color: #fff;
            cursor: pointer;
            transition: var(--transition);
            background: none;
            border: none;
            opacity: 0.5;
            z-index: 301;
        }
        .lightbox-overlay .lightbox-close:hover {
            opacity: 1;
            transform: rotate(90deg) scale(1.1);
        }
        .lightbox-overlay img {
            max-width: 92vw;
            max-height: 88vh;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            object-fit: contain;
            animation: zoomIn 0.35s ease;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @keyframes zoomIn {
            from {
                transform: scale(0.92);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .tags-container {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .tag-badge {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: var(--text-secondary);
            padding: 3px 14px;
            border-radius: var(--radius-full);
            font-size: clamp(0.55rem, 0.8vw, 0.65rem);
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: var(--transition);
        }
        .tag-badge i {
            color: var(--accent2);
            font-size: 0.5rem;
        }
        .tag-badge:hover {
            background: rgba(168, 127, 255, 0.06);
            border-color: rgba(168, 127, 255, 0.08);
            color: #fff;
        }

        .big-download {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background: var(--gradient-primary);
            border: none;
            color: #04040e;
            font-weight: 800;
            font-size: clamp(0.95rem, 1.8vw, 1.1rem);
            padding: 14px 20px;
            border-radius: 20px;
            margin: 18px 0 0;
            cursor: pointer;
            transition: all var(--transition);
            text-align: center;
            box-shadow: 0 4px 24px rgba(62, 224, 255, 0.15);
            position: relative;
            overflow: hidden;
        }
        .big-download::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), transparent);
            pointer-events: none;
        }
        .big-download:hover {
            transform: scale(1.02) translateY(-2px);
            box-shadow: 0 8px 40px rgba(62, 224, 255, 0.2);
        }
        .big-download:active {
            transform: scale(0.97);
        }
        .big-download i {
            font-size: 1.1rem;
        }
        .big-download.disabled {
            opacity: 0.3;
            pointer-events: none;
            background: var(--surface);
            color: var(--text);
            box-shadow: none;
        }
        .big-download.counting {
            opacity: 0.6;
            pointer-events: none;
            background: var(--surface);
            color: var(--text);
            box-shadow: none;
        }

        .content-box {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: var(--radius);
            padding: clamp(16px, 2.5vw, 28px);
            line-height: 1.9;
            box-shadow: var(--shadow-card);
            white-space: pre-line;
            color: #e0e0ee;
            font-size: clamp(0.85rem, 1.2vw, 0.95rem);
        }
        .content-box h1,
        .content-box h2,
        .content-box h3 {
            color: #fff;
            margin: 1em 0 0.4em;
            font-weight: 800;
            letter-spacing: -0.3px;
        }
        .content-box h1 {
            font-size: 1.5rem;
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .content-box h2 {
            font-size: 1.2rem;
            color: var(--accent2);
        }
        .content-box h3 {
            font-size: 1rem;
        }
        .content-box p {
            margin: 0.6em 0;
        }
        .content-box ul,
        .content-box ol {
            padding-left: 1.5rem;
            margin: 0.4em 0;
        }
        .content-box li {
            margin: 0.2em 0;
        }
        .content-box a {
            color: var(--accent2);
            text-decoration: none;
            border-bottom: 1px dotted var(--accent2);
            transition: var(--transition);
        }
        .content-box a:hover {
            border-bottom: 1px solid var(--accent2);
            color: #fff;
        }
        .content-box img {
            max-width: 100%;
            border-radius: 16px;
            margin: 14px 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.02);
        }
        .content-box pre {
            background: #0a0a1a;
            padding: 16px;
            border-radius: 16px;
            overflow-x: auto;
            white-space: pre;
            font-size: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.02);
            margin: 12px 0;
            color: #c8c8d8;
        }
        .content-box code {
            background: rgba(255, 255, 255, 0.03);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.85em;
            color: #cfc4ff;
        }
        .content-box blockquote {
            border-left: 3px solid var(--accent2);
            padding: 8px 20px;
            margin: 12px 0;
            background: rgba(62, 224, 255, 0.02);
            border-radius: 0 12px 12px 0;
            color: #c8c8e0;
            font-style: italic;
        }
        .back-btn {
            background: none;
            border: none;
            color: var(--accent2);
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
            cursor: pointer;
            font-size: clamp(0.8rem, 1.2vw, 0.9rem);
            padding: 6px 16px 6px 12px;
            border-radius: var(--radius-full);
            background: rgba(62, 224, 255, 0.03);
            border: 1px solid rgba(62, 224, 255, 0.04);
            transition: var(--transition);
        }
        .back-btn:hover {
            transform: translateX(-4px);
            background: rgba(62, 224, 255, 0.06);
            border-color: rgba(62, 224, 255, 0.08);
        }

        /* ============================================================
           PROFILE
           ============================================================ */
        .profile-card {
            background: var(--surface);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: var(--radius);
            padding: 24px 20px 18px;
            box-shadow: var(--shadow-premium);
            max-width: 560px;
            margin: 0 auto;
        }
        .profile-container {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .profile-avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            position: relative;
            background-clip: padding-box;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            flex-shrink: 0;
        }
        .profile-avatar::before {
            content: '';
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            background: var(--gradient-primary);
            z-index: -1;
            opacity: 0.5;
        }
        .profile-info {
            flex: 1;
            min-width: 140px;
        }
        .profile-name {
            font-size: 1.4rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.3px;
        }
        .profile-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 2px;
        }
        .badge-verified {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(79, 172, 254, 0.08);
            border: 1px solid rgba(79, 172, 254, 0.08);
            padding: 1px 12px;
            border-radius: var(--radius-full);
            font-size: 0.6rem;
            font-weight: 600;
            color: #4facfe;
        }
        .badge-verified i {
            font-size: 0.6rem;
        }
        .profile-bio {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .profile-bio i {
            color: var(--accent2);
            margin-right: 4px;
        }
        .profile-links {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 12px;
            justify-content: center;
            padding-top: 14px;
            margin-top: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
        }
        .link-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .social-link {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 4px 14px;
            border-radius: var(--radius-full);
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.72rem;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .social-link:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
        }
        .social-link[data-brand="facebook"]:hover {
            background: rgba(24, 119, 242, 0.08);
            border-color: #1877f2;
            color: #fff;
        }
        .social-link[data-brand="telegram"]:hover {
            background: rgba(0, 136, 204, 0.08);
            border-color: #0088cc;
            color: #fff;
        }
        .social-link[data-brand="saweria"]:hover {
            background: rgba(255, 165, 0, 0.08);
            border-color: #ffa500;
            color: #fff;
        }
        .social-link[data-brand="qris"]:hover {
            background: rgba(62, 224, 255, 0.08);
            border-color: var(--accent2);
            color: #fff;
        }
        .profile-footer {
            margin-top: 14px;
            text-align: center;
            font-size: 0.78rem;
            color: var(--text-muted);
            border-top: 1px solid rgba(255, 255, 255, 0.02);
            padding-top: 12px;
        }
        .profile-footer .location {
            margin-top: 2px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        /* ============================================================
           REKOMENDASI
           ============================================================ */
        .rekomendasi-section {
            margin-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            padding-top: 20px;
        }
        .rekomendasi-title {
            font-weight: 700;
            font-size: clamp(0.95rem, 1.6vw, 1.1rem);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .rekomendasi-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .rekomendasi-card {
            background: var(--surface2);
            border: 1px solid rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            flex-direction: column;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        }
        .rekomendasi-card:hover {
            transform: translateY(-4px);
            border-color: rgba(168, 127, 255, 0.08);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2), 0 0 20px rgba(168, 127, 255, 0.02);
        }
        .rekomendasi-card .card-img {
            height: clamp(80px, 16vw, 110px);
        }
        .rekomendasi-card .card-body {
            padding: 8px 12px 10px;
        }
        .rekomendasi-card .card-title {
            font-size: clamp(0.65rem, 1vw, 0.75rem);
        }
        .rekomendasi-card .card-meta {
            font-size: clamp(0.45rem, 0.6vw, 0.55rem);
        }
        .rekomendasi-card .badge {
            font-size: clamp(0.4rem, 0.5vw, 0.5rem);
            padding: 1px 8px;
        }

        /* ============================================================
           QRIS OVERLAY
           ============================================================ */
        .qris-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            z-index: 250;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .qris-overlay.hidden {
            display: none;
        }
        .qris-container {
            background: var(--surface2);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: var(--radius);
            padding: 20px;
            text-align: center;
            max-width: 320px;
            width: 90%;
            box-shadow: var(--shadow-premium);
        }
        .qris-container img {
            width: 100%;
            border-radius: 16px;
            margin-bottom: 12px;
