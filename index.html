    <style>
        /* ============================================================
           ROOT VARIABLES
           ============================================================ */
        :root {
            --bg: #04040e;
            --surface: rgba(15, 15, 30, 0.7);
            --surface2: rgba(25, 25, 45, 0.8);
            --border: rgba(255, 255, 255, 0.07);
            --text: #f5f5ff;
            --text2: #b8b8d0;
            --accent: #a87fff;
            --accent2: #3ee0ff;
            --grad1: linear-gradient(135deg, #a87fff, #3ee0ff);
            --radius: 28px;
            --radius-sm: 20px;
            --nav-height: 76px;
            --safe-bottom: env(safe-area-inset-bottom, 16px);
            --shadow-card: 0 16px 48px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.06);
            --glow: 0 0 60px rgba(168, 127, 255, 0.4);
            --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --topbar-height: 76px;
            --profile-top-offset: 20px;
        }

        /* ============================================================
           RESET & BASE
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            padding-bottom: calc(var(--nav-height) + var(--safe-bottom) + 16px);
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            position: relative;
        }
        canvas#particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.7;
        }

        /* ============================================================
           CONTAINER
           ============================================================ */
        .container {
            max-width: 820px;
            margin: 0 auto;
            padding: 12px 16px;
            position: relative;
            z-index: 2;
        }

        /* ============================================================
           TOPBAR
           ============================================================ */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 18px;
            background: rgba(12, 12, 25, 0.65);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 34px;
            margin: 12px auto;
            max-width: 700px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.7);
            position: sticky;
            top: 14px;
            z-index: 99;
            gap: 8px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .logo-img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(168, 127, 255, 0.4);
        }
        .logo-text {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 1.3rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #c084fc, #60a5fa, #34d399);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease infinite alternate;
            white-space: nowrap;
        }
        @keyframes gradientShift {
            0% {
                background-position: 0% center;
            }
            100% {
                background-position: 100% center;
            }
        }
        .telegram-wrapper {
            position: relative;
            flex-shrink: 0;
        }
        .telegram-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--accent2);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
            backdrop-filter: blur(16px);
            white-space: nowrap;
        }
        .telegram-btn:hover {
            border-color: var(--accent2);
            box-shadow: 0 0 25px rgba(62, 224, 255, 0.4);
            background: rgba(62, 224, 255, 0.1);
        }
        .telegram-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            background: var(--surface);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px;
            min-width: 160px;
            display: none;
            flex-direction: column;
            gap: 4px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.8);
            z-index: 150;
        }
        .telegram-dropdown.show {
            display: flex;
        }
        .telegram-dropdown a {
            color: var(--text);
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 14px;
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }
        .telegram-dropdown a:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }
        .telegram-dropdown a i {
            width: 18px;
            text-align: center;
        }

        /* ============================================================
           SEARCH
           ============================================================ */
        .search-container {
            margin: 8px 0 16px;
            display: flex;
            gap: 8px;
        }
        .search-input {
            flex: 1;
            background: var(--surface);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 10px 18px;
            color: #fff;
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            transition: var(--transition);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
            width: 100%;
        }
        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(168, 127, 255, 0.5);
        }
        .search-input::placeholder {
            color: var(--text2);
        }

        /* ============================================================
           CATEGORY BAR
           ============================================================ */
        .category-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
            align-items: center;
        }
        .category-chip {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 5px 12px;
            border-radius: 20px;
            color: var(--text2);
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(10px);
            white-space: nowrap;
        }
        .category-chip i {
            margin-right: 4px;
        }
        .category-chip.active,
        .category-chip:hover {
            background: rgba(168, 127, 255, 0.2);
            border-color: var(--accent);
            color: #fff;
        }
        .reset-filter {
            background: none;
            border: none;
            color: var(--accent2);
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            padding: 5px 10px;
        }
        .reset-filter i {
            margin-right: 4px;
        }

        /* ============================================================
           SORT BAR — jarak diperbesar dari carousel
           ============================================================ */
        .sort-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 18px;
            /* jarak dari carousel */
            margin-bottom: 4px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        .sort-label {
            color: var(--text2);
            font-size: 0.7rem;
            font-weight: 500;
        }
        .sort-select {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 12px;
            color: #fff;
            font-size: 0.7rem;
            font-family: inherit;
            outline: none;
            cursor: pointer;
            transition: var(--transition);
        }
        .sort-select:hover {
            border-color: var(--accent2);
        }

        /* ============================================================
           CAROUSEL
           ============================================================ */
        .popular-section {
            margin-bottom: 0;
        }
        .carousel-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: var(--radius-sm);
            background: var(--surface);
            backdrop-filter: blur(22px);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-card);
            height: 180px;
        }
        @media (min-width: 500px) {
            .carousel-wrapper {
                height: 220px;
            }
        }
        @media (min-width: 768px) {
            .carousel-wrapper {
                height: 260px;
            }
        }
        .carousel-track {
            display: flex;
            height: 100%;
            position: relative;
        }
        .carousel-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
        }
        .carousel-slide.active {
            opacity: 1;
            z-index: 1;
        }
        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }
        .carousel-slide .slide-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px 16px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .carousel-slide .slide-title {
            font-weight: 800;
            font-size: 0.9rem;
            line-height: 1.3;
        }
        @media (min-width: 500px) {
            .carousel-slide .slide-title {
                font-size: 1rem;
            }
        }
        .carousel-title-top {
            position: absolute;
            top: 12px;
            left: 14px;
            font-size: 0.7rem;
            font-weight: 700;
            color: #fff;
            z-index: 5;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            padding: 4px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
        }
        @media (min-width: 500px) {
            .carousel-title-top {
                font-size: 0.8rem;
                padding: 5px 14px;
            }
        }
        .carousel-counter {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(6px);
            color: #fff;
            padding: 3px 10px;
            border-radius: 14px;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        @media (min-width: 500px) {
            .carousel-counter {
                font-size: 0.75rem;
                padding: 4px 12px;
            }
        }

        /* ============================================================
           POST GRID
           ============================================================ */
        .post-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
            margin-top: 2px;
        }
        @media (min-width: 420px) {
            .post-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }
        }
        @media (min-width: 768px) {
            .post-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 18px;
            }
        }
        @media (min-width: 1024px) {
            .post-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
            }
        }

        .post-card {
            background: var(--surface);
            backdrop-filter: blur(22px);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.45s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
            transform: translateY(25px);
        }
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .post-card:hover {
            transform: translateY(-6px) scale(1.01);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: var(--glow), 0 25px 50px rgba(0, 0, 0, 0.9);
        }
        .post-card:active {
            transform: scale(0.97);
        }
        .card-img {
            width: 100%;
            height: 130px;
            object-fit: cover;
            background: linear-gradient(135deg, #1e1e35, #10101c);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text2);
            font-size: 2.5rem;
            position: relative;
            overflow: hidden;
        }
        @media (min-width: 420px) {
            .card-img {
                height: 140px;
            }
        }
        @media (min-width: 768px) {
            .card-img {
                height: 160px;
            }
        }
        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .card-img .placeholder-icon {
            display: none;
            font-size: 2.5rem;
        }
        .card-img.error .placeholder-icon {
            display: block;
        }
        .card-img.error img {
            display: none;
        }
        .version-badge-img {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            color: #fff;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.6rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            z-index: 2;
        }
        @media (min-width: 500px) {
            .version-badge-img {
                font-size: 0.65rem;
                padding: 3px 10px;
            }
        }
        .card-body {
            padding: 12px 14px 14px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .card-title {
            font-weight: 800;
            font-size: 0.8rem;
            line-height: 1.3;
            color: #fff;
        }
        @media (min-width: 500px) {
            .card-title {
                font-size: 0.85rem;
            }
        }
        .card-meta {
            font-size: 0.65rem;
            color: var(--text2);
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .badge {
            background: rgba(168, 127, 255, 0.2);
            color: #cfc4ff;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.6rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .badge:hover {
            background: rgba(168, 127, 255, 0.4);
            color: #fff;
        }

        /* 🔥 BADGE PREMIUM / VIP / NO ADS / UNLOCKED di kartu post */
        .badge-premium {

            .badge-premium,
            .badge-vip,
            .badge-noads,

        .card-excerpt {
            font-size: 0.68rem;
            color: var(--text2);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ============================================================
           LOAD MORE

        .load-more-btn {
            display: block;
            margin: 20px auto 0;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--accent2);

            border-radius: 30px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(16px);
        }
        .load-more-btn:hover {

            box-shadow: 0 0 25px rgba(62, 224, 255, 0.4);
            background: rgba(62, 224, 255, 0.1);
        }

        /* ============================================================
           HIDDEN
           ============================================================ */
        .hidden {

        }

        /* ============================================================
           DETAIL PAGE
           ============================================================ */
        .detail-header,
        .profile-card {
            background: var(--surface);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-card);

                    var cached = localStorage.getItem(ipCacheKey);
                    if (cached) {
                        var data = JSON.parse(cached);
                        if (Date.now() - data.t < ipCacheExpiry) {
                            return data.ip;
                        }
                    }
                } catch (_) {}
                try {
                    var controller = new AbortController();
                    var timeout = setTimeout(function() { controller.abort(); }, 2000);
                    var res = await fetch('https://api.ipify.org?format=json', { signal: controller.signal });
                    clearTimeout(timeout);

                        var ip = data.ip || null;
                        if (ip) {

            var canvas = document.getElementById('particles');
            var ctx = canvas.getContext('2d');
            var particles = [];
            var maxParticles = 70;

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            function Particle() { this.reset(); }
            Particle.prototype.reset = function() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.radius = Math.random() * 2.5 + 1;
                this.opacity = Math.random() * 0.5 + 0.2;
            };
            Particle.prototype.update = function() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            };
            Particle.prototype.draw = function() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(168,127,255,' + this.opacity + ')';
                ctx.fill();
            };
            for (var i = 0; i < maxParticles; i++) particles.push(new Particle());

            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(function(p) { p.update();
                    p.draw(); });
                requestAnimationFrame(animateParticles);
            }
            animateParticles();

            // ============================================================
            // COUNTER PER POSTINGAN (CountAPI) dengan parameter increment
            // ============================================================
            async function getPostViewCount(postName, increment) {
                if (increment === undefined) increment = true;
                var storageKey = 'view_' + postName.replace(/[^a-zA-Z0-9]/g, '_');
                var today = new Date().toISOString().slice(0, 10);
                var key = 'destaseomods-' + postName.replace(/[^a-zA-Z0-9]/g, '-');

                var localData = null;
                try {
                    var raw = localStorage.getItem(storageKey);
                    if (raw) localData = JSON.parse(raw);
                } catch (_) {}

                if (!increment && localData) {
                    return localData.count;
                }

                if (increment && (!localData || localData.date !== today)) {
                    try {
                        var res = await fetch('https://countapi.mileshilliard.com/api/v1/hit/' + key);
                        if (res.ok) {
                            var data = await res.json();
                            var count = data.value || 0;
                            localStorage.setItem(storageKey, JSON.stringify({ count: count, date: today }));
                            return count;
                        }
                    } catch (e) { /* fallback */ }
                    var prev = localData ? localData.count : 0;
                    var count = prev + 1;
                    localStorage.setItem(storageKey, JSON.stringify({ count: count, date: today }));
                    return count;
                }

                if (!increment && !localData) {
                    try {
                        var res = await fetch('https://countapi.mileshilliard.com/api/v1/get/' + key);
                        if (res.ok) {
                            var data = await res.json();
                            var count = data.value || 0;
                            localStorage.setItem(storageKey, JSON.stringify({ count: count, date: today }));
                            return count;
                        }
                    } catch (e) { /* fallback */ }
                    return 0;
                }

                return localData ? localData.count : 0;
            }

                var prevCount = (localData && typeof localData.count === 'number') ? localData.count : 0;
                var newCount = prevCount + 1;
                localStorage.setItem(storageKey, JSON.stringify({ count: newCount, date: today }));
                return newCount;
            }

            // ============================================================
            // REKOMENDASI
            // ============================================================
            function getRecommendations(currentPost, limit) {
                if (limit === undefined) limit = 4;
                if (!fetchedPosts || fetchedPosts.length === 0) return [];
                var others = fetchedPosts.filter(function(p) { return p.name !== currentPost.name; });
                if (others.length === 0) return [];
                var currentCategory = currentPost.metadata.kategori || '';
                var sameCategory = others.filter(function(p) {
                    var cat = p.metadata.kategori || '';
                    return cat === currentCategory && cat !== '';
                });
                var differentCategory = others.filter(function(p) {
                    var cat = p.metadata.kategori || '';
                    return cat !== currentCategory || cat === '';
                });
                var shuffle = function(arr) { return arr.sort(function() { return Math.random() - 0.5; }); };
                var combined = shuffle(sameCategory).concat(shuffle(differentCategory));
                return combined.slice(0, limit);
            }

            function getRoute() {
                var path = window.location.pathname;
                if (path === '/' || path === '/index.html') {
                    return { page: 'home' };
                }
                var detailMatch = path.match(/^\/detail\/(.+)$/);
                if (detailMatch) {
                    return { page: 'detail', postName: decodeURIComponent(detailMatch[1]) };
                }
                if (path === '/search') return { page: 'search' };
                if (path === '/profile') return { page: 'profile' };
                return { page: 'home' };
            }

            function navigateTo(page, postName) {
                var url;
                if (page === 'home') url = '/';
                else if (page === 'search') url = '/search';
                else if (page === 'profile') url = '/profile';
                else if (page === 'detail' && postName) url = '/detail/' + encodeURIComponent(postName);
                else url = '/';

                if (window.location.pathname !== url) {
                    window.history.pushState({ page: page, postName: postName }, '', url);
                }
                renderPage(page, postName);
            }

                if (page === 'home') {

                    var p = i.dataset.page;
                    var isActive = (p === page) || (page === 'detail' && p === 'home');
                    i.classList.toggle('active', isActive);
                });

            // ============================================================

            function getCachedList() {
                var raw = localStorage.getItem(CACHE_KEY_LIST);
                if (!raw) return null;
                try {
                    var data = JSON.parse(raw);
                    if (Date.now() - data.t < CACHE_TIME_LIST) {
                        return data.posts;
                    }
                    return null;
                } catch (e) { return null; }
            }

            function getCachedListFallback() {
                var raw = localStorage.getItem(CACHE_KEY_LIST);
                if (!raw) return null;
                try {
                    var data = JSON.parse(raw);
                    return data.posts;
                } catch (e) { return null; }
            }

            function setCachedList(posts) {
                localStorage.setItem(CACHE_KEY_LIST, JSON.stringify({ t: Date.now(), posts: posts }));
            }

            function getCachedContent(postName) {
                var key = CACHE_KEY_CONTENT_PREFIX + postName;
                var raw = localStorage.getItem(key);
                if (!raw) return null;
                try {
                    var data = JSON.parse(raw);
                    if (Date.now() - data.t < CACHE_TIME_CONTENT) {
                        return data.content;
                    }
                    return null;
                } catch (e) { return null; }
            }

            function getCachedContentFallback(postName) {
                var key = CACHE_KEY_CONTENT_PREFIX + postName;
                var raw = localStorage.getItem(key);
                if (!raw) return null;
                try {
                    var data = JSON.parse(raw);
                    return data.content;
                } catch (e) { return null; }
            }

            function setCachedContent(postName, content) {
                var key = CACHE_KEY_CONTENT_PREFIX + postName;
                localStorage.setItem(key, JSON.stringify({ t: Date.now(), content: content }));
            }

            async function fetchPostList() {
                var cached = getCachedList();
                if (cached) { postsData = cached; return; }

                var apiUrl = 'https://api.github.com/repos/' + GITHUB_REPO + '/contents/posts';
                try {
                    var res = await fetch(apiUrl);
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    var files = await res.json();
                    var mdFiles = files.filter(function(f) { return f.name.endsWith('.md'); });
                    if (!mdFiles.length) throw new Error('Tidak ada file .md');
                    postsData = mdFiles.map(function(f) { return { filename: f.name, name: f.name.replace('.md', ''),
                            download_url: f.download_url }; });
                    setCachedList(postsData);
                } catch (err) {
                    var fallback = getCachedListFallback();
                    if (fallback && fallback.length) {
                        console.warn('⚠️ Gagal fetch list, pakai cache fallback.');
                        postsData = fallback;
                        return;
                    }
                    throw new Error('Gagal mengambil daftar postingan dan tidak ada cache.');
                }
            }

            function parseFrontmatter(md) {
                var m = md.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
                if (!m) return { metadata: {}, content: md };
                var meta = {};
                m[1].split('\n').forEach(function(line) {
                    var i = line.indexOf(':');
                    if (i > 0) meta[line.slice(0, i).trim()] = line.slice(i + 1).trim().replace(/^["']|["']$/g,
                        '');
                });
                return { metadata: meta, content: m[2] };
            }

            async function fetchPost(p) {
                var cachedContent = getCachedContent(p.name);
                if (cachedContent) {
                    var parsed = parseFrontmatter(cachedContent);
                    var html = marked.parse(parsed.content);
                    return { name: p.name, metadata: parsed.metadata, content: parsed.content, html: html,
                        lastModified: null, fromCache: true };
                }

                if (!p.download_url) {
                    var fallbackContent = getCachedContentFallback(p.name);
                    if (fallbackContent) {
                        var parsed2 = parseFrontmatter(fallbackContent);
                        var html2 = marked.parse(parsed2.content);
                        return { name: p.name, metadata: parsed2.metadata, content: parsed2.content, html: html2,
                            lastModified: null, fromCache: true };
                    }
                    return { name: p.name, metadata: {}, content: '', html: '<p>Konten tidak tersedia.</p>',
                        lastModified: null };
                }

                try {
                    var r = await fetch(p.download_url);
                    if (!r.ok) throw new Error('fail');
                    var md = await r.text();
                    setCachedContent(p.name, md);
                    var parsed3 = parseFrontmatter(md);
                    var html3 = marked.parse(parsed3.content);
                    var lastModified = r.headers.get('Last-Modified');
                    return { name: p.name, metadata: parsed3.metadata, content: parsed3.content, html: html3,
                        lastModified: lastModified, fromCache: false };
                } catch (err) {
                    var fallbackContent2 = getCachedContentFallback(p.name);
                    if (fallbackContent2) {
                        var parsed4 = parseFrontmatter(fallbackContent2);
                        var html4 = marked.parse(parsed4.content);
                        return { name: p.name, metadata: parsed4.metadata, content: parsed4.content, html: html4,
                            lastModified: null, fromCache: true };
                    }
                    return { name: p.name, metadata: {}, content: '', html: '<p>Gagal memuat konten.</p>',
                        lastModified: null };
                }
            }

            function fixImageUrl(url) {
                if (!url) return '';
                if (url.includes('github.com') && !url.includes('raw.githubusercontent.com')) {
                    url = url.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
                }
                return url;
            }

            function getExcerpt(c) {
                if (!c) return '';
                var t = c.replace(/[#*`>\[\]()!|]/g, '').replace(/\n/g, ' ').trim();
                if (t.length > 80) t = t.slice(0, 80) + '...';
                return t;
            }

            function formatDate(d) {
                if (!d) return '';
                var dt = new Date(d);
                if (isNaN(dt.getTime())) return '';
                var m = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
                return dt.getDate() + ' ' + m[dt.getMonth()] + ' ' + dt.getFullYear();
            }

            // ============================================================
            function getAllKategori() {
                var k = new Set();
                fetchedPosts.forEach(function(p) {

                    if (kat) k.add(kat);
                });

            function renderCategoryBar() {

                kats.forEach(function(kat) {

                categoryBar.innerHTML = html;

            function getFilteredPosts() {
                var q = searchInput.value.trim().toLowerCase();
                var f = fetchedPosts;
                if (activeKatFilter) f = f.filter(function(p) { return (p.metadata.kategori || '') === activeKatFilter; });
                if (q) f = f.filter(function(p) {
                    var t = (p.metadata.judul || p.metadata.title || p.name).toLowerCase();
                    return t.includes(q);
                });
                return f;
            }

            function sortPosts(posts) {
                var sortBy = sortSelect.value;
                var sorted = posts.slice();
                var getTime = function(p) {
                    var d = p.metadata.tanggal || p.metadata.date || p.lastModified;
                    if (!d) return 0;
                    var t = new Date(d);
                    return isNaN(t.getTime()) ? 0 : t.getTime();
                };
                switch (sortBy) {
                    case 'terbaru':
                        sorted.sort(function(a, b) { return getTime(b) - getTime(a); });
                        break;
                    case 'terlama':
                        sorted.sort(function(a, b) { return getTime(a) - getTime(b); });
                        break;
                    case 'az':
                        sorted.sort(function(a, b) {
                            var tA = (a.metadata.judul || a.metadata.title || a.name || '').toLowerCase();
                            var tB = (b.metadata.judul || b.metadata.title || b.name || '').toLowerCase();
                            return tA.localeCompare(tB);
                        });
                        break;
                    case 'za':
                        sorted.sort(function(a, b) {
                            var tA = (a.metadata.judul || a.metadata.title || a.name || '').toLowerCase();
                            var tB = (b.metadata.judul || b.metadata.title || b.name || '').toLowerCase();
                            return tB.localeCompare(tA);
                        });
                        break;
                }
                return sorted;
            }

            function resetAndApplyFilters() {
                currentDisplayCount = 0;
                applyFilters();

            function applyFilters() {
                var filtered = getFilteredPosts();
                filtered = sortPosts(filtered);
                if (activeKatFilter) {
                    filterIndicator.classList.remove('hidden');
                    filterIndicator.innerHTML =
                        '<i class="fas fa-filter"></i> Kategori: <strong>' + activeKatFilter + '</strong> (' +
                        filtered.length + ' hasil)';

                currentDisplayCount = Math.min(ITEMS_PER_PAGE, filtered.length);
                displayPosts(filtered.slice(0, currentDisplayCount));
                renderLoadMoreButton(filtered.length);
            }

            function displayPosts(posts) {
                postContainer.innerHTML = posts.length ? posts.map(function(p, i) { return cardHTML(p, i); }).join('') :
                    '<div class="empty-text">🔍 Tidak ada postingan yang cocok.</div>';

            function renderLoadMoreButton(t) {

                } else {
                    loadMoreContainer.innerHTML = '';

            function loadMorePosts() {
                var f = getFilteredPosts();
                f = sortPosts(f);
                var n = Math.min(currentDisplayCount + ITEMS_PER_PAGE, f.length);
                var newPosts = f.slice(currentDisplayCount, n);
                currentDisplayCount = n;
                newPosts.forEach(function(p, i) {
                    var card = cardHTML(p, i);
                    postContainer.insertAdjacentHTML('beforeend', card);
                });
                attachCardEvents();
                renderLoadMoreButton(f.length);

            function cardHTML(post, index) {
                var t = post.metadata.judul || post.metadata.title || post.name.replace(/[-_]/g, ' ');
                var img = fixImageUrl(post.metadata.gambar || post.metadata.image || '');
                var kategori = post.metadata.kategori || '';
                var ver = post.metadata.versi || post.metadata.version || '';
                var excerpt = getExcerpt(post.content);
                var delay = index * 0.04 + 's';

                var badges = [];
                if (post.metadata.badges) {
                    if (Array.isArray(post.metadata.badges)) {
                        badges = post.metadata.badges;
                    } else {
                        badges = post.metadata.badges.split(',').map(function(b) { return b.trim(); }).filter(function(b) {
                            return b.length > 0; });
                    }
                }

                function getBadgeHTML(badgeText) {
                    var text = badgeText.trim();
                    var lower = text.toLowerCase();
                    var className = 'badge-custom';
                    var icon = 'fa-tag';
                    if (lower === 'premium') { className = 'badge-premium';
                        icon = 'fa-crown'; } else if (lower === 'vip') { className = 'badge-vip';
                        icon = 'fa-star'; } else if (lower === 'no ads' || lower === 'noads' || lower ===
                        'tanpa iklan' || lower === 'no iklan') { className = 'badge-noads';
                        icon = 'fa-ban'; } else if (lower === 'unlocked' || lower === 'unlock') { className =
                            'badge-unlocked';
                        icon = 'fa-unlock'; }
                    return '<span class="' + className + '"><i class="fas ' + icon + '"></i> ' + text + '</span>';
                }

                var badgesHtml = badges.map(getBadgeHTML).join('');

                var imgTag = img ?
                    '<img src="' + img + '" alt="' + t + '" loading="lazy" onerror="this.parentElement.classList.add(\'error\')">' :
                    '';
                var versionBadge = ver ? '<span class="version-badge-img"><i class="fas fa-code-branch"></i> v' + ver +
                    '</span>' :
                    '';

                return '<div class="post-card" data-name="' + post.name + '" style="animation-delay:' + delay + ';">' +
                    '<div class="card-img' + (img ? '' : ' error') + '">' + imgTag +
                    '<span class="placeholder-icon"><i class="fas fa-box-open"></i></span>' + versionBadge + '</div>' +
                    '<div class="card-body">' +
                    '<div class="card-title">' + t + '</div>' +
                    '<div class="card-meta">' +
                    (kategori ? '<span class="badge" data-kat="' + kategori + '" role="button"><i class="fas fa-folder"></i> ' +
                        kategori + '</span>' : '') +
                    badgesHtml +
                    '</div>' +
                    (excerpt ? '<p class="card-excerpt">' + excerpt + '</p>' : '') +
                    '</div>' +
                    '</div>';
            }

            function stopCarousel() {
                if (carouselInterval) { clearInterval(carouselInterval);
                    carouselInterval = null; }

            function startCarousel() {
                stopCarousel();
                if (totalPopularSlides === 0) return;
                updateCarousel(0);
                carouselInterval = setInterval(function() {
                    currentSlide = (currentSlide + 1) % totalPopularSlides;
                    updateCarousel(currentSlide);
                }, 4000);
            }

            function updateCarousel(i) {
                var slides = document.querySelectorAll('.carousel-slide');
                slides.forEach(function(s, idx) { s.classList.toggle('active', idx === i); });
                document.querySelectorAll('.carousel-counter').forEach(function(c, idx) {
                    c.textContent = (i + 1) + '/' + totalPopularSlides;
                });
            }

            function renderPopularSection() {
                if (!topPopularPosts.length) {
                    carouselTrack.innerHTML = '';
                    totalPopularSlides = 0;
                    return;
                }
                var pop = topPopularPosts.slice(0, 4);
                totalPopularSlides = pop.length;
                carouselTrack.innerHTML = pop.map(function(p, i) {
                    var img = fixImageUrl(p.metadata.gambar || p.metadata.image || '');
                    var title = p.metadata.judul || p.metadata.title || p.name.replace(/[-_]/g, ' ');
                    return '<div class="carousel-slide' + (i === 0 ? ' active' : '') + '" data-name="' + p.name +
                        '">' + (img ? '<img src="' + img + '" alt="' + title +
                        '" loading="lazy" onerror="this.style.display=\'none\'">' : '') +
                        '<div class="slide-overlay"><div class="slide-title">' + title +
                        '</div><span class="carousel-counter">' + (i + 1) + '/' + pop.length + '</span></div></div>';
                }).join('');
                document.querySelectorAll('.carousel-slide').forEach(function(s) {
                    s.addEventListener('click', function() {
                        var name = this.dataset.name;

                    });
                });

            async function sortPostsByView() {
                var viewPromises = fetchedPosts.map(function(p) { return getPostViewCount(p.name, false); });
                var views = await Promise.all(viewPromises);
                var postsWithViews = fetchedPosts.map(function(p, i) { var o = Object.assign({}, p);
                    o.viewCount = views[i] || 0; return o; });
                postsWithViews.sort(function(a, b) { return (b.viewCount || 0) - (a.viewCount || 0); });

                var hasViewData = postsWithViews.some(function(p) { return p.viewCount > 0; });
                if (!hasViewData) {
                    var fallback = fetchedPosts.filter(function(p) { return p.metadata.populer && p.metadata.populer
                            .toLowerCase() === 'true'; });
                    if (fallback.length === 0) fallback = fetchedPosts.slice(0, 4);
                    topPopularPosts = fallback;
                } else {
                    topPopularPosts = postsWithViews;
                }
            }

                loadMoreContainer.innerHTML = '';

                stopCarousel();

                    await fetchPostList();
                    if (!postsData.length) {
                        postContainer.innerHTML = '<div class="empty-text"><i class="far fa-folder-open"></i> Tidak ada postingan.</div>';
                        return;
                    }
                    fetchedPosts = await Promise.all(postsData.map(function(p) { return fetchPost(p); }));
                    await sortPostsByView();
                    renderPopularSection();
                    renderCategoryBar();
                    resetAndApplyFilters();
                    startCarousel();
                    updateMetaTags('Destaseo Mods • Premium Mod APK', 'Situs download mod APK premium terbaik. Dapatkan aplikasi modifikasi terbaru gratis.', LOGO_URL, 'https://destaseomods.web.id/');
                } catch (err) {
                    postContainer.innerHTML = '<div class="error-text">⚠️ Gagal memuat data. Coba refresh halaman. <br><small>' +
                        err.message + '</small></div>';
                }
            }

            // ============================================================
            // SCREENSHOT GALLERY
            // ============================================================
            function buildScreenshotGallery(str) {
                if (!str) return '';
                var urls = str.split(',').map(function(u) { return fixImageUrl(u.trim()); }).filter(function(u) { return u
                        .length > 0; });
                if (urls.length === 0) return '';
                var lim = urls.slice(0, 10);
                var urlsAttr = urls.map(function(u) { return u.replace(/"/g, '&quot;'); }).join('|||');
                return '<div class="screenshot-scroll" data-all-urls="' + urlsAttr + '">' +
                    lim.map(function(u, i) { return '<img src="' + u +
                        '" alt="Screenshot" loading="lazy" onclick="event.stopPropagation(); openLightbox(this, ' + i +
                        ')">'; }).join('') +
                    '</div>';
            }

            window.openLightbox = function(imgEl, index) {
                var container = imgEl.closest('.screenshot-scroll');
                if (!container) return;
                var allUrlsStr = container.dataset.allUrls || '';
                if (!allUrlsStr) return;
                var allUrls = allUrlsStr.split('|||');
                if (allUrls.length === 0) return;
                var existing = document.querySelector('.lightbox');
                if (existing) existing.remove();

                var lb = document.createElement('div');
                lb.className = 'lightbox';
                lb.innerHTML = '' +
                    '<button class="lightbox-close" aria-label="Tutup"><i class="fas fa-times"></i></button>' +
                    '<button class="lightbox-prev" aria-label="Sebelumnya"><i class="fas fa-chevron-left"></i></button>' +
                    '<button class="lightbox-next" aria-label="Berikutnya"><i class="fas fa-chevron-right"></i></button>' +
                    '<img src="' + allUrls[index] + '" alt="Screenshot" />' +
                    '<div class="lightbox-counter">' + (index + 1) + ' / ' + allUrls.length + '</div>';
                document.body.appendChild(lb);

                var currentIndex = index;
                var img = lb.querySelector('img');
                var counter = lb.querySelector('.lightbox-counter');

                function updateImage(i) {
                    if (i < 0) i = allUrls.length - 1;
                    if (i >= allUrls.length) i = 0;
                    currentIndex = i;
                    img.src = allUrls[currentIndex];
                    counter.textContent = (currentIndex + 1) + ' / ' + allUrls.length;
                }

                lb.querySelector('.lightbox-close').addEventListener('click', function(e) { e.stopPropagation();
                    lb.remove(); });
                lb.querySelector('.lightbox-prev').addEventListener('click', function(e) { e.stopPropagation();
                    updateImage(currentIndex - 1); });
                lb.querySelector('.lightbox-next').addEventListener('click', function(e) { e.stopPropagation();
                    updateImage(currentIndex + 1); });

                lb.addEventListener('click', function(e) {
                    if (e.target === lb) lb.remove();
                });

                function keyHandler(e) {
                    if (e.key === 'Escape') { lb.remove();
                        document.removeEventListener('keydown', keyHandler); }
                    if (e.key === 'ArrowLeft') { e.preventDefault();
                        updateImage(currentIndex - 1); }
                    if (e.key === 'ArrowRight') { e.preventDefault();
                        updateImage(currentIndex + 1); }
                }
                document.addEventListener('keydown', keyHandler);

                var touchStartX = 0;
                lb.addEventListener('touchstart', function(e) {
                    touchStartX = e.changedTouches[0].screenX;
                }, { passive: true });
                lb.addEventListener('touchend', function(e) {
                    var diff = touchStartX - e.changedTouches[0].screenX;
                    if (Math.abs(diff) > 40) {
                        if (diff > 0) updateImage(currentIndex + 1);
                        else updateImage(currentIndex - 1);
                    }
                }, { passive: true });
            };

            // ============================================================
            // SITEMAP GENERATOR (PATH-BASED)
            // ============================================================
            async function generateSitemap() {
                if (window.location.search !== '?sitemap') return;
                var baseUrl = 'https://destaseomods.web.id';
                var urls = [baseUrl];
                try {
                    var apiUrl = 'https://api.github.com/repos/' + GITHUB_REPO + '/contents/posts';
                    var res = await fetch(apiUrl);
                    if (res.ok) {
                        var files = await res.json();
                        var mdFiles = files.filter(function(f) { return f.name.endsWith('.md'); });
                        mdFiles.forEach(function(f) {
                            var name = f.name.replace('.md', '');
                            urls.push(baseUrl + '/detail/' + encodeURIComponent(name));
                        });
                    }
                } catch (e) {}
                var sitemap = '<?xml version="1.0" encoding="UTF-8"?>\n' +
                    '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n' +
                    urls.map(function(u) { return '  <url><loc>' + u + '</loc><lastmod>' + new Date().toISOString()
                            .split('T')[0] + '</lastmod></url>'; }).join('\n') +
                    '\n</urlset>';
                document.body.innerHTML =
                    '<pre style="color:#fff;background:#111;padding:20px;font-family:monospace;">' + sitemap.replace(/</
                        g, '&lt;').replace(/>/g, '&gt;') + '</pre>';
                throw new Error('SITEMAP_DISPLAY');
            }

            // ============================================================
            // HANDLE POPSTATE
            // ============================================================
            window.addEventListener('popstate', function(e) {
                var route = getRoute();
                renderPage(route.page, route.postName);
            });

            // ============================================================
            // START APLIKASI
            // ============================================================
            async function init() {
                try {
                    await generateSitemap();
                } catch (e) {
                    if (e.message === 'SITEMAP_DISPLAY') return;
                }
                await renderHome();
                var route = getRoute();
                renderPage(route.page, route.postName);
            }

            init();
        })();
    </script>
