            let particles = []; const maxParticles = 70;
            function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            window.addEventListener('resize', resizeCanvas); resizeCanvas();
            class Particle {
                constructor() { this.reset(); }
                reset() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.vx = (Math.random() - 0.5) * 0.5; this.vy = (Math.random() - 0.5) * 0.5; this.radius = Math.random() * 2.5 + 1; this.opacity = Math.random() * 0.5 + 0.2; }
                update() { this.x += this.vx; this.y += this.vy; if (this.x < 0 || this.x > canvas.width) this.vx *= -1; if (this.y < 0 || this.y > canvas.height) this.vy *= -1; }
                draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fillStyle = `rgba(168,127,255,${this.opacity})`; ctx.fill(); }
            }
            for(let i=0; i<maxParticles; i++) particles.push(new Particle());
            function animateParticles() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animateParticles); }
            animateParticles();

            // ============================================================
            // VARIABEL GLOBAL
            // ============================================================
            const CACHE_KEY = 'destaseo_premium_cache_v69';
            const CACHE_TIME = 10 * 60 * 1000;
            const postContainer = document.getElementById('post-container');
            const carouselTrack = document.getElementById('carousel-track');
            const loadMoreContainer = document.getElementById('load-more-container');
            const homeSection = document.getElementById('home-section');
            const detailSection = document.getElementById('detail-section');
            const profileSection = document.getElementById('profile-section');
            const detailContent = document.getElementById('detail-content');
            const detailBack = document.getElementById('detail-back');
            const navItems = document.querySelectorAll('.nav-item');
            const searchBox = document.getElementById('search-box');
            const searchInput = document.getElementById('search-input');
            const categoryBar = document.getElementById('category-bar');
            const sortBar = document.getElementById('sort-bar');
            const sortSelect = document.getElementById('sort-select');
            const filterIndicator = document.getElementById('filter-indicator');
            const telegramBtn = document.getElementById('telegram-btn');
            const telegramDropdown = document.getElementById('telegram-dropdown');
            const qrisOverlay = document.getElementById('qris-overlay');
            const qrisCloseBtn = document.getElementById('qris-close-btn');
            const qrisDanaBtn = document.getElementById('qris-dana-btn');
            const qrisDownloadBtn = document.getElementById('qris-download-btn');

            let postsData = [], fetchedPosts = [];
            let activeKatFilter = null;
            let currentDisplayCount = 0;
            const ITEMS_PER_PAGE = 10;
            let carouselInterval = null;
            let currentSlide = 0;
            let totalPopularSlides = 0;

            if (LOGO_URL) document.querySelector('.logo-img').src = LOGO_URL;
            if (AVATAR_URL) { const a = document.getElementById('profile-avatar'); a.style.backgroundImage = `url('${AVATAR_URL}')`; a.textContent = ''; }

            // ============================================================
            // 🚀 GLOBAL COUNTER dengan countapi.mileshilliard.com + fallback
            // ============================================================
            async function getGlobalViewCount(postName) {
                const clean = postName.replace(/[^a-zA-Z0-9]/g, '_');
                const storageKey = 'view_' + clean;
                const today = new Date().toISOString().slice(0, 10);

                // Baca lokal
                let localData = null;
                try {
                    const raw = localStorage.getItem(storageKey);
                    if (raw) localData = JSON.parse(raw);
                } catch (_) {}

                // Jika hari ini sudah tercatat, pakai lokal (tanpa API)
                if (localData && localData.date === today) {
                    return localData.count;
                }

                // Coba beberapa API secara berurutan
                const providers = [
                    {
                        name: 'abacus.jasoncameron.dev',
                        url: `https://abacus.jasoncameron.dev/hit/destaseoseomods.web.id/${clean}`,
                        parse: (data) => data.value
                    },
                    {
                        name: 'counterapi.dev',
                        url: `https://counterapi.dev/api/count/destaseo_${clean}`,
                        parse: (data) => data.count || data.value
                    }
                ];

                let lastError = null;
                for (const provider of providers) {
                    try {
                        const controller = new AbortController();
                        const timeout = setTimeout(() => controller.abort(), 5000);
                        const res = await fetch(provider.url, { 
                            method: 'GET',
                            signal: controller.signal,
                            headers: { 'Content-Type': 'application/json' }
                        });
                        clearTimeout(timeout);
                        if (res.ok) {
                            const json = await res.json();
                            const count = provider.parse(json);
                            if (typeof count === 'number' && count > 0) {
                                // Sukses, simpan dan return
                                localStorage.setItem(storageKey, JSON.stringify({ count, date: today }));
                                return count;
                            }
                        }
                    } catch (e) {
                        lastError = e;
                        // Lanjut ke provider berikutnya
                    }
                }

                // Jika semua API gagal, fallback ke localStorage
                const prevCount = (localData && typeof localData.count === 'number') ? localData.count : 0;
                const newCount = prevCount + 1;
                localStorage.setItem(storageKey, JSON.stringify({ count: newCount, date: today }));
                return newCount;
            }

            // ============================================================
            // EVENT LISTENER & NAVIGASI
            // ============================================================
            telegramBtn.addEventListener('click', (e) => { e.stopPropagation(); telegramDropdown.classList.toggle('show'); });
            document.addEventListener('click', () => telegramDropdown.classList.remove('show'));
            telegramDropdown.addEventListener('click', (e) => e.stopPropagation());
            if (qrisDanaBtn) qrisDanaBtn.addEventListener('click', () => qrisOverlay.classList.remove('hidden'));
            qrisCloseBtn.addEventListener('click', () => qrisOverlay.classList.add('hidden'));
            qrisOverlay.addEventListener('click', (e) => { if (e.target === qrisOverlay) qrisOverlay.classList.add('hidden'); });
            qrisDownloadBtn.addEventListener('click', async () => { try { const r = await fetch(QRIS_URL); const b = await r.blob(); const u = URL.createObjectURL(b); const a = document.createElement('a'); a.href = u; a.download = 'qris-destaseo.png'; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(u); } catch { window.open(QRIS_URL, '_blank'); } });
            sortSelect.addEventListener('change', () => resetAndApplyFilters());

            function getHashPage() { const h = window.location.hash.slice(1); if (!h || h === 'home') return { page: 'home' }; if (h === 'search') return { page: 'search' }; if (h === 'profile') return { page: 'profile' }; if (h.startsWith('detail/')) return { page: 'detail', postName: h.split('/')[1] }; return { page: 'home' }; }
            function setHash(p, param) { if (p === 'home') window.location.hash = 'home'; else if (p === 'search') window.location.hash = 'search'; else if (p === 'profile') window.location.hash = 'profile'; else if (p === 'detail' && param) window.location.hash = 'detail/' + param; }
            function showSection(s) { [homeSection, detailSection, profileSection].forEach(x => x.classList.add('hidden')); s.classList.remove('hidden'); }
            function setActiveNav(p) { navItems.forEach(i => i.classList.toggle('active', i.dataset.page === p || (p === 'detail' && i.dataset.page === 'home'))); }
            function navigate(p, postName) {
                if (p === 'home') { showSection(homeSection); searchBox.classList.add('hidden'); categoryBar.classList.remove('hidden'); sortBar.classList.remove('hidden'); document.getElementById('popular-section').classList.remove('hidden'); setActiveNav('home'); startCarousel(); }
                else if (p === 'search') { showSection(homeSection); searchBox.classList.remove('hidden'); categoryBar.classList.remove('hidden'); sortBar.classList.add('hidden'); document.getElementById('popular-section').classList.add('hidden'); setActiveNav('search'); stopCarousel(); setTimeout(() => searchInput.focus(), 100); }
                else if (p === 'profile') { showSection(profileSection); searchBox.classList.add('hidden'); categoryBar.classList.add('hidden'); sortBar.classList.add('hidden'); document.getElementById('popular-section').classList.add('hidden'); filterIndicator.classList.add('hidden'); setActiveNav('profile'); stopCarousel(); renderProfile(); }
                else if (p === 'detail' && postName) { showDetail(postName); setActiveNav('detail'); searchBox.classList.add('hidden'); categoryBar.classList.add('hidden'); sortBar.classList.add('hidden'); document.getElementById('popular-section').classList.add('hidden'); filterIndicator.classList.add('hidden'); stopCarousel(); }
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
            function renderProfile() { document.getElementById('profile-name').textContent = PROFILE.name; document.getElementById('profile-bio').textContent = PROFILE.bio; document.getElementById('social-links').innerHTML = PROFILE.links.map(l => `<a href="${l.url}" target="_blank" class="social-link"><i class="${l.icon}"></i> ${l.label}</a>`).join(''); }

            // ============================================================
            // FETCH DATA DARI GITHUB
            // ============================================================
            function getCache() { const r = localStorage.getItem(CACHE_KEY); if (!r) return null; try { const d = JSON.parse(r); if (Date.now()-d.t < CACHE_TIME) return d.posts; } catch(e) {} return null; }
            function setCache(posts) { localStorage.setItem(CACHE_KEY, JSON.stringify({t: Date.now(), posts})); }

            async function fetchPostList() {
                const cached = getCache(); if (cached) { postsData = cached; return; }
                let apiUrl = `https://api.github.com/repos/${GITHUB_REPO}/contents/posts`;
                const res = await fetch(apiUrl);
                if (!res.ok) { const old = localStorage.getItem(CACHE_KEY); if (old) { try { const d = JSON.parse(old); console.warn('⚠️ Gagal fetch, pakai cache kadaluarsa.'); postsData = d.posts; return; } catch(e) {} } throw new Error(`Gagal fetch (${res.status}). Repo publik? Rate limit?`); }
                const files = await res.json();
                const mdFiles = files.filter(f => f.name.endsWith('.md'));
                if (!mdFiles.length) throw new Error('Tidak ada file .md di posts/.');
                postsData = mdFiles.map(f => ({ filename: f.name, name: f.name.replace('.md', ''), download_url: f.download_url }));
                setCache(postsData);
            }

            function parseFrontmatter(md) { const m = md.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/); if (!m) return { metadata: {}, content: md }; const meta = {}; m[1].split('\n').forEach(line => { const i = line.indexOf(':'); if (i>0) meta[line.slice(0,i).trim()] = line.slice(i+1).trim().replace(/^["']|["']$/g, ''); }); return { metadata: meta, content: m[2] }; }

            async function fetchPost(p) {
                try { const r = await fetch(p.download_url); if (!r.ok) throw new Error('fail'); const md = await r.text(); const { metadata, content } = parseFrontmatter(md); const lastModified = r.headers.get('Last-Modified'); return { ...p, metadata, content, lastModified, html: marked.parse(content) }; }
                catch { return { ...p, metadata:{}, content:'', html:'<p>Gagal memuat.</p>', lastModified: null }; }
            }

            function fixImageUrl(url) { if (!url) return ''; if (url.includes('github.com') && !url.includes('raw.githubusercontent.com')) url = url.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/'); return url; }
            function getExcerpt(c) { if (!c) return ''; let t = c.replace(/[#*`>\[\]()!|]/g, '').replace(/\n/g, ' ').trim(); if (t.length > 80) t = t.slice(0, 80) + '...'; return t; }
            function formatDate(d) { if (!d) return ''; const dt = new Date(d); if (isNaN(dt.getTime())) return ''; const m = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des']; return `${dt.getDate()} ${m[dt.getMonth()]} ${dt.getFullYear()}`; }

            // ============================================================
            // RENDER HOME
            // ============================================================
            function getAllKategori() { const k = new Set(); fetchedPosts.forEach(p => { const kat = p.metadata.kategori || ''; if (kat) k.add(kat); }); return Array.from(k).sort(); }

            function renderCategoryBar() {
                const kats = getAllKategori();
                let html = '<span class="category-chip' + (!activeKatFilter ? ' active' : '') + '" data-kat=""><i class="fas fa-globe"></i> Semua</span>';
                kats.forEach(kat => html += `<span class="category-chip${activeKatFilter === kat ? ' active' : ''}" data-kat="${kat}"><i class="fas fa-tag"></i> ${kat}</span>`);
                if (activeKatFilter) html += '<button class="reset-filter" id="reset-filter"><i class="fas fa-times"></i> Hapus filter</button>';
                categoryBar.innerHTML = html;
                categoryBar.querySelectorAll('.category-chip').forEach(chip => chip.addEventListener('click', () => { activeKatFilter = chip.dataset.kat || null; resetAndApplyFilters(); }));
                const resetBtn = document.getElementById('reset-filter'); if (resetBtn) resetBtn.addEventListener('click', () => { activeKatFilter = null; resetAndApplyFilters(); });
            }

            function getFilteredPosts() { const q = searchInput.value.trim().toLowerCase(); let f = fetchedPosts; if (activeKatFilter) f = f.filter(p => (p.metadata.kategori || '') === activeKatFilter); if (q) f = f.filter(p => { const t = (p.metadata.judul || p.metadata.title || p.name).toLowerCase(); return t.includes(q); }); return f; }

            function sortPosts(posts) {
                const sortBy = sortSelect.value;
                const sorted = [...posts];
                const getTime = (p) => { const d = p.metadata.tanggal || p.metadata.date || p.lastModified; if (!d) return 0; const t = new Date(d); return isNaN(t.getTime()) ? 0 : t.getTime(); };
                switch (sortBy) {
                    case 'terbaru': sorted.sort((a, b) => getTime(b) - getTime(a)); break;
                    case 'terlama': sorted.sort((a, b) => getTime(a) - getTime(b)); break;
                    case 'az': sorted.sort((a, b) => { const tA = (a.metadata.judul || a.metadata.title || a.name || '').toLowerCase(); const tB = (b.metadata.judul || b.metadata.title || b.name || '').toLowerCase(); return tA.localeCompare(tB); }); break;
                    case 'za': sorted.sort((a, b) => { const tA = (a.metadata.judul || a.metadata.title || a.name || '').toLowerCase(); const tB = (b.metadata.judul || b.metadata.title || b.name || '').toLowerCase(); return tB.localeCompare(tA); }); break;
                }
                return sorted;
            }

            function resetAndApplyFilters() { currentDisplayCount = 0; applyFilters(); }

            function applyFilters() {
                let filtered = getFilteredPosts();
                filtered = sortPosts(filtered);
                if (activeKatFilter) { filterIndicator.classList.remove('hidden'); filterIndicator.innerHTML = `<i class="fas fa-filter"></i> Kategori: <strong>${activeKatFilter}</strong> (${filtered.length} hasil)`; }
                else filterIndicator.classList.add('hidden');
                currentDisplayCount = Math.min(ITEMS_PER_PAGE, filtered.length);
                displayPosts(filtered.slice(0, currentDisplayCount));
                renderLoadMoreButton(filtered.length);
            }

            function displayPosts(posts) { postContainer.innerHTML = posts.length ? posts.map((p,i) => cardHTML(p,i)).join('') : '<div class="empty-text">🔍 Tidak ada postingan yang cocok.</div>'; attachCardEvents(); }
            function renderLoadMoreButton(t) { if (currentDisplayCount < t) { loadMoreContainer.innerHTML = `<button class="load-more-btn" id="load-more-btn"><i class="fas fa-chevron-down"></i> Muat Lebih Banyak (${t - currentDisplayCount})</button>`; document.getElementById('load-more-btn').addEventListener('click', loadMorePosts); } else { loadMoreContainer.innerHTML = ''; } }
            function loadMorePosts() { let f = getFilteredPosts(); f = sortPosts(f); const n = Math.min(currentDisplayCount + ITEMS_PER_PAGE, f.length); const newPosts = f.slice(currentDisplayCount, n); currentDisplayCount = n; newPosts.forEach((p,i) => { const card = cardHTML(p, i); postContainer.insertAdjacentHTML('beforeend', card); }); attachCardEvents(); renderLoadMoreButton(f.length); }

            function cardHTML(post, index) {
                const t = post.metadata.judul || post.metadata.title || post.name.replace(/[-_]/g, ' ');
                const img = fixImageUrl(post.metadata.gambar || post.metadata.image || '');
                const kategori = post.metadata.kategori || '';
                const ver = post.metadata.versi || post.metadata.version || '';
                const excerpt = getExcerpt(post.content);
                const delay = index * 0.04 + 's';
                const imgTag = img ? `<img src="${img}" alt="${t}" loading="lazy" onerror="this.parentElement.classList.add('error')">` : '';
                const versionBadge = ver ? `<span class="version-badge-img"><i class="fas fa-code-branch"></i> v${ver}</span>` : '';
                return `<div class="post-card" data-name="${post.name}" style="animation-delay:${delay};">
                    <div class="card-img${img ? '' : ' error'}">${imgTag}<span class="placeholder-icon"><i class="fas fa-box-open"></i></span>${versionBadge}</div>
                    <div class="card-body"><div class="card-title">${t}</div><div class="card-meta">${kategori ? `<span class="badge" data-kat="${kategori}"><i class="fas fa-folder"></i> ${kategori}</span>` : ''}</div>${excerpt ? `<p class="card-excerpt">${excerpt}</p>` : ''}</div>
                </div>`;
            }

            function attachCardEvents() { document.querySelectorAll('.post-card').forEach(c => c.addEventListener('click', (e) => { if (e.target.closest('.badge')) return; setHash('detail', c.dataset.name); })); document.querySelectorAll('.badge').forEach(b => b.addEventListener('click', (e) => { e.stopPropagation(); activeKatFilter = b.dataset.kat; searchInput.value = ''; resetAndApplyFilters(); renderCategoryBar(); })); }

            function stopCarousel() { if (carouselInterval) { clearInterval(carouselInterval); carouselInterval = null; } }
            function startCarousel() { stopCarousel(); if (totalPopularSlides === 0) return; updateCarousel(0); carouselInterval = setInterval(() => { currentSlide = (currentSlide + 1) % totalPopularSlides; updateCarousel(currentSlide); }, 4000); }
            function updateCarousel(i) { const slides = document.querySelectorAll('.carousel-slide'); slides.forEach((s, idx) => s.classList.toggle('active', idx === i)); document.querySelectorAll('.carousel-counter').forEach((c, idx) => { c.textContent = `${i+1}/${totalPopularSlides}`; }); }

            function renderPopularSection() { if (!fetchedPosts.length) { carouselTrack.innerHTML = ''; totalPopularSlides = 0; return; } let pop = fetchedPosts.filter(p => p.metadata.populer && p.metadata.populer.toLowerCase() === 'true'); if (pop.length === 0) pop = fetchedPosts.slice(0, 4); else pop = pop.slice(0, 4); totalPopularSlides = pop.length; carouselTrack.innerHTML = pop.map((p, i) => { const img = fixImageUrl(p.metadata.gambar || p.metadata.image || ''); const title = p.metadata.judul || p.metadata.title || p.name.replace(/[-_]/g, ' '); return `<div class="carousel-slide${i === 0 ? ' active' : ''}" data-name="${p.name}">${img ? `<img src="${img}" alt="${title}" loading="lazy" onerror="this.style.display='none'">` : ''}<div class="slide-overlay"><div class="slide-title">${title}</div><span class="carousel-counter">${i+1}/${pop.length}</span></div></div>`; }).join(''); document.querySelectorAll('.carousel-slide').forEach(s => s.addEventListener('click', () => setHash('detail', s.dataset.name))); }

            async function renderHome() { postContainer.innerHTML = '<div class="spinner"></div>'; loadMoreContainer.innerHTML = ''; categoryBar.innerHTML = ''; carouselTrack.innerHTML = ''; stopCarousel(); try { await fetchPostList(); if (!postsData.length) { postContainer.innerHTML = '<div class="empty-text"><i class="far fa-folder-open"></i> Tidak ada postingan.</div>'; return; } fetchedPosts = await Promise.all(postsData.map(fetchPost)); renderPopularSection(); renderCategoryBar(); resetAndApplyFilters(); startCarousel(); } catch (err) { postContainer.innerHTML = `<div class="error-text">⚠️ ${err.message}</div>`; } }

            // ============================================================
            // DETAIL & COUNTER
            // ============================================================
            function buildScreenshotGallery(str) { if (!str) return ''; const urls = str.split(',').map(u => fixImageUrl(u.trim())).filter(u => u.length > 0); if (urls.length === 0) return ''; const lim = urls.slice(0, 5); return `<div class="screenshot-scroll">${lim.map(u => `<img src="${u}" alt="Screenshot" loading="lazy" onclick="event.stopPropagation(); openLightbox('${u}')">`).join('')}</div>`; }

            window.openLightbox = function(url) { const lb = document.createElement('div'); lb.className = 'lightbox'; lb.innerHTML = `<img src="${url}" alt="Screenshot">`; lb.addEventListener('click', () => lb.remove()); document.body.appendChild(lb); };

            function startDownloadWithAd(btn, url) { const now = Date.now(); const last = localStorage.getItem(AD_STORAGE_KEY); if (!last || (now - parseInt(last)) > AD_INTERVAL) { localStorage.setItem(AD_STORAGE_KEY, now.toString()); if (AD_URL) window.open(AD_URL, '_blank'); let sec = 5; btn.textContent = `⏳ ${sec} detik`; btn.classList.add('counting'); const timer = setInterval(() => { sec--; if (sec <= 0) { clearInterval(timer); btn.innerHTML = '<i class="fas fa-download"></i> Download APK'; btn.classList.remove('counting'); window.open(url, '_blank'); } else { btn.textContent = `⏳ ${sec} detik`; } }, 1000); } else { window.open(url, '_blank'); } }

            async function showDetail(name) {
                const post = fetchedPosts.find(p => p.name === name);
                if (!post) {
                    console.error('❌ Post tidak ditemukan:', name);
                    return;
                }
                const t = post.metadata.judul || post.metadata.title || post.name.replace(/[-_]/g, ' ');
                const img = fixImageUrl(post.metadata.gambar || post.metadata.image || '');
                const v = post.metadata.versi || post.metadata.version || '?';
                const s = post.metadata.ukuran || post.metadata.size || '?';
                const dev = post.metadata.developer || post.metadata.dev || 'Destaseo';
                const dwn = post.metadata.download || post.metadata.link || '';
                const kategori = post.metadata.kategori || '';
                const tags = post.metadata.tag ? post.metadata.tag.split(',').map(t => t.trim()).filter(t => t) : [];
                const dateRaw = post.metadata.tanggal || post.metadata.date || post.lastModified || '';
                const dateFormatted = formatDate(dateRaw);
                const screenshots = post.metadata.screenshot || post.metadata.screenshots || '';
                const galleryHtml = buildScreenshotGallery(screenshots);
                const hasDownload = dwn && dwn !== '#';
                const downloadBtn = hasDownload ? `<button class="big-download" id="detail-download-btn"><i class="fas fa-download"></i> Download APK</button>` : `<div class="big-download disabled"><i class="fas fa-exclamation-circle"></i> Link Download Tidak Tersedia</div>`;
                const tagsHtml = tags.length > 0 ? `<div class="tags-container">${tags.map(tag => `<span class="tag-badge"><i class="fas fa-tag"></i> ${tag}</span>`).join('')}</div>` : '';

                detailContent.innerHTML = '<div class="spinner"></div>';
                showSection(detailSection);
                setActiveNav('detail');
                window.scrollTo({ top: 0 });

                // 🔥 Ambil counter global (multi-provider)
                const viewCount = await getGlobalViewCount(name);

                detailContent.innerHTML = `
                <div class="detail-header">
                    ${img ? `<img src="${img}" class="detail-img" alt="${t}" onerror="this.style.display='none'">` : '<div class="detail-img" style="display:flex;align-items:center;justify-content:center;font-size:3rem;"><i class="fas fa-box"></i></div>'}
                    <h1 class="detail-title">${t}</h1>
                    <div class="detail-meta-grid">
                        <div class="meta-item"><i class="fas fa-code-branch"></i> <strong>Versi</strong> ${v}</div>
                        <div class="meta-item"><i class="fas fa-weight-hanging"></i> <strong>Ukuran</strong> ${s}</div>
                        <div class="meta-item"><i class="fas fa-user"></i> <strong>Developer</strong> ${dev}</div>
                        ${kategori ? `<div class="meta-item"><i class="fas fa-folder"></i> <strong>Kategori</strong> ${kategori}</div>` : ''}
                        ${dateFormatted ? `<div class="meta-item"><i class="far fa-calendar-alt"></i> <strong>Tanggal</strong> ${dateFormatted}</div>` : ''}
                        <div class="meta-item"><i class="fas fa-eye"></i> <strong>Dilihat</strong> ${viewCount} kali</div>
                    </div>
                    ${galleryHtml}
                    ${tagsHtml}
                </div>
                <div class="content-box">${post.html || '<p><i class="far fa-file-alt"></i> Tidak ada deskripsi.</p>'}</div>
                ${downloadBtn}`;

                if (hasDownload) { const dBtn = document.getElementById('detail-download-btn'); if (dBtn) dBtn.addEventListener('click', function(e) { e.preventDefault(); if (this.classList.contains('counting')) return; startDownloadWithAd(this, dwn); }); }
            }

            detailBack.addEventListener('click', () => setHash('home'));
            navItems.forEach(i => i.addEventListener('click', () => setHash(i.dataset.page)));
            searchInput.addEventListener('input', () => resetAndApplyFilters());
            window.addEventListener('hashchange', () => { const { page, postName } = getHashPage(); if (page === 'detail' && postName) { if (fetchedPosts.length === 0) renderHome().then(() => navigate('detail', postName)); else navigate('detail', postName); } else navigate(page); });

            // ============================================================
            // SITEMAP GENERATOR
            // ============================================================
            async function generateSitemap() {
                if (window.location.search !== '?sitemap') return;
                const baseUrl = window.location.origin + window.location.pathname.replace(/\/[^/]*$/, '');
                let urls = [baseUrl];
                try {
                    const apiUrl = `https://api.github.com/repos/${GITHUB_REPO}/contents/posts`;
                    const res = await fetch(apiUrl);
                    if (res.ok) {
                        const files = await res.json();
                        const mdFiles = files.filter(f => f.name.endsWith('.md'));
                        mdFiles.forEach(f => {
                            const name = f.name.replace('.md', '');
                            urls.push(`${baseUrl}#detail/${name}`);
                        });
                    }
                } catch(e) {}
                const sitemap = `<?xml version="1.0" encoding="UTF-8"?>
<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
  ${urls.map(u => `<url><loc>${u}</loc><lastmod>${new Date().toISOString().split('T')[0]}</lastmod></url>`).join('\n  ')}
</urlset>`;
                document.body.innerHTML = `<pre style="color:#fff;background:#111;padding:20px;font-family:monospace;">${sitemap.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>`;
                throw new Error('SITEMAP_DISPLAY');
            }

            // ============================================================
            // START APLIKASI
            // ============================================================
            (async () => {
                try {
                    await generateSitemap();
                } catch(e) {
                    if (e.message === 'SITEMAP_DISPLAY') return;
                }
                await renderHome();
                const { page, postName } = getHashPage();
                if (page === 'detail' && postName) navigate('detail', postName);
                else navigate(page);
            })();
        })();
    </script>
</body>
</html>
