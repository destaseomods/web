<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Destaseo Mods • Premium Mod APK</title>
    <link rel="icon" type="image/png" href="https://avatars.githubusercontent.com/u/189899710?v=4">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #04040e;
            --surface: rgba(15, 15, 30, 0.7);
            --surface2: rgba(25, 25, 45, 0.8);
            --border: rgba(255, 255, 255, 0.07);
            --text: #f5f5ff;
            --text2: #b8b8d0;
            --accent: #a87fff;
            --accent2: #3ee0ff;
            --accent3: #ff64a5;
            --grad1: linear-gradient(135deg, #a87fff, #3ee0ff);
            --grad2: linear-gradient(135deg, #ff64a5, #a87fff);
            --radius: 28px;
            --radius-sm: 20px;
            --nav-height: 76px;
            --safe-bottom: env(safe-area-inset-bottom, 16px);
            --shadow-card: 0 16px 48px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.06);
            --glow: 0 0 60px rgba(168,127,255,0.4);
            --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            padding-bottom: calc(var(--nav-height) + var(--safe-bottom) + 16px);
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            position: relative;
        }
        canvas#particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; opacity: 0.7;
        }
        .container { max-width: 760px; margin: 0 auto; padding: 12px 20px; position: relative; z-index: 2; }

        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 22px;
            background: rgba(12,12,25,0.65);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 34px;
            margin: 12px auto;
            max-width: 700px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.7);
            position: sticky; top: 14px; z-index: 99;
        }
        .logo-area {
            display: flex; align-items: center; gap: 8px;
        }
        .logo-img {
            width: 34px; height: 34px; border-radius: 50%; object-fit: cover;
            border: 2px solid rgba(255,255,255,0.15);
        }
        .logo-text {
            font-weight: 800; font-size: 1.4rem; letter-spacing: -0.6px;
            background: var(--grad1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .telegram-btn {
            background: var(--surface); border: 1px solid var(--border);
            color: var(--accent2); padding: 8px 18px; border-radius: 30px;
            font-size: 0.85rem; font-weight: 600; text-decoration: none;
            display: flex; align-items: center; gap: 6px;
            transition: var(--transition); backdrop-filter: blur(16px);
        }
        .telegram-btn:hover { border-color: var(--accent2); box-shadow: 0 0 20px rgba(62,224,255,0.3); }

        .search-container { margin: 8px 0 16px; display: flex; gap: 8px; }
        .search-input {
            flex: 1; background: var(--surface); backdrop-filter: blur(16px);
            border: 1px solid var(--border); border-radius: 30px;
            padding: 12px 20px; color: #fff; font-size: 0.95rem;
            font-family: inherit; outline: none; transition: var(--transition);
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 30px rgba(168,127,255,0.4); }
        .search-input::placeholder { color: var(--text2); }

        .category-bar {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px;
            align-items: center;
        }
        .category-chip {
            background: var(--surface); border: 1px solid var(--border);
            padding: 6px 14px; border-radius: 20px;
            color: var(--text2); font-size: 0.75rem; font-weight: 600;
            cursor: pointer; transition: var(--transition);
            backdrop-filter: blur(10px);
        }
        .category-chip.active, .category-chip:hover {
            background: rgba(168,127,255,0.2); border-color: var(--accent);
            color: #fff;
        }
        .reset-filter {
            background: none; border: none; color: var(--accent2);
            font-size: 0.75rem; font-weight: 600; cursor: pointer;
            padding: 6px 12px;
        }

        .post-grid { display: grid; grid-template-columns: 1fr; gap: 18px; }
        @media (min-width: 540px) { .post-grid { grid-template-columns: 1fr 1fr; } }
        .post-card {
            background: var(--surface); backdrop-filter: blur(22px);
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            overflow: hidden; cursor: pointer;
            transition: all 0.45s cubic-bezier(0.4,0,0.2,1);
            display: flex; flex-direction: column;
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0; transform: translateY(25px);
        }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        .post-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(255,255,255,0.2);
            box-shadow: var(--glow), 0 20px 50px rgba(0,0,0,0.9);
        }
        .post-card:active { transform: scale(0.97); }
        .card-img {
            width: 100%; height: 155px; object-fit: cover;
            background: linear-gradient(135deg, #1e1e35, #10101c);
            display: flex; align-items: center; justify-content: center;
            color: var(--text2); font-size: 2.8rem;
        }
        .card-body { padding: 18px; flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .card-title { font-weight: 800; font-size: 1.05rem; line-height: 1.3; color: #fff; }
        .card-meta { font-size: 0.75rem; color: var(--text2); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .badge {
            background: rgba(168,127,255,0.2); color: #cfc4ff;
            padding: 3px 12px; border-radius: 20px; font-weight: 700; font-size: 0.7rem;
            cursor: pointer; transition: 0.2s;
        }
        .badge:hover { background: rgba(168,127,255,0.4); color: #fff; }

        .hidden { display: none !important; }
        .detail-header, .profile-card {
            background: var(--surface); backdrop-filter: blur(24px);
            border: 1px solid var(--border); border-radius: var(--radius);
            padding: 28px; margin-bottom: 22px; box-shadow: var(--shadow-card);
        }
        .detail-img { width: 100%; height: 230px; object-fit: cover; border-radius: 20px; background: var(--surface2); margin-bottom: 18px; }
        .detail-title { font-size: 1.9rem; font-weight: 800; letter-spacing: -0.5px; }
        .detail-meta-grid { display: flex; gap: 18px; margin: 18px 0; flex-wrap: wrap; }
        .meta-item { background: var(--surface2); padding: 12px 18px; border-radius: 16px; font-size: 0.85rem; flex: 1; min-width: 80px; }
        .meta-item strong { display: block; color: var(--accent2); font-size: 0.9rem; }
        .big-download {
            display: block; width: 100%; background: var(--grad1); border: none;
            color: #04040e; font-weight: 700; font-size: 1rem; padding: 15px;
            border-radius: 18px; margin: 20px 0 0; cursor: pointer; transition: 0.2s;
            letter-spacing: -0.3px; text-decoration: none; text-align: center;
            box-shadow: 0 6px 24px rgba(0,0,0,0.6);
        }
        .big-download:active { transform: scale(0.96); }
        .content-box {
            background: var(--surface); backdrop-filter: blur(24px);
            border: 1px solid var(--border); border-radius: var(--radius);
            padding: 28px; line-height: 1.8; box-shadow: var(--shadow-card);
        }
        .content-box img { max-width: 100%; border-radius: 16px; margin: 12px 0; }
        .content-box pre { background: #050510; padding: 16px; border-radius: 16px; overflow-x: auto; }
        .back-btn {
            background: none; border: none; color: var(--accent2); font-weight: 700;
            display: inline-flex; align-items: center; gap: 8px; margin-bottom: 16px;
            cursor: pointer; font-size: 0.95rem; padding: 10px 0;
            transition: opacity 0.2s;
        }
        .back-btn:hover { opacity: 0.8; }

        .profile-avatar {
            width: 100px; height: 100px; border-radius: 50%;
            background: var(--grad2); margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.8rem; color: #fff;
            box-shadow: 0 10px 40px rgba(255,100,165,0.4);
            background-size: cover; background-position: center;
        }
        .profile-name { text-align: center; font-size: 1.5rem; font-weight: 800; }
        .profile-bio { text-align: center; color: var(--text2); margin: 10px 0 20px; }
        .social-links { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
        .social-link {
            background: var(--surface2); padding: 10px 20px; border-radius: 30px;
            color: var(--accent2); text-decoration: none; font-weight: 600; font-size: 0.85rem;
            transition: var(--transition); border: 1px solid transparent;
        }
        .social-link:hover { border-color: var(--accent2); background: rgba(62,224,255,0.1); }
        .donate-section {
            margin-top: 24px; text-align: center;
            border-top: 1px solid var(--border); padding-top: 20px;
        }
        .donate-title { color: var(--text2); margin-bottom: 12px; font-weight: 600; }
        .donate-links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

        .screenshot-gallery {
            display: flex; flex-wrap: wrap; gap: 12px; margin-top: 16px;
        }
        .screenshot-gallery img {
            width: calc(33.333% - 8px);
            border-radius: 12px;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.2s;
            background: var(--surface2);
            border: 1px solid var(--border);
        }
        .screenshot-gallery img:hover {
            transform: scale(1.03);
            border-color: var(--accent);
        }
        @media (max-width: 500px) {
            .screenshot-gallery img { width: calc(50% - 6px); }
        }
        .lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 200;
            display: flex; align-items: center; justify-content: center;
            cursor: zoom-out;
        }
        .lightbox img {
            max-width: 95vw; max-height: 95vh; border-radius: 16px;
        }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(5,5,15,0.85); backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px);
            border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center;
            height: var(--nav-height); padding-bottom: var(--safe-bottom);
            z-index: 100; box-shadow: 0 -6px 30px rgba(0,0,0,0.8);
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: var(--text2); font-size: 0.7rem; font-weight: 600; gap: 6px;
            transition: 0.25s; cursor: pointer; background: none; border: none;
            padding: 10px 18px; border-radius: 24px;
        }
        .nav-item.active { color: var(--accent2); background: rgba(62,224,255,0.12); }
        .nav-item svg { width: 24px; height: 24px; }

        .spinner {
            width: 44px; height: 44px; margin: 50px auto;
            border: 3px solid rgba(255,255,255,0.06);
            border-top-color: var(--accent2); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-text, .error-text {
            text-align: center; padding: 45px; color: var(--text2);
            background: rgba(255,0,0,0.07); border-radius: 24px; margin: 20px 0;
        }
        .filter-indicator {
            display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
            font-size: 0.85rem; color: var(--accent2);
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>

    <div class="topbar">
        <div class="logo-area">
            <img src="https://avatars.githubusercontent.com/u/189899710?v=4" alt="Logo" class="logo-img">
            <span class="logo-text">DestaseoMods</span>
        </div>
        <a href="https://t.me/destaseo" target="_blank" class="telegram-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.02-1.96 1.25-5.54 3.66-.52.36-1 .53-1.42.52-.47-.01-1.37-.26-2.03-.48-.82-.27-1.47-.42-1.41-.88.03-.24.37-.49 1.02-.74 3.98-1.73 6.63-2.87 7.94-3.42 3.78-1.57 4.57-1.84 5.08-1.85.11 0 .37.03.53.17.14.12.18.28.2.45-.01.06.01.24 0 .38z"/></svg>
            Telegram
        </a>
    </div>

    <main class="container" id="app">
        <section id="home-section">
            <div class="search-container hidden" id="search-box">
                <input type="text" class="search-input" id="search-input" placeholder="Cari mod favorit...">
            </div>
            <div class="category-bar" id="category-bar"></div>
            <div id="filter-indicator" class="filter-indicator hidden"></div>
            <div id="post-container" class="post-grid">
                <div class="spinner"></div>
            </div>
        </section>

        <section id="detail-section" class="hidden">
            <button class="back-btn" id="detail-back">← Kembali</button>
            <div id="detail-content"></div>
        </section>

        <section id="profile-section" class="hidden">
            <div class="profile-card">
                <div class="profile-avatar" id="profile-avatar" style="background-image: url('https://avatars.githubusercontent.com/u/189899710?v=4');"></div>
                <div class="profile-name" id="profile-name">Destaseo</div>
                <div class="profile-bio" id="profile-bio">Premium modder & content creator.</div>
                <div class="social-links" id="social-links"></div>
                <div class="donate-section">
                    <div class="donate-title">☕ Dukung Saya</div>
                    <div class="donate-links">
                        <a href="https://saweria.co/destaseo" target="_blank" class="social-link">Saweria</a>
                        <a href="https://paypal.me/destaseo" target="_blank" class="social-link">PayPal</a>
                    </div>
                </div>
            </div>
            <div class="content-box">
                <p style="color:var(--text2);">Update konten otomatis dari folder <code>posts/</code> di repository GitHub. Cukup tambah file <code>.md</code>, langsung muncul.</p>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item active" data-page="home">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            <span>Beranda</span>
        </button>
        <button class="nav-item" data-page="search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <span>Cari</span>
        </button>
        <button class="nav-item" data-page="profile">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Profil</span>
        </button>
    </nav>

    <script>
        (function() {
            // ⚠️ ISI VARIABEL INI JIKA PAKAI CUSTOM DOMAIN
            const GITHUB_REPO = "destaseomods/web"; // "username/repo"

            const LOGO_URL = "https://avatars.githubusercontent.com/u/189899710?v=4";
            const AVATAR_URL = "https://avatars.githubusercontent.com/u/189899710?v=4";
            const PROFILE = {
                avatar: AVATAR_URL,
                name: "Destaseo",
                bio: "Premium modder & content creator.",
                links: [
                    { label: "GitHub", url: "https://github.com" },
                    { label: "Telegram", url: "https://t.me" },
                    { label: "YouTube", url: "https://youtube.com" }
                ]
            };

            // Partikel background
            const canvas = document.getElementById('particles');
            const ctx = canvas.getContext('2d');
            let particles = [];
            const maxParticles = 70;
            function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            window.addEventListener('resize', resizeCanvas); resizeCanvas();
            class Particle {
                constructor() { this.reset(); }
                reset() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.vx = (Math.random() - 0.5) * 0.5;
                    this.vy = (Math.random() - 0.5) * 0.5;
                    this.radius = Math.random() * 2.5 + 1;
                    this.opacity = Math.random() * 0.5 + 0.2;
                }
                update() {
                    this.x += this.vx; this.y += this.vy;
                    if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                    if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(168,127,255,${this.opacity})`;
                    ctx.fill();
                }
            }
            for(let i=0; i<maxParticles; i++) particles.push(new Particle());
            function animateParticles() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animateParticles);
            }
            animateParticles();

            // Cache & API
            const CACHE_KEY = 'destaseo_premium_cache_v7';
            const CACHE_TIME = 10 * 60 * 1000;
            const postContainer = document.getElementById('post-container');
            const homeSection = document.getElementById('home-section');
            const detailSection = document.getElementById('detail-section');
            const profileSection = document.getElementById('profile-section');
            const detailContent = document.getElementById('detail-content');
            const detailBack = document.getElementById('detail-back');
            const navItems = document.querySelectorAll('.nav-item');
            const searchBox = document.getElementById('search-box');
            const searchInput = document.getElementById('search-input');
            const categoryBar = document.getElementById('category-bar');
            const filterIndicator = document.getElementById('filter-indicator');

            let postsData = [], fetchedPosts = [];
            let activeTagFilter = null;

            if (LOGO_URL) document.querySelector('.logo-img').src = LOGO_URL;
            if (AVATAR_URL) {
                const avatarEl = document.getElementById('profile-avatar');
                avatarEl.style.backgroundImage = `url('${AVATAR_URL}')`;
                avatarEl.textContent = '';
            }

            // ========== ROUTING HASH ==========
            function getHashPage() {
                const hash = window.location.hash.slice(1); // hapus #
                if (!hash || hash === 'home') return { page: 'home' };
                if (hash === 'search') return { page: 'search' };
                if (hash === 'profile') return { page: 'profile' };
                if (hash.startsWith('detail/')) return { page: 'detail', postName: hash.split('/')[1] };
                return { page: 'home' }; // fallback
            }

            function setHash(page, param) {
                if (page === 'home') window.location.hash = 'home';
                else if (page === 'search') window.location.hash = 'search';
                else if (page === 'profile') window.location.hash = 'profile';
                else if (page === 'detail' && param) window.location.hash = 'detail/' + param;
            }

            function showSection(section) {
                [homeSection, detailSection, profileSection].forEach(s => s.classList.add('hidden'));
                section.classList.remove('hidden');
            }

            function setActiveNav(page) {
                navItems.forEach(i => {
                    const p = i.dataset.page;
                    i.classList.toggle('active', p === page || (page === 'detail' && p === 'home'));
                });
            }

            function navigate(page, postName) {
                if (page === 'home') {
                    showSection(homeSection);
                    searchBox.classList.remove('hidden');
                    categoryBar.classList.remove('hidden');
                    setActiveNav('home');
                } else if (page === 'search') {
                    showSection(homeSection);
                    searchBox.classList.remove('hidden');
                    categoryBar.classList.remove('hidden');
                    setActiveNav('search');
                    setTimeout(() => searchInput.focus(), 100);
                } else if (page === 'profile') {
                    showSection(profileSection);
                    searchBox.classList.add('hidden');
                    categoryBar.classList.add('hidden');
                    filterIndicator.classList.add('hidden');
                    setActiveNav('profile');
                    renderProfile();
                } else if (page === 'detail' && postName) {
                    showDetail(postName);
                    setActiveNav('detail');
                    searchBox.classList.add('hidden');
                    categoryBar.classList.add('hidden');
                    filterIndicator.classList.add('hidden');
                }
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            function renderProfile() {
                document.getElementById('profile-name').textContent = PROFILE.name;
                document.getElementById('profile-bio').textContent = PROFILE.bio;
                document.getElementById('social-links').innerHTML = PROFILE.links.map(l =>
                    `<a href="${l.url}" target="_blank" class="social-link">${l.label}</a>`
                ).join('');
            }

            // ========== DATA FETCHING ==========
            function getCache() {
                const raw = localStorage.getItem(CACHE_KEY);
                if (!raw) return null;
                try { const d = JSON.parse(raw); if (Date.now()-d.t < CACHE_TIME) return d.posts; } catch(e) {}
                return null;
            }
            function setCache(posts) { localStorage.setItem(CACHE_KEY, JSON.stringify({t: Date.now(), posts})); }

            async function fetchPostList() {
                const cached = getCache();
                if (cached) { postsData = cached; return; }

                let apiUrl = '';
                if (GITHUB_REPO) {
                    apiUrl = `https://api.github.com/repos/${GITHUB_REPO}/contents/posts`;
                } else if (window.location.hostname.includes('github.io')) {
                    const parts = window.location.pathname.split('/').filter(p => p);
                    const user = window.location.hostname.split('.')[0];
                    const repo = parts.length ? parts[0] : `${user}.github.io`;
                    apiUrl = `https://api.github.com/repos/${user}/${repo}/contents/posts`;
                } else {
                    throw new Error('🔧 Isi GITHUB_REPO untuk custom domain.');
                }

                const res = await fetch(apiUrl);
                if (!res.ok) {
                    if (res.status === 404) throw new Error('Folder posts/ tidak ditemukan.');
                    if (res.status === 403) throw new Error('Akses ditolak. Pastikan repo publik.');
                    throw new Error(`Gagal fetch (${res.status}).`);
                }
                const files = await res.json();
                const mdFiles = files.filter(f => f.name.endsWith('.md'));
                if (!mdFiles.length) throw new Error('Tidak ada file .md di posts/.');
                postsData = mdFiles.map(f => ({ filename: f.name, name: f.name.replace('.md', ''), download_url: f.download_url }));
                setCache(postsData);
            }

            function parseFrontmatter(md) {
                const m = md.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
                if (!m) return { metadata: {}, content: md };
                const meta = {};
                m[1].split('\n').forEach(line => {
                    const i = line.indexOf(':');
                    if (i>0) meta[line.slice(0,i).trim()] = line.slice(i+1).trim().replace(/^["']|["']$/g, '');
                });
                return { metadata: meta, content: m[2] };
            }

            async function fetchPost(p) {
                try {
                    const r = await fetch(p.download_url);
                    if (!r.ok) throw new Error('fail');
                    const md = await r.text();
                    const { metadata, content } = parseFrontmatter(md);
                    return { ...p, metadata, content, html: marked.parse(content) };
                } catch { return { ...p, metadata:{}, content:'', html:'<p>Gagal memuat.</p>' }; }
            }

            function getAllTags() {
                const tags = new Set();
                fetchedPosts.forEach(p => {
                    const tag = p.metadata.tag || p.metadata.kategori || '';
                    if (tag) tags.add(tag);
                });
                return Array.from(tags).sort();
            }

            function renderCategoryBar() {
                const tags = getAllTags();
                if (tags.length === 0) { categoryBar.innerHTML = ''; return; }
                let html = '';
                tags.forEach(tag => html += `<span class="category-chip${activeTagFilter === tag ? ' active' : ''}" data-tag="${tag}">${tag}</span>`);
                if (activeTagFilter) html += `<button class="reset-filter" id="reset-filter">✕ Hapus filter</button>`;
                categoryBar.innerHTML = html;
                categoryBar.querySelectorAll('.category-chip').forEach(chip => {
                    chip.addEventListener('click', () => {
                        const tag = chip.dataset.tag;
                        activeTagFilter = (activeTagFilter === tag) ? null : tag;
                        applyFilters();
                    });
                });
                const resetBtn = document.getElementById('reset-filter');
                if (resetBtn) resetBtn.addEventListener('click', () => { activeTagFilter = null; applyFilters(); });
            }

            function applyFilters() {
                const query = searchInput.value.trim().toLowerCase();
                let filtered = fetchedPosts;
                if (activeTagFilter) filtered = filtered.filter(p => (p.metadata.tag || p.metadata.kategori || '') === activeTagFilter);
                if (query) filtered = filtered.filter(p => {
                    const title = (p.metadata.judul || p.metadata.title || p.name).toLowerCase();
                    return title.includes(query);
                });
                if (activeTagFilter) {
                    filterIndicator.classList.remove('hidden');
                    filterIndicator.innerHTML = `🔖 Kategori: <strong>${activeTagFilter}</strong> (${filtered.length} hasil)`;
                } else filterIndicator.classList.add('hidden');
                postContainer.innerHTML = filtered.length ? filtered.map((p,i) => cardHTML(p,i)).join('') : '<div class="empty-text">🔍 Tidak ada postingan yang cocok.</div>';
                attachCardEvents();
            }

            function cardHTML(post, index) {
                const t = post.metadata.judul || post.metadata.title || post.name.replace(/[-_]/g, ' ');
                const img = post.metadata.gambar || post.metadata.image || '';
                const tag = post.metadata.tag || post.metadata.kategori || '';
                const ver = post.metadata.versi || post.metadata.version || '';
                const delay = index * 0.04 + 's';
                return `<div class="post-card" data-name="${post.name}" style="animation-delay:${delay};">
                    <div class="card-img">${img ? `<img src="${img}" alt="${t}" style="width:100%;height:100%;object-fit:cover;">` : '📦'}</div>
                    <div class="card-body">
                        <div class="card-title">${t}</div>
                        <div class="card-meta">
                            ${ver ? `<span>v${ver}</span>` : ''}
                            ${tag ? `<span class="badge" data-tag="${tag}">${tag}</span>` : ''}
                        </div>
                    </div>
                </div>`;
            }

            function attachCardEvents() {
                document.querySelectorAll('.post-card').forEach(c => {
                    c.addEventListener('click', (e) => {
                        if (e.target.classList.contains('badge')) return;
                        setHash('detail', c.dataset.name);
                    });
                });
                document.querySelectorAll('.badge').forEach(badge => {
                    badge.addEventListener('click', (e) => {
                        e.stopPropagation();
                        activeTagFilter = badge.dataset.tag;
                        searchInput.value = '';
                        applyFilters();
                        renderCategoryBar();
                    });
                });
            }

            async function renderHome() {
                postContainer.innerHTML = '<div class="spinner"></div>';
                categoryBar.innerHTML = '';
                try {
                    await fetchPostList();
                    if (!postsData.length) {
                        postContainer.innerHTML = '<div class="empty-text">📭 Tidak ada postingan.</div>';
                        return;
                    }
                    fetchedPosts = await Promise.all(postsData.map(fetchPost));
                    renderCategoryBar();
                    applyFilters();
                } catch (err) {
                    postContainer.innerHTML = `<div class="error-text">⚠️ ${err.message}</div>`;
                }
            }

            function buildScreenshotGallery(screenshotsStr) {
                if (!screenshotsStr) return '';
                const urls = screenshotsStr.split(',').map(url => url.trim()).filter(url => url.length > 0);
                if (urls.length === 0) return '';
                const imagesHtml = urls.map(url => `<img src="${url}" alt="Screenshot" loading="lazy" onclick="event.stopPropagation(); openLightbox('${url}')">`).join('');
                return `<div class="screenshot-gallery">${imagesHtml}</div>`;
            }

            window.openLightbox = function(url) {
                const lb = document.createElement('div');
                lb.className = 'lightbox';
                lb.innerHTML = `<img src="${url}" alt="Screenshot">`;
                lb.addEventListener('click', () => lb.remove());
                document.body.appendChild(lb);
            };

            function showDetail(name) {
                const post = fetchedPosts.find(p => p.name === name);
                if (!post) return;
                const t = post.metadata.judul || post.metadata.title || post.name.replace(/[-_]/g, ' ');
                const img = post.metadata.gambar || post.metadata.image || '';
                const v = post.metadata.versi || post.metadata.version || '?';
                const s = post.metadata.ukuran || post.metadata.size || '?';
                const dev = post.metadata.developer || post.metadata.dev || 'Destaseo';
                const dwn = post.metadata.download || post.metadata.link || '#';
                const screenshots = post.metadata.screenshot || post.metadata.screenshots || '';
                const galleryHtml = buildScreenshotGallery(screenshots);
                detailContent.innerHTML = `
                <div class="detail-header">
                    ${img ? `<img src="${img}" class="detail-img" alt="${t}">` : '<div class="detail-img" style="display:flex;align-items:center;justify-content:center;font-size:3rem;">📱</div>'}
                    <h1 class="detail-title">${t}</h1>
                    <div class="detail-meta-grid">
                        <div class="meta-item"><strong>Versi</strong> ${v}</div>
                        <div class="meta-item"><strong>Ukuran</strong> ${s}</div>
                        <div class="meta-item"><strong>Developer</strong> ${dev}</div>
                    </div>
                    ${galleryHtml}
                    <a href="${dwn}" target="_blank" class="big-download">⬇ Download APK</a>
                </div>
                <div class="content-box">${post.html || '<p>Tidak ada deskripsi.</p>'}</div>`;
                showSection(detailSection);
                setActiveNav('detail');
                searchBox.classList.add('hidden');
                categoryBar.classList.add('hidden');
                filterIndicator.classList.add('hidden');
                window.scrollTo({ top: 0 });
            }

            // ========== EVENT LISTENERS ==========
            detailBack.addEventListener('click', () => setHash('home'));
            navItems.forEach(item => {
                item.addEventListener('click', () => {
                    const page = item.dataset.page;
                    setHash(page);
                });
            });
            searchInput.addEventListener('input', () => applyFilters());

            window.addEventListener('hashchange', () => {
                const { page, postName } = getHashPage();
                if (page === 'detail' && postName) {
                    if (fetchedPosts.length === 0) {
                        // jika data belum siap, tunggu render ulang
                        renderHome().then(() => {
                            navigate('detail', postName);
                        });
                    } else {
                        navigate('detail', postName);
                    }
                } else {
                    navigate(page);
                }
            });

            // ========== INIT ==========
            (async () => {
                await renderHome();
                const { page, postName } = getHashPage();
                if (page === 'detail' && postName) {
                    navigate('detail', postName);
                } else {
                    navigate(page);
                }
            })();
        })();
    </script>
</body>
</html>
