    <style>
        /* ============================================================

        :root {

        /* ============================================================
           OVERLAY SPINNER / ERROR — FULLSCREEN DI TENGAH LAYAR
           ============================================================ */
        .center-overlay {

            top: 0;
            left: 0;
            right: 0;
            bottom: 0;

            border: 4px solid rgba(255, 255, 255, 0.06);

            margin-bottom: 16px;

            margin-bottom: 12px;
            opacity: 0.5;

            font-size: 0.95rem;
            max-width: 400px;
            line-height: 1.6;
        }

        }
        .center-overlay.error .icon {

                        const data = JSON.parse(cached);
                        if (Date.now() - data.t < ipCacheExpiry) return data.ip;

                } catch (_) {}
                try {

                    const timeout = setTimeout(() => controller.abort(), 2000);
                    const res = await fetch('https://api.ipify.org?format=json', { signal: controller.signal });

                        const data = await res.json();
                        const ip = data.ip || null;
                        if (ip) localStorage.setItem(ipCacheKey, JSON.stringify({ ip, t: Date.now() }));

            // ============================================================
            // PARTIKEL
            // ============================================================
            const canvas = document.getElementById('particles');
            const ctx = canvas.getContext('2d');
            let particles = [];
            const maxParticles = 70;

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            class Particle {
                constructor() { this.reset(); }
                reset() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.vx = (Math.random() - 0.5) * 0.5;
                    this.vy = (Math.random() - 0.5) * 0.5;
                    this.radius = Math.random() * 2.5 + 1;
                    this.opacity = Math.random() * 0.5 + 0.2;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                    if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(168,127,255,${this.opacity})`;
                    ctx.fill();
                }
            }
            for (let i = 0; i < maxParticles; i++) particles.push(new Particle());

            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => { p.update();
                    p.draw(); });
                requestAnimationFrame(animateParticles);
            }

            function sortPosts(posts) {
                const sortBy = sortSelect.value;
                const sorted = [...posts];
                const getTime = (p) => {
                    const d = p.metadata.tanggal || p.metadata.date || p.lastModified;
                    if (!d) return 0;
                    const t = new Date(d);
                    return isNaN(t.getTime()) ? 0 : t.getTime();
                };
                switch (sortBy) {
                    case 'terbaru':
                        sorted.sort((a, b) => getTime(b) - getTime(a));
                        break;
                    case 'terlama':
                        sorted.sort((a, b) => getTime(a) - getTime(b));
                        break;
                    case 'az':
                        sorted.sort((a, b) => {
                            const tA = (a.metadata.judul || a.metadata.title || a.name || '').toLowerCase();

                            const tB = (b.metadata.judul || b.metadata.title || b.name || '').toLowerCase();
                            return tB.localeCompare(tA);
                        });

                        icon = 'fa-ban'; } else if (lower === 'unlocked' || lower === 'unlock') { className =
                            'badge-unlocked';
                        icon = 'fa-unlock'; }
                    return `<span class="${className}"><i class="fas ${icon}"></i> ${text}</span>`;
                }

                const imgTag = img ?
                    `<img src="${img}" alt="${t}" loading="lazy" onerror="this.parentElement.classList.add('error')">` :

            function getCachedList() {
                const raw = localStorage.getItem(CACHE_KEY_LIST);
                if (!raw) return null;
                try {
                    const data = JSON.parse(raw);
                    if (Date.now() - data.t < CACHE_TIME_LIST) return data.posts;
                    return null;
                } catch (e) { return null; }
            }

            function getCachedListFallback() {
                const raw = localStorage.getItem(CACHE_KEY_LIST);
                if (!raw) return null;
                try {
                    const data = JSON.parse(raw);
                    return data.posts;
                } catch (e) { return null; }
            }

            function setCachedList(posts) {
                localStorage.setItem(CACHE_KEY_LIST, JSON.stringify({ t: Date.now(), posts }));
            }

            function getCachedContent(postName) {
                const key = CACHE_KEY_CONTENT_PREFIX + postName;
                const raw = localStorage.getItem(key);
                if (!raw) return null;
                try {
                    const data = JSON.parse(raw);
                    if (Date.now() - data.t < CACHE_TIME_CONTENT) return data.content;
                    return null;
                } catch (e) { return null; }
            }

            function getCachedContentFallback(postName) {
                const key = CACHE_KEY_CONTENT_PREFIX + postName;
                const raw = localStorage.getItem(key);
                if (!raw) return null;
                try {
                    const data = JSON.parse(raw);
                    return data.content;
                } catch (e) { return null; }
            }

            function setCachedContent(postName, content) {
                const key = CACHE_KEY_CONTENT_PREFIX + postName;
                localStorage.setItem(key, JSON.stringify({ t: Date.now(), content }));
            }

            async function fetchPostList() {
                const cached = getCachedList();
                if (cached) { postsData = cached; return; }

                const apiUrl = `https://api.github.com/repos/${GITHUB_REPO}/contents/posts`;
                try {
                    const res = await fetch(apiUrl);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const files = await res.json();
                    const mdFiles = files.filter(f => f.name.endsWith('.md'));
                    if (!mdFiles.length) throw new Error('Tidak ada file .md');
                    postsData = mdFiles.map(f => ({ filename: f.name, name: f.name.replace('.md', ''), download_url: f
                            .download_url }));
                    setCachedList(postsData);
                } catch (err) {
                    const fallback = getCachedListFallback();
                    if (fallback && fallback.length) {
                        console.warn('⚠️ Gagal fetch list, pakai cache fallback (mungkin usang).');
                        postsData = fallback;
                        return;
                    }
                    throw new Error('Gagal mengambil daftar postingan dan tidak ada cache.');
                }
            }

            function parseFrontmatter(md) {
                const m = md.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
                if (!m) return { metadata: {}, content: md };
                const meta = {};
                m[1].split('\n').forEach(line => {
                    const i = line.indexOf(':');
                    if (i > 0) meta[line.slice(0, i).trim()] = line.slice(i + 1).trim().replace(/^["']|["']$/g,
                        '');
                });
                return { metadata: meta, content: m[2] };
            }

            async function fetchPost(p) {
                const cachedContent = getCachedContent(p.name);
                if (cachedContent) {
                    const { metadata, content } = parseFrontmatter(cachedContent);
                    const html = marked.parse(content);
                    return { ...p, metadata, content, html, lastModified: null, fromCache: true };
                }

                if (!p.download_url) {
                    const fallbackContent = getCachedContentFallback(p.name);
                    if (fallbackContent) {
                        const { metadata, content } = parseFrontmatter(fallbackContent);
                        const html = marked.parse(content);
                        return { ...p, metadata, content, html, lastModified: null, fromCache: true };
                    }
                    return { ...p, metadata: {}, content: '', html: '<p>Konten tidak tersedia.</p>', lastModified: null };
                }

                try {
                    const r = await fetch(p.download_url);
                    if (!r.ok) throw new Error('fail');
                    const md = await r.text();
                    setCachedContent(p.name, md);
                    const { metadata, content } = parseFrontmatter(md);
                    const lastModified = r.headers.get('Last-Modified');
                    return { ...p, metadata, content, lastModified, html: marked.parse(content), fromCache: false };
                } catch (err) {
                    const fallbackContent = getCachedContentFallback(p.name);
                    if (fallbackContent) {
                        const { metadata, content } = parseFrontmatter(fallbackContent);
                        const html = marked.parse(content);
                        return { ...p, metadata, content, html, lastModified: null, fromCache: true };
                    }
                    return { ...p, metadata: {}, content: '', html: '<p>Gagal memuat konten.</p>', lastModified: null };
                }
            }

            function fixImageUrl(url) {
                if (!url) return '';
                if (url.includes('github.com') && !url.includes('raw.githubusercontent.com')) {
                    url = url.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
                }
                return url;
            }

            function getExcerpt(c) {
                if (!c) return '';
                let t = c.replace(/[#*`>\[\]()!|]/g, '').replace(/\n/g, ' ').trim();
                if (t.length > 80) t = t.slice(0, 80) + '...';
                return t;
            }

            function formatDate(d) {
                if (!d) return '';
                const dt = new Date(d);
                if (isNaN(dt.getTime())) return '';
                const m = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
                return `${dt.getDate()} ${m[dt.getMonth()]} ${dt.getFullYear()}`;
            }

            function buildScreenshotGallery(str) {
                if (!str) return '';
                const urls = str.split(',').map(u => fixImageUrl(u.trim())).filter(u => u.length > 0);
                if (urls.length === 0) return '';
                const lim = urls.slice(0, 10);
                const urlsAttr = urls.map(u => u.replace(/"/g, '&quot;')).join('|||');
                return `<div class="screenshot-scroll" data-all-urls="${urlsAttr}">
                    ${lim.map((u, i) => `<img src="${u}" alt="Screenshot" loading="lazy" onclick="event.stopPropagation(); openLightbox(this, ${i})">`).join('')}
                </div>`;
            }

            window.openLightbox = function(imgEl, index) {
                const container = imgEl.closest('.screenshot-scroll');
                if (!container) return;
                const allUrlsStr = container.dataset.allUrls || '';
                if (!allUrlsStr) return;
                const allUrls = allUrlsStr.split('|||');
                if (allUrls.length === 0) return;
                const existing = document.querySelector('.lightbox');
                if (existing) existing.remove();

                const lb = document.createElement('div');
                lb.className = 'lightbox';
                lb.innerHTML = `
                    <button class="lightbox-close" aria-label="Tutup"><i class="fas fa-times"></i></button>
                    <button class="lightbox-prev" aria-label="Sebelumnya"><i class="fas fa-chevron-left"></i></button>
                    <button class="lightbox-next" aria-label="Berikutnya"><i class="fas fa-chevron-right"></i></button>
                    <img src="${allUrls[index]}" alt="Screenshot" />
                    <div class="lightbox-counter">${index+1} / ${allUrls.length}</div>
                `;
                document.body.appendChild(lb);

                let currentIndex = index;
                const img = lb.querySelector('img');
                const counter = lb.querySelector('.lightbox-counter');

                function updateImage(i) {
                    if (i < 0) i = allUrls.length - 1;
                    if (i >= allUrls.length) i = 0;
                    currentIndex = i;
                    img.src = allUrls[currentIndex];
                    counter.textContent = `${currentIndex+1} / ${allUrls.length}`;
                }

                lb.querySelector('.lightbox-close').addEventListener('click', (e) => { e.stopPropagation();
                    lb.remove(); });
                lb.querySelector('.lightbox-prev').addEventListener('click', (e) => { e.stopPropagation();
                    updateImage(currentIndex - 1); });
                lb.querySelector('.lightbox-next').addEventListener('click', (e) => { e.stopPropagation();
                    updateImage(currentIndex + 1); });

                lb.addEventListener('click', (e) => {
                    if (e.target === lb) lb.remove();
                });

                function keyHandler(e) {
                    if (e.key === 'Escape') { lb.remove();
                        document.removeEventListener('keydown', keyHandler); }
                    if (e.key === 'ArrowLeft') { e.preventDefault();
                        updateImage(currentIndex - 1); }
                    if (e.key === 'ArrowRight') { e.preventDefault();
                        updateImage(currentIndex + 1); }
                }
                document.addEventListener('keydown', keyHandler);

                let touchStartX = 0;
                lb.addEventListener('touchstart', (e) => {
                    touchStartX = e.changedTouches[0].screenX;
                }, { passive: true });
                lb.addEventListener('touchend', (e) => {
                    const diff = touchStartX - e.changedTouches[0].screenX;
                    if (Math.abs(diff) > 40) {
                        if (diff > 0) updateImage(currentIndex + 1);
                        else updateImage(currentIndex - 1);
                    }
                }, { passive: true });
            };

            // ============================================================
            // COUNTER PER POSTINGAN
            // ============================================================
            async function getPostViewCount(postName, increment = true) {
                const storageKey = 'view_' + postName.replace(/[^a-zA-Z0-9]/g, '_');
                const today = new Date().toISOString().slice(0, 10);
                const key = 'destaseomods-' + postName.replace(/[^a-zA-Z0-9]/g, '-');

                let localData = null;
                try {
                    const raw = localStorage.getItem(storageKey);
                    if (raw) localData = JSON.parse(raw);
                } catch (_) {}

                if (!increment && localData) return localData.count;

                if (increment && (!localData || localData.date !== today)) {
                    try {
                        const res = await fetch(`https://countapi.mileshilliard.com/api/v1/hit/${key}`);
                        if (res.ok) {
                            const data = await res.json();
                            const count = data.value || 0;
                            localStorage.setItem(storageKey, JSON.stringify({ count, date: today }));
                            return count;
                        }
                    } catch (e) {}
                    const prev = localData ? localData.count : 0;
                    const count = prev + 1;
                    localStorage.setItem(storageKey, JSON.stringify({ count, date: today }));
                    return count;
                }

                if (!increment && !localData) {
                    try {
                        const res = await fetch(`https://countapi.mileshilliard.com/api/v1/get/${key}`);
                        if (res.ok) {
                            const data = await res.json();
                            const count = data.value || 0;
                            localStorage.setItem(storageKey, JSON.stringify({ count, date: today }));
                            return count;
                        }
                    } catch (e) {}
                    return 0;
                }
                return localData ? localData.count : 0;
            }

            // ============================================================
            // DAILY VISITOR
            // ============================================================
            async function getDailyVisitorCount() {
                const url = `https://abacus.jasoncameron.dev/hit/destaseomods.web.id/daily`;
                const storageKey = 'daily_visitor';
                const today = new Date().toISOString().slice(0, 10);
                let localData = null;
                try {
                    const raw = localStorage.getItem(storageKey);
                    if (raw) localData = JSON.parse(raw);
                } catch (_) {}
                if (localData && localData.date === today) return localData.count;
                try {
                    const controller = new AbortController();
                    const timeout = setTimeout(() => controller.abort(), 2000);
                    const res = await fetch(url, { method: 'GET', signal: controller.signal, headers: {
                            'Content-Type': 'application/json' } });
                    clearTimeout(timeout);
                    if (res.ok) {
                        const data = await res.json();
                        const count = data.value || data.count || data.views || data.hits || 1;
                        if (typeof count === 'number' && count > 0) {
                            localStorage.setItem(storageKey, JSON.stringify({ count, date: today }));
                            return count;
                        }
                    }
                } catch (e) {}
                const prevCount = (localData && typeof localData.count === 'number') ? localData.count : 0;
                const newCount = prevCount + 1;
                localStorage.setItem(storageKey, JSON.stringify({ count: newCount, date: today }));
                return newCount;
            }

            // ============================================================
            // REKOMENDASI
            // ============================================================
            function getRecommendations(currentPost, limit = 4) {
                if (!fetchedPosts || fetchedPosts.length === 0) return [];
                const others = fetchedPosts.filter(p => p.name !== currentPost.name);
                if (others.length === 0) return [];
                const currentCategory = currentPost.metadata.kategori || '';
                const sameCategory = others.filter(p => {
                    const cat = p.metadata.kategori || '';
                    return cat === currentCategory && cat !== '';
                });
                const differentCategory = others.filter(p => {
                    const cat = p.metadata.kategori || '';
                    return cat !== currentCategory || cat === '';
                });
                const shuffle = (arr) => arr.sort(() => Math.random() - 0.5);
                const combined = [...shuffle(sameCategory), ...shuffle(differentCategory)];
                return combined.slice(0, limit);
            }

            // ============================================================
            // EVENT LISTENER
            // ============================================================
            logoArea.addEventListener('click', () => navigateTo('home'));

            telegramBtn.addEventListener('click', (e) => { e.stopPropagation();
                telegramDropdown.classList.toggle('show'); });
            document.addEventListener('click', () => telegramDropdown.classList.remove('show'));
            telegramDropdown.addEventListener('click', (e) => e.stopPropagation());

            qrisDanaBtn.addEventListener('click', () => qrisOverlay.classList.remove('hidden'));
            qrisCloseBtn.addEventListener('click', () => qrisOverlay.classList.add('hidden'));
            qrisOverlay.addEventListener('click', (e) => { if (e.target === qrisOverlay) qrisOverlay.classList.add(
                    'hidden'); });
            qrisDownloadBtn.addEventListener('click', async () => {
                try {
                    const r = await fetch(QRIS_URL);
                    const b = await r.blob();
                    const u = URL.createObjectURL(b);
                    const a = document.createElement('a');
                    a.href = u;
                    a.download = 'qris-destaseo.png';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(u);
                } catch { window.open(QRIS_URL, '_blank'); }
            });

            sortSelect.addEventListener('change', () => resetAndApplyFilters());

            detailBack.addEventListener('click', function() {
                if (window.history.length > 1) {
                    window.history.back();
                } else {
                    navigateTo('home');
                }
            });

            navItems.forEach(i => i.addEventListener('click', () => {
                const page = i.dataset.page;
                if (page === 'search') {
                    const q = searchInput.value.trim() || '';
                    navigateTo('search', null, q);
                } else {
                    navigateTo(page);
                }
            }));

            searchInput.addEventListener('input', () => {
                const q = searchInput.value.trim();
                const params = new URLSearchParams(window.location.search);
                if (q) {
                    params.set('q', q);
                    params.set('page', 'search');
                } else {
                    params.delete('q');
                    if (params.get('page') === 'search') params.set('page', 'home');
                }
                const url = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
                window.history.replaceState({ page: 'search', q }, '', url);
                resetAndApplyFilters();
            });

            window.addEventListener('popstate', (e) => {
                const state = e.state || {};
                if (state.page) {
                    navigateTo(state.page, state.post, state.q);
                } else {
                    const { page, post, q } = getPageFromQuery();
                    navigateTo(page, post, q);
                }
            });

            // ============================================================
            // START
            // ============================================================
            (async () => {
                await renderHome();
            })();
        })();
    </script>
</body>
