    <style>
        /* ============================================================
           ROOT VARIABLES
           ============================================================ */
        :root {
            --bg: #04040e;
            --surface: rgba(15, 15, 30, 0.7);
            --surface2: rgba(25, 25, 45, 0.8);
            --border: rgba(255, 255, 255, 0.07);
            --text: #f5f5ff;
            --text2: #b8b8d0;
            --accent: #a87fff;
            --accent2: #3ee0ff;
            --grad1: linear-gradient(135deg, #a87fff, #3ee0ff);
            --radius: 28px;
            --radius-sm: 20px;
            --nav-height: 76px;
            --safe-bottom: env(safe-area-inset-bottom, 16px);
            --shadow-card: 0 16px 48px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.06);
            --glow: 0 0 60px rgba(168, 127, 255, 0.4);
            --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --topbar-height: 76px;
            --profile-top-offset: 20px;
        }

        /* ============================================================
           RESET & BASE
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            padding-bottom: calc(var(--nav-height) + var(--safe-bottom) + 16px);
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            position: relative;
        }
        canvas#particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.7;
        }

        /* ============================================================
           CONTAINER
           ============================================================ */
        .container {
            max-width: 820px;
            margin: 0 auto;
            padding: 12px 16px;
            position: relative;
            z-index: 2;
        }

        /* ============================================================
           TOPBAR
           ============================================================ */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 18px;
            background: rgba(12, 12, 25, 0.65);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 34px;
            margin: 12px auto;
            max-width: 700px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.7);
            position: sticky;
            top: 14px;
            z-index: 99;
            gap: 8px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .logo-img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(168, 127, 255, 0.4);
        }
        .logo-text {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 1.3rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #c084fc, #60a5fa, #34d399);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease infinite alternate;
            white-space: nowrap;
        }
        @keyframes gradientShift {
            0% {
                background-position: 0% center;
            }
            100% {
                background-position: 100% center;
            }
        }
        .telegram-wrapper {
            position: relative;
            flex-shrink: 0;
        }
        .telegram-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--accent2);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
            backdrop-filter: blur(16px);
            white-space: nowrap;
        }
        .telegram-btn:hover {
            border-color: var(--accent2);
            box-shadow: 0 0 25px rgba(62, 224, 255, 0.4);
            background: rgba(62, 224, 255, 0.1);
        }
        .telegram-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            background: var(--surface);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px;
            min-width: 160px;
            display: none;
            flex-direction: column;
            gap: 4px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.8);
            z-index: 150;
        }
        .telegram-dropdown.show {
            display: flex;
        }
        .telegram-dropdown a {
            color: var(--text);
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 14px;
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }
        .telegram-dropdown a:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }
        .telegram-dropdown a i {
            width: 18px;
            text-align: center;
        }

        /* ============================================================
           SEARCH
           ============================================================ */
        .search-container {
            margin: 8px 0 16px;
            display: flex;
            gap: 8px;
        }
        .search-input {
            flex: 1;
            background: var(--surface);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 10px 18px;
            color: #fff;
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            transition: var(--transition);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
            width: 100%;
        }
        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(168, 127, 255, 0.5);
        }
        .search-input::placeholder {
            color: var(--text2);
        }

        /* ============================================================
           CATEGORY BAR
           ============================================================ */
        .category-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
            align-items: center;
        }
        .category-chip {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 5px 12px;
            border-radius: 20px;
            color: var(--text2);
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(10px);
            white-space: nowrap;
        }
        .category-chip i {
            margin-right: 4px;
        }
        .category-chip.active,
        .category-chip:hover {
            background: rgba(168, 127, 255, 0.2);
            border-color: var(--accent);
            color: #fff;
        }
        .reset-filter {
            background: none;
            border: none;
            color: var(--accent2);
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            padding: 5px 10px;
        }
        .reset-filter i {
            margin-right: 4px;
        }

        /* ============================================================
           SORT BAR — jarak diperbesar dari carousel
           ============================================================ */
        .sort-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 18px;
            /* jarak dari carousel */
            margin-bottom: 4px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        .sort-label {
            color: var(--text2);
            font-size: 0.7rem;
            font-weight: 500;
        }
        .sort-select {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 12px;
            color: #fff;
            font-size: 0.7rem;
            font-family: inherit;
            outline: none;
            cursor: pointer;
            transition: var(--transition);
        }
        .sort-select:hover {
            border-color: var(--accent2);
        }

        /* ============================================================
           CAROUSEL
           ============================================================ */
        .popular-section {
            margin-bottom: 0;
        }
        .carousel-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: var(--radius-sm);
            background: var(--surface);
            backdrop-filter: blur(22px);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-card);
            height: 180px;
        }
        @media (min-width: 500px) {
            .carousel-wrapper {
                height: 220px;
            }
        }
        @media (min-width: 768px) {
            .carousel-wrapper {
                height: 260px;
            }
        }
        .carousel-track {
            display: flex;
            height: 100%;
            position: relative;
        }
        .carousel-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
        }
        .carousel-slide.active {
            opacity: 1;
            z-index: 1;
        }
        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }
        .carousel-slide .slide-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px 16px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .carousel-slide .slide-title {
            font-weight: 800;
            font-size: 0.9rem;
            line-height: 1.3;
        }
        @media (min-width: 500px) {
            .carousel-slide .slide-title {
                font-size: 1rem;
            }
        }
        .carousel-title-top {
            position: absolute;
            top: 12px;
            left: 14px;
            font-size: 0.7rem;
            font-weight: 700;
            color: #fff;
            z-index: 5;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            padding: 4px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
        }
        @media (min-width: 500px) {
            .carousel-title-top {
                font-size: 0.8rem;
                padding: 5px 14px;
            }
        }
        .carousel-counter {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(6px);
            color: #fff;
            padding: 3px 10px;
            border-radius: 14px;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        @media (min-width: 500px) {
            .carousel-counter {
                font-size: 0.75rem;
                padding: 4px 12px;
            }
        }

        /* ============================================================
           POST GRID
           ============================================================ */
        .post-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
            margin-top: 2px;
        }
        @media (min-width: 420px) {
            .post-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }
        }
        @media (min-width: 768px) {
            .post-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 18px;
            }
        }
        @media (min-width: 1024px) {
            .post-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
            }
        }

        .post-card {
            background: var(--surface);
            backdrop-filter: blur(22px);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.45s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
            transform: translateY(25px);
        }
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .post-card:hover {
            transform: translateY(-6px) scale(1.01);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: var(--glow), 0 25px 50px rgba(0, 0, 0, 0.9);
        }
        .post-card:active {
            transform: scale(0.97);
        }
        .card-img {
            width: 100%;
            height: 130px;
            object-fit: cover;
            background: linear-gradient(135deg, #1e1e35, #10101c);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text2);
            font-size: 2.5rem;
            position: relative;
            overflow: hidden;
        }
        @media (min-width: 420px) {
            .card-img {
                height: 140px;
            }
        }
        @media (min-width: 768px) {
            .card-img {
                height: 160px;
            }
        }
        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .card-img .placeholder-icon {
            display: none;
            font-size: 2.5rem;
        }
        .card-img.error .placeholder-icon {
            display: block;
        }
        .card-img.error img {
            display: none;
        }
        .version-badge-img {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            color: #fff;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.6rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            z-index: 2;
        }
        @media (min-width: 500px) {
            .version-badge-img {
                font-size: 0.65rem;
                padding: 3px 10px;
            }
        }
        .card-body {
            padding: 12px 14px 14px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .card-title {
            font-weight: 800;
            font-size: 0.8rem;
            line-height: 1.3;
            color: #fff;
        }
        @media (min-width: 500px) {
            .card-title {
                font-size: 0.85rem;
            }
        }
        .card-meta {
            font-size: 0.65rem;
            color: var(--text2);
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .badge {
            background: rgba(168, 127, 255, 0.2);
            color: #cfc4ff;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.6rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .badge:hover {
            background: rgba(168, 127, 255, 0.4);
            color: #fff;
        }
        .card-excerpt {
            font-size: 0.68rem;
            color: var(--text2);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ============================================================
           LOAD MORE
           ============================================================ */
        .load-more-btn {
            display: block;
            margin: 20px auto 0;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--accent2);
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(16px);
        }
        .load-more-btn:hover {
            border-color: var(--accent2);
            box-shadow: 0 0 25px rgba(62, 224, 255, 0.4);
            background: rgba(62, 224, 255, 0.1);
        }

        /* ============================================================
           HIDDEN
           ============================================================ */
        .hidden {
            display: none !important;
        }

        /* ============================================================
           DETAIL PAGE
           ============================================================ */
        .detail-header,
        .profile-card {
            background: var(--surface);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-card);
        }
        @media (min-width: 500px) {
            .detail-header,
            .profile-card {
                padding: 28px;
            }
        }
        .detail-img {
            display: block;
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 20px;
            background: var(--surface2);
            margin: 0 auto 14px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
        }
        @media (min-width: 500px) {
            .detail-img {
                width: 100px;
                height: 100px;
                margin-bottom: 16px;
            }
        }

        .detail-title {
            font-size: 0.95rem;
            font-weight: 800;
            letter-spacing: -0.3px;
            text-align: center;
            line-height: 1.3;
        }
        @media (min-width: 500px) {
            .detail-title {
                font-size: 1.05rem;
            }
        }

        .detail-meta-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin: 10px 0 4px;
        }
        @media (min-width: 500px) {
            .detail-meta-grid {
                gap: 8px;
                margin: 12px 0 6px;
            }
        }
        @media (min-width: 640px) {
            .detail-meta-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        @media (min-width: 820px) {
            .detail-meta-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 10px;
            }
        }

        .meta-item {
            background: var(--surface2);
            padding: 6px 6px;
            border-radius: 12px;
            font-size: 0.6rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 52px;
        }
        @media (min-width: 500px) {
            .meta-item {
                padding: 8px 8px;
                font-size: 0.7rem;
                min-height: 58px;
            }
        }
        .meta-item i {
            color: var(--accent2);
            margin-bottom: 2px;
            font-size: 0.75rem;
        }
        @media (min-width: 500px) {
            .meta-item i {
                font-size: 0.85rem;
                margin-bottom: 3px;
            }
        }
        .meta-item strong {
            color: var(--accent2);
            font-size: 0.6rem;
            font-weight: 700;
        }
        @media (min-width: 500px) {
            .meta-item strong {
                font-size: 0.7rem;
            }
        }

        /* ============================================================
           DOWNLOAD BUTTON
           ============================================================ */
        .big-download {
            display: block;
            width: 100%;
            background: var(--grad1);
            border: none;
            color: #04040e;
            font-weight: 700;
            font-size: 0.95rem;
            padding: 14px;
            border-radius: 18px;
            margin: 16px 0 0;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: -0.3px;
            text-decoration: none;
            text-align: center;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.6);
        }
        @media (min-width: 500px) {
            .big-download {
                font-size: 1rem;
                padding: 15px;
                margin-top: 20px;
            }
        }
        .big-download i {
            margin-right: 6px;
        }
        .big-download:active {
            transform: scale(0.96);
        }
        .big-download.disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        .big-download.counting {
            opacity: 0.8;
            pointer-events: none;
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
        }

        /* ============================================================
           CONTENT BOX
           ============================================================ */
        .content-box {
            background: var(--surface);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            line-height: 1.8;
            box-shadow: var(--shadow-card);
            white-space: pre-line;
            max-width: 100%;
            box-sizing: border-box;
            overflow: hidden;
            word-wrap: break-word;
        }
        @media (min-width: 500px) {
            .content-box {
                padding: 16px 28px;
            }
        }
        .content-box img {
            max-width: 100%;
            border-radius: 16px;
            margin: 12px 0;
        }
        .content-box pre {
            background: #050510;
            padding: 16px;
            border-radius: 16px;
            overflow-x: auto;
            white-space: pre;
            font-size: 0.8rem;
        }

        /* ============================================================
           BACK BUTTON
           ============================================================ */
        .back-btn {
            background: none;
            border: none;
            color: var(--accent2);
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 8px 0;
            transition: opacity 0.2s;
        }
        .back-btn:hover {
            opacity: 0.8;
        }

        /* ============================================================
           PROFILE — scroll agar tidak ketutupan topbar + badge premium
           ============================================================ */
        #profile-section {
            scroll-margin-top: 100px;
            /* saat di-navigate via hash, turun */
            padding-top: 10px;
            /* tambahan top padding biar tidak mepet */
        }

        .profile-card {
            position: relative;
            /* untuk badge absolute */
            overflow: hidden;
        }

        /* 🔥 BADGE PREMIUM di pojok kanan atas card profil */
        .premium-badge {
            position: absolute;
            top: 14px;
            right: 14px;
            background: linear-gradient(135deg, #f7b731, #f5a623);
            color: #1a1a2e;
            font-size: 0.6rem;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 20px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            box-shadow: 0 4px 16px rgba(245, 166, 35, 0.5);
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 5;
            border: 1px solid rgba(255, 215, 0, 0.3);
            backdrop-filter: blur(4px);
        }
        .premium-badge i {
            font-size: 0.55rem;
            color: #1a1a2e;
        }
        @media (min-width: 500px) {
            .premium-badge {
                top: 18px;
                right: 18px;
                font-size: 0.7rem;
                padding: 5px 14px;
            }
            .premium-badge i {
                font-size: 0.65rem;
            }
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--surface2);
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #fff;
            box-shadow: 0 10px 40px rgba(255, 100, 165, 0.4);
            background-size: cover;
            background-position: center;
            position: relative;
            z-index: 1;
        }
        @media (min-width: 500px) {
            .profile-avatar {
                width: 100px;
                height: 100px;
                font-size: 2.8rem;
                margin-bottom: 20px;
            }
        }
        .profile-name {
            text-align: center;
            font-size: 1.3rem;
            font-weight: 800;
            position: relative;
            z-index: 1;
        }
        @media (min-width: 500px) {
            .profile-name {
                font-size: 1.5rem;
            }
        }
        .profile-bio {
            text-align: center;
            color: var(--text2);
            margin: 8px 0 16px;
            font-size: 0.9rem;
            position: relative;
            z-index: 1;
        }
        @media (min-width: 500px) {
            .profile-bio {
                margin: 10px 0 20px;
            }
        }
        .social-links {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }
        .social-link {
            background: var(--surface2);
            padding: 8px 16px;
            border-radius: 30px;
            color: var(--accent2);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.8rem;
            transition: var(--transition);
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        @media (min-width: 500px) {
            .social-link {
                padding: 10px 20px;
                font-size: 0.85rem;
                gap: 8px;
            }
        }
        .social-link i {
            font-size: 0.9rem;
        }
        .social-link:hover {
            border-color: var(--accent2);
            background: rgba(62, 224, 255, 0.1);
        }
        .donate-section {
            margin-top: 20px;
            text-align: center;
            border-top: 1px solid var(--border);
            padding-top: 16px;
            position: relative;
            z-index: 1;
        }
        @media (min-width: 500px) {
            .donate-section {
                margin-top: 24px;
                padding-top: 20px;
            }
        }
        .donate-title {
            color: var(--text2);
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .donate-links {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* ============================================================
           QRIS OVERLAY
           ============================================================ */
        .qris-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 250;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 20px;
        }
        .qris-overlay.hidden {
            display: none;
        }
        .qris-container {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            text-align: center;
            max-width: 340px;
            width: 90%;
        }
        @media (min-width: 500px) {
            .qris-container {
                padding: 24px;
                max-width: 360px;
            }
        }
        .qris-container img {
            width: 100%;
            border-radius: 16px;
            margin-bottom: 14px;
        }
        .qris-close-btn,
        .qris-download-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: #fff;
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            margin: 4px;
        }
        .qris-close-btn:hover,
        .qris-download-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* ============================================================
           TAGS & SCREENSHOT
           ============================================================ */
        .tags-container {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .tag-badge {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text2);
            padding: 2px 8px;
            border-radius: 14px;
            font-size: 0.6rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        @media (min-width: 500px) {
            .tag-badge {
                font-size: 0.65rem;
                padding: 3px 10px;
            }
        }
        .screenshot-scroll {
            display: flex;
            flex-wrap: nowrap;
            gap: 10px;
            overflow-x: auto;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 8px;
            margin-top: 12px;
            max-width: 100%;
            touch-action: pan-x;
        }
        .screenshot-scroll img {
            flex: 0 0 auto;
            width: 120px;
            height: 180px;
            object-fit: cover;
            border-radius: 14px;
            cursor: pointer;
            transition: transform 0.2s;
            background: var(--surface2);
            border: 1px solid var(--border);
        }
        @media (min-width: 500px) {
            .screenshot-scroll img {
                width: 150px;
                height: 220px;
            }
        }
        .screenshot-scroll img:hover {
            transform: scale(1.03);
            border-color: var(--accent);
        }

        /* ============================================================
           LIGHTBOX
           ============================================================ */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(12px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            cursor: default;
            animation: fadeInLight 0.25s ease;
        }
        @keyframes fadeInLight {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .lightbox img {
            max-width: 92vw;
            max-height: 82vh;
            border-radius: 16px;
            object-fit: contain;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
            user-select: none;
            -webkit-user-drag: none;
        }
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            backdrop-filter: blur(8px);
        }
        .lightbox-close:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        .lightbox-prev,
        .lightbox-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #fff;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            backdrop-filter: blur(8px);
        }
        .lightbox-prev {
            left: 20px;
        }
        .lightbox-next {
            right: 20px;
        }
        .lightbox-prev:hover,
        .lightbox-next:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-50%) scale(1.05);
        }
        .lightbox-counter {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.8);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
            letter-spacing: 0.5px;
        }
        @media (max-width: 500px) {
            .lightbox-prev,
            .lightbox-next {
                width: 36px;
                height: 36px;
                font-size: 0.9rem;
            }
            .lightbox-prev {
                left: 8px;
            }
            .lightbox-next {
                right: 8px;
            }
            .lightbox-close {
                top: 12px;
                right: 12px;
                width: 36px;
                height: 36px;
                font-size: 1rem;
            }
            .lightbox img {
                max-width: 98vw;
                max-height: 78vh;
            }
            .lightbox-counter {
                font-size: 0.7rem;
                padding: 4px 14px;
                bottom: 18px;
            }
        }

        /* ============================================================
           BOTTOM NAV
           ============================================================ */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(5, 5, 15, 0.85);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: var(--nav-height);
            padding-bottom: var(--safe-bottom);
            z-index: 100;
            box-shadow: 0 -6px 30px rgba(0, 0, 0, 0.8);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text2);
            font-size: 0.6rem;
            font-weight: 600;
            gap: 3px;
            transition: 0.25s;
            cursor: pointer;
            background: none;
            border: none;
            padding: 8px 14px;
            border-radius: 24px;
        }
        @media (min-width: 500px) {
            .nav-item {
                font-size: 0.7rem;
                padding: 10px 18px;
                gap: 5px;
            }
        }
        .nav-item.active {
            color: var(--accent2);
            background: rgba(62, 224, 255, 0.12);
        }
        .nav-item i {
            font-size: 1.1rem;
        }
        @media (min-width: 500px) {
            .nav-item i {
                font-size: 1.3rem;
            }
        }

        /* ============================================================
           SPINNER
           ============================================================ */
        .spinner {
            width: 40px;
            height: 40px;
            margin: 40px auto;
            border: 3px solid rgba(255, 255, 255, 0.06);
            border-top-color: var(--accent2);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .empty-text,
        .error-text {
            text-align: center;
            padding: 40px 20px;
            color: var(--text2);
            background: rgba(255, 0, 0, 0.07);
            border-radius: 24px;
            margin: 20px 0;
            font-size: 0.9rem;
        }
        .filter-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            font-size: 0.8rem;
            color: var(--accent2);
            flex-wrap: wrap;
        }

        /* ============================================================
           DAILY VISITOR
           ============================================================ */
        .daily-visitor {
            margin-top: 14px;
            padding: 10px 14px;
            background: var(--surface2);
            border-radius: 16px;
            text-align: center;
            border: 1px solid var(--border);
            font-weight: 600;
            color: var(--accent2);
            max-width: 100%;
            box-sizing: border-box;
            overflow: hidden;
            word-wrap: break-word;
            font-size: 0.85rem;
        }
        @media (min-width: 500px) {
            .daily-visitor {
                margin-top: 16px;
                padding: 12px 16px;
                font-size: 0.95rem;
            }
        }
        .daily-visitor i {
            margin-right: 6px;
        }
        .daily-visitor span {
            color: #fff;
            font-weight: 700;
        }

        /* ============================================================
           REKOMENDASI
           ============================================================ */
        .recommendations-section {
            margin-top: 20px;
            padding: 16px 0;
            border-top: 1px solid var(--border);
        }
        @media (min-width: 500px) {
            .recommendations-section {
                margin-top: 24px;
                padding: 20px 0;
            }
        }
        .recommendations-section h3 {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        @media (min-width: 500px) {
            .recommendations-section h3 {
                font-size: 0.95rem;
                margin-bottom: 14px;
            }
        }
        .recommendations-section h3 i {
            color: var(--accent2);
        }
        .rec-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        @media (min-width: 500px) {
            .rec-grid {
                gap: 12px;
            }
        }
        @media (min-width: 600px) {
            .rec-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        .rec-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .rec-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 8px 24px rgba(168, 127, 255, 0.3);
        }
        .rec-card img {
            width: 100%;
            height: 90px;
            object-fit: cover;
            background: var(--surface2);
        }
        @media (min-width: 500px) {
            .rec-card img {
                height: 110px;
            }
        }
        .rec-card .rec-title {
            padding: 8px 10px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #fff;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        @media (min-width: 500px) {
            .rec-card .rec-title {
                padding: 10px 12px;
                font-size: 0.75rem;
            }
        }

        /* ============================================================
           PROFILE FOOTER TEXT
           ============================================================ */
        #profile-footer-text {
            max-width: 100%;
            box-sizing: border-box;
            overflow: hidden;
            word-wrap: break-word;
        }
        .profile-card,
        .content-box {
            max-width: 100%;
            box-sizing: border-box;
            overflow: hidden;
            word-wrap: break-word;
        }

        /* ============================================================
           MEDIA QUERIES EKSTRA - HP KECIL
           ============================================================ */
        @media (max-width: 360px) {
            .logo-text {
                font-size: 1rem;
            }
            .logo-img {
                width: 28px;
                height: 28px;
            }
            .topbar {
                padding: 10px 14px;
                border-radius: 28px;
            }
            .telegram-btn {
                font-size: 0.65rem;
                padding: 5px 10px;
            }
            .container {
                padding: 8px 12px;
            }
            .post-grid {
                gap: 10px;
            }
            .card-img {
                height: 100px;
            }
            .card-title {
                font-size: 0.7rem;
            }
            .card-body {
                padding: 8px 10px 10px;
            }
            .carousel-wrapper {
                height: 140px;
            }
            .carousel-slide .slide-title {
                font-size: 0.75rem;
            }
            .detail-title {
                font-size: 0.85rem;
            }
            .detail-header {
                padding: 14px;
            }
            .meta-item {
                font-size: 0.5rem;
                padding: 4px 4px;
                min-height: 44px;
            }
            .meta-item strong {
                font-size: 0.5rem;
            }
            .meta-item i {
                font-size: 0.65rem;
            }
            .rec-card img {
                height: 70px;
            }
            .rec-card .rec-title {
                font-size: 0.6rem;
                padding: 6px 8px;
            }
            .rec-grid {
                gap: 8px;
            }
            .daily-visitor {
                font-size: 0.75rem;
                padding: 8px 10px;
            }
            .nav-item {
                font-size: 0.5rem;
                padding: 6px 10px;
            }
            .nav-item i {
                font-size: 0.9rem;
            }
            .bottom-nav {
                height: 64px;
            }
            .premium-badge {
                top: 10px;
                right: 10px;
                font-size: 0.5rem;
                padding: 3px 10px;
            }
            .premium-badge i {
                font-size: 0.45rem;
            }
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>

    <!-- QRIS Overlay -->
    <div class="qris-overlay hidden" id="qris-overlay">
        <div class="qris-container">
            <img src="https://i.ibb.co.com/JR9twX72/20250220-123026-destaseo-wapkizs-com.png" alt="QRIS Dana" id="qris-img" />
            <div>
                <button class="qris-download-btn" id="qris-download-btn"><i class="fas fa-download"></i> Download Gambar</button>
                <button class="qris-close-btn" id="qris-close-btn"><i class="fas fa-times"></i> Tutup</button>
            </div>
        </div>
    </div>

    <!-- Topbar -->
    <div class="topbar">
        <div class="logo-area">
            <img src="https://avatars.githubusercontent.com/u/189899710?v=4" alt="Logo Destaseo Mods" class="logo-img" />
            <span class="logo-text">Destaseo Mods</span>
        </div>
        <div class="telegram-wrapper">
            <button class="telegram-btn" id="telegram-btn" aria-label="Menu Telegram"><i class="fab fa-telegram-plane"></i> Telegram</button>
            <div class="telegram-dropdown" id="telegram-dropdown">
                <a href="https://t.me/destaseo" target="_blank"><i class="fas fa-user"></i> Admin</a>
                <a href="https://t.me/+wlXhR-M2BbliMDU1" target="_blank"><i class="fas fa-bullhorn"></i> Channel</a>
            </div>
        </div>
    </div>

    <!-- Main -->
    <main class="container" id="app">
        <section id="home-section" aria-label="Beranda">
            <div class="search-container hidden" id="search-box">
                <input type="text" class="search-input" id="search-input" placeholder="Cari mod favorit..." aria-label="Cari mod" />
            </div>
            <div class="category-bar" id="category-bar" role="tablist" aria-label="Kategori"></div>
            <div class="popular-section" id="popular-section">
                <div class="carousel-wrapper">
                    <div class="carousel-title-top"><i class="fas fa-hashtag"></i> Urutan Populer</div>
                    <div class="carousel-track" id="carousel-track"></div>
                </div>
            </div>

            <!-- SORT BAR — jarak diperbesar dari carousel (margin-top: 18px) -->
            <div class="sort-bar" id="sort-bar">
                <span class="sort-label"><i class="fas fa-sort-amount-down"></i> Urutkan:</span>
                <select class="sort-select" id="sort-select" aria-label="Urutkan postingan">
                    <option value="terbaru" selected>Terbaru</option>
                    <option value="terlama">Terlama</option>
                    <option value="az">Judul A-Z</option>
                    <option value="za">Judul Z-A</option>
                </select>
            </div>

            <!-- Filter indicator -->
            <div id="filter-indicator" class="filter-indicator hidden"></div>

            <!-- POST GRID -->
            <div id="post-container" class="post-grid"></div>
            <div id="load-more-container" style="text-align:center;"></div>
        </section>

        <section id="detail-section" class="hidden" aria-label="Detail Mod">
            <button class="back-btn" id="detail-back" aria-label="Kembali"><i class="fas fa-arrow-left"></i> Kembali</button>
            <div id="detail-content"></div>

            function resizeCanvas() {

            window.addEventListener('resize', resizeCanvas);

            class Particle {
                constructor() { this.reset(); }
                reset() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.vx = (Math.random() - 0.5) * 0.5;
                    this.vy = (Math.random() - 0.5) * 0.5;
                    this.radius = Math.random() * 2.5 + 1;
                    this.opacity = Math.random() * 0.5 + 0.2;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                    if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(168,127,255,${this.opacity})`;
                    ctx.fill();
                }
            }
            for (let i = 0; i < maxParticles; i++) particles.push(new Particle());

            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => { p.update();
                    p.draw(); });
                requestAnimationFrame(animateParticles);
            }

            async function getPostViewCount(postName) {
                // Endpoint Abacus dengan parameter query post
                const url = `https://abacus.jasoncameron.dev/hit/destaseomods.web.id/awesomeclick?post=${encodeURIComponent(postName)}`;
                const storageKey = 'view_' + postName.replace(/[^a-zA-Z0-9]/g, '_');
                const today = new Date().toISOString().slice(0, 10);

                try {
                    const controller = new AbortController();
                    const timeout = setTimeout(() => controller.abort(), 3000);
                    const res = await fetch(url, {
                        method: 'GET',
                        signal: controller.signal,
                        headers: { 'Content-Type': 'application/json' }
                    });
                    clearTimeout(timeout);

                    if (res.ok) {
                        const data = await res.json();
                        // Abacus biasanya mengembalikan { value: count } atau { count: ... }
                        const count = data.value || data.count || 0;
                        if (count > 0) {
                            localStorage.setItem(storageKey, JSON.stringify({ count, date: today }));
                            return count;
                        }
                    }
                } catch (e) {
                    console.warn('Abacus API error, pakai fallback lokal');
                }

                // Fallback ke localStorage
                let localData = null;
                try {
                    const raw = localStorage.getItem(storageKey);
                    if (raw) localData = JSON.parse(raw);
                } catch (_) {}
                if (localData && localData.date === today) {
                    return localData.count;
                }
                const prevCount = (localData && typeof localData.count === 'number') ? localData.count : 0;
                const newCount = prevCount + 1;
                localStorage.setItem(storageKey, JSON.stringify({ count: newCount, date: today }));
                return newCount;
            }

            async function fetchPostList() {
                const cached = getCachedList();

                const apiUrl = `https://api.github.com/repos/${GITHUB_REPO}/contents/posts`;
                try {
                    const res = await fetch(apiUrl);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const files = await res.json();
                    const mdFiles = files.filter(f => f.name.endsWith('.md'));
                    if (!mdFiles.length) throw new Error('Tidak ada file .md');
                    postsData = mdFiles.map(f => ({ filename: f.name, name: f.name.replace('.md', ''), download_url: f
                            .download_url }));
                    setCachedList(postsData);
                } catch (err) {
                    const fallback = getCachedListFallback();
                    if (fallback && fallback.length) {
                        console.warn('⚠️ Gagal fetch list, pakai cache fallback (mungkin usang).');
                        postsData = fallback;
                        return;
                    }
                    throw new Error('Gagal mengambil daftar postingan dan tidak ada cache.');
                }
            }

            function parseFrontmatter(md) {
                const m = md.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
                if (!m) return { metadata: {}, content: md };
                const meta = {};
                m[1].split('\n').forEach(line => {
                    const i = line.indexOf(':');
                    if (i > 0) meta[line.slice(0, i).trim()] = line.slice(i + 1).trim().replace(/^["']|["']$/g,
                        '');
                });
                return { metadata: meta, content: m[2] };
            }

            async function fetchPost(p) {
                const cachedContent = getCachedContent(p.name);
                if (cachedContent) {
                    const { metadata, content } = parseFrontmatter(cachedContent);
                    const html = marked.parse(content);
                    return { ...p, metadata, content, html, lastModified: null, fromCache: true };
                }

                if (!p.download_url) {
                    const fallbackContent = getCachedContentFallback(p.name);
                    if (fallbackContent) {
                        const { metadata, content } = parseFrontmatter(fallbackContent);
                        const html = marked.parse(content);
                        return { ...p, metadata, content, html, lastModified: null, fromCache: true };
                    }
                    return { ...p, metadata: {}, content: '', html: '<p>Konten tidak tersedia.</p>', lastModified: null };
                }

                try {
                    const r = await fetch(p.download_url);
                    if (!r.ok) throw new Error('fail');
                    const md = await r.text();
                    setCachedContent(p.name, md);
                    const { metadata, content } = parseFrontmatter(md);
                    const lastModified = r.headers.get('Last-Modified');
                    return { ...p, metadata, content, lastModified, html: marked.parse(content), fromCache: false };
                } catch (err) {
                    const fallbackContent = getCachedContentFallback(p.name);
                    if (fallbackContent) {
                        const { metadata, content } = parseFrontmatter(fallbackContent);
                        const html = marked.parse(content);
                        return { ...p, metadata, content, html, lastModified: null, fromCache: true };
                    }
                    return { ...p, metadata: {}, content: '', html: '<p>Gagal memuat konten.</p>', lastModified: null };
                }
            }
