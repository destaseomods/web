                let html = '<span class="category-chip' + (!activeKatFilter ? ' active' : '') +
                    '" data-kat="" role="tab" aria-selected="' + (!activeKatFilter ? 'true' : 'false') + '"><i class="fas fa-globe"></i> Semua</span>';
                kats.forEach(kat => html +=
                    `<span class="category-chip${activeKatFilter === kat ? ' active' : ''}" data-kat="${kat}" role="tab" aria-selected="${activeKatFilter === kat ? 'true' : 'false'}"><i class="fas fa-tag"></i> ${kat}</span>`
                    );
                if (activeKatFilter) html +=
                    '<button class="reset-filter" id="reset-filter"><i class="fas fa-times"></i> Hapus filter</button>';
                categoryBar.innerHTML = html;
                categoryBar.querySelectorAll('.category-chip').forEach(chip => chip.addEventListener('click', () => {
                    activeKatFilter = chip.dataset.kat || null;
                    resetAndApplyFilters();
                    renderCategoryBar();
                }));
                const resetBtn = document.getElementById('reset-filter');
                if (resetBtn) resetBtn.addEventListener('click', () => { activeKatFilter = null;
                    resetAndApplyFilters();
                    renderCategoryBar(); });
            }

            function getFilteredPosts() {
                const q = searchInput.value.trim().toLowerCase();
                let f = fetchedPosts;
                if (activeKatFilter) f = f.filter(p => (p.metadata.kategori || '') === activeKatFilter);
                if (q) f = f.filter(p => {
                    const t = (p.metadata.judul || p.metadata.title || p.name).toLowerCase();
                    return t.includes(q);
                });
                return f;
            }

            function sortPosts(posts) {
                const sortBy = sortSelect.value;
                const sorted = [...posts];
                const getTime = (p) => {
                    const d = p.metadata.tanggal || p.metadata.date || p.lastModified;
                    if (!d) return 0;
                    const t = new Date(d);
                    return isNaN(t.getTime()) ? 0 : t.getTime();
                };
                switch (sortBy) {
                    case 'terbaru':
                        sorted.sort((a, b) => getTime(b) - getTime(a));
                        break;
                    case 'terlama':
                        sorted.sort((a, b) => getTime(a) - getTime(b));
                        break;
                    case 'az':
                        sorted.sort((a, b) => {
                            const tA = (a.metadata.judul || a.metadata.title || a.name || '').toLowerCase();
                            const tB = (b.metadata.judul || b.metadata.title || b.name || '').toLowerCase();
                            return tA.localeCompare(tB);
                        });
                        break;
                    case 'za':
                        sorted.sort((a, b) => {
                            const tA = (a.metadata.judul || a.metadata.title || a.name || '').toLowerCase();
                            const tB = (b.metadata.judul || b.metadata.title || b.name || '').toLowerCase();
                            return tB.localeCompare(tA);
                        });
                        break;
                }
                return sorted;
            }

            function resetAndApplyFilters() {
                currentDisplayCount = 0;
                applyFilters();
            }

            function applyFilters() {
                let filtered = getFilteredPosts();
                filtered = sortPosts(filtered);
                if (activeKatFilter) {
                    filterIndicator.classList.remove('hidden');
                    filterIndicator.innerHTML =
                        `<i class="fas fa-filter"></i> Kategori: <strong>${activeKatFilter}</strong> (${filtered.length} hasil)`;
                } else filterIndicator.classList.add('hidden');
                currentDisplayCount = Math.min(ITEMS_PER_PAGE, filtered.length);
                displayPosts(filtered.slice(0, currentDisplayCount));
                renderLoadMoreButton(filtered.length);
            }

            function displayPosts(posts) {
                postContainer.innerHTML = posts.length ? posts.map((p, i) => cardHTML(p, i)).join('') :
                    '<div class="empty-text">🔍 Tidak ada postingan yang cocok.</div>';
                attachCardEvents();
            }

            function renderLoadMoreButton(t) {
                if (currentDisplayCount < t) {
                    loadMoreContainer.innerHTML =
                        `<button class="load-more-btn" id="load-more-btn"><i class="fas fa-chevron-down"></i> Muat Lebih Banyak (${t - currentDisplayCount})</button>`;
                    document.getElementById('load-more-btn').addEventListener('click', loadMorePosts);
                } else {
                    loadMoreContainer.innerHTML = '';
                }
            }

            function loadMorePosts() {
                let f = getFilteredPosts();
                f = sortPosts(f);
                const n = Math.min(currentDisplayCount + ITEMS_PER_PAGE, f.length);
                const newPosts = f.slice(currentDisplayCount, n);
                currentDisplayCount = n;
                newPosts.forEach((p, i) => {
                    const card = cardHTML(p, i);
                    postContainer.insertAdjacentHTML('beforeend', card);
                });
                attachCardEvents();
                renderLoadMoreButton(f.length);
            }

            function cardHTML(post, index) {
                const t = post.metadata.judul || post.metadata.title || post.name.replace(/[-_]/g, ' ');
                const img = fixImageUrl(post.metadata.gambar || post.metadata.image || '');
                const kategori = post.metadata.kategori || '';
                const ver = post.metadata.versi || post.metadata.version || '';
                const excerpt = getExcerpt(post.content);
                const delay = index * 0.04 + 's';
                const imgTag = img ?
                    `<img src="${img}" alt="${t}" loading="lazy" onerror="this.parentElement.classList.add('error')">` :
                    '';
                const versionBadge = ver ? `<span class="version-badge-img"><i class="fas fa-code-branch"></i> v${ver}</span>` :
                    '';
                return `<div class="post-card" data-name="${post.name}" style="animation-delay:${delay};">
                    <div class="card-img${img ? '' : ' error'}">${imgTag}<span class="placeholder-icon"><i class="fas fa-box-open"></i></span>${versionBadge}</div>
                    <div class="card-body"><div class="card-title">${t}</div><div class="card-meta">${kategori ? `<span class="badge" data-kat="${kategori}" role="button"><i class="fas fa-folder"></i> ${kategori}</span>` : ''}</div>${excerpt ? `<p class="card-excerpt">${excerpt}</p>` : ''}</div>
                </div>`;
            }

            function attachCardEvents() {
                document.querySelectorAll('.post-card').forEach(c => c.addEventListener('click', (e) => {
                    if (e.target.closest('.badge')) return;
                    setHash('detail', c.dataset.name);
                }));
                document.querySelectorAll('.badge').forEach(b => b.addEventListener('click', (e) => {
                    e.stopPropagation();
                    activeKatFilter = b.dataset.kat;
                    searchInput.value = '';
                    resetAndApplyFilters();
                    renderCategoryBar();
                }));
            }

            function stopCarousel() {
                if (carouselInterval) { clearInterval(carouselInterval);
                    carouselInterval = null; }
            }

            function startCarousel() {
                stopCarousel();
                if (totalPopularSlides === 0) return;
                updateCarousel(0);
                carouselInterval = setInterval(() => {
                    currentSlide = (currentSlide + 1) % totalPopularSlides;
                    updateCarousel(currentSlide);
                }, 4000);
            }

            function updateCarousel(i) {
                const slides = document.querySelectorAll('.carousel-slide');
                slides.forEach((s, idx) => s.classList.toggle('active', idx === i));
                document.querySelectorAll('.carousel-counter').forEach((c, idx) => {
                    c.textContent = `${i+1}/${totalPopularSlides}`;
                });
            }

            function renderPopularSection() {
                if (!fetchedPosts.length) { carouselTrack.innerHTML = '';
                    totalPopularSlides = 0; return; }
                let pop = fetchedPosts.filter(p => p.metadata.populer && p.metadata.populer.toLowerCase() === 'true');
                if (pop.length === 0) pop = fetchedPosts.slice(0, 4);
                else pop = pop.slice(0, 4);
                totalPopularSlides = pop.length;
                carouselTrack.innerHTML = pop.map((p, i) => {
                    const img = fixImageUrl(p.metadata.gambar || p.metadata.image || '');
                    const title = p.metadata.judul || p.metadata.title || p.name.replace(/[-_]/g, ' ');
                    return `<div class="carousel-slide${i === 0 ? ' active' : ''}" data-name="${p.name}">${img ? `<img src="${img}" alt="${title}" loading="lazy" onerror="this.style.display='none'">` : ''}<div class="slide-overlay"><div class="slide-title">${title}</div><span class="carousel-counter">${i+1}/${pop.length}</span></div></div>`;
                }).join('');
                document.querySelectorAll('.carousel-slide').forEach(s => s.addEventListener('click', () => setHash(
                    'detail', s.dataset.name)));
            }

            async function renderHome() {
                postContainer.innerHTML = '<div class="spinner"></div>';
                loadMoreContainer.innerHTML = '';
                categoryBar.innerHTML = '';
                carouselTrack.innerHTML = '';
                stopCarousel();
                try {
                    await fetchPostList();
                    if (!postsData.length) {
                        postContainer.innerHTML = '<div class="empty-text"><i class="far fa-folder-open"></i> Tidak ada postingan.</div>';
                        return;
                    }
                    fetchedPosts = await Promise.all(postsData.map(fetchPost));
                    renderPopularSection();
                    renderCategoryBar();
                    resetAndApplyFilters();
                    startCarousel();
                    updateMetaTags('Destaseo Mods • Premium Mod APK', 'Situs download mod APK premium terbaik. Dapatkan aplikasi modifikasi terbaru gratis.', LOGO_URL, 'https://destaseomods.web.id/');
                } catch (err) {
                    postContainer.innerHTML = `<div class="error-text">⚠️ Gagal memuat data. Coba refresh halaman. <br><small>${err.message}</small></div>`;
                }
            }

            // ============================================================
            // DETAIL & COUNTER PER POST
            // ============================================================

            function buildScreenshotGallery(str) {
                if (!str) return '';
                const urls = str.split(',').map(u => fixImageUrl(u.trim())).filter(u => u.length > 0);
                if (urls.length === 0) return '';
                // 🔥 TAMPILKAN 10 GAMBAR
                const lim = urls.slice(0, 10);
                const urlsAttr = urls.map(u => u.replace(/"/g, '&quot;')).join('|||');
                return `<div class="screenshot-scroll" data-all-urls="${urlsAttr}">
                    ${lim.map((u, i) => `<img src="${u}" alt="Screenshot" loading="lazy" onclick="event.stopPropagation(); openLightbox(this, ${i})">`).join('')}
                </div>`;
            }

            window.openLightbox = function(imgEl, index) {
                const container = imgEl.closest('.screenshot-scroll');
                if (!container) return;
                const allUrlsStr = container.dataset.allUrls || '';
                if (!allUrlsStr) return;
                const allUrls = allUrlsStr.split('|||');
                if (allUrls.length === 0) return;
                const existing = document.querySelector('.lightbox');
                if (existing) existing.remove();

                const lb = document.createElement('div');
                lb.className = 'lightbox';
                lb.innerHTML = `
                    <button class="lightbox-close" aria-label="Tutup"><i class="fas fa-times"></i></button>
                    <button class="lightbox-prev" aria-label="Sebelumnya"><i class="fas fa-chevron-left"></i></button>
                    <button class="lightbox-next" aria-label="Berikutnya"><i class="fas fa-chevron-right"></i></button>
                    <img src="${allUrls[index]}" alt="Screenshot" />
                    <div class="lightbox-counter">${index+1} / ${allUrls.length}</div>
                `;
                document.body.appendChild(lb);

                let currentIndex = index;
                const img = lb.querySelector('img');
                const counter = lb.querySelector('.lightbox-counter');

                function updateImage(i) {
                    if (i < 0) i = allUrls.length - 1;
                    if (i >= allUrls.length) i = 0;
                    currentIndex = i;
                    img.src = allUrls[currentIndex];
                    counter.textContent = `${currentIndex+1} / ${allUrls.length}`;
                }

                lb.querySelector('.lightbox-close').addEventListener('click', (e) => { e.stopPropagation();
                    lb.remove(); });
                lb.querySelector('.lightbox-prev').addEventListener('click', (e) => { e.stopPropagation();
                    updateImage(currentIndex - 1); });
                lb.querySelector('.lightbox-next').addEventListener('click', (e) => { e.stopPropagation();
                    updateImage(currentIndex + 1); });

                lb.addEventListener('click', (e) => {
                    if (e.target === lb) lb.remove();
                });

                function keyHandler(e) {
                    if (e.key === 'Escape') { lb.remove();
                        document.removeEventListener('keydown', keyHandler); }
                    if (e.key === 'ArrowLeft') { e.preventDefault();
                        updateImage(currentIndex - 1); }
                    if (e.key === 'ArrowRight') { e.preventDefault();
                        updateImage(currentIndex + 1); }
                }
                document.addEventListener('keydown', keyHandler);

                let touchStartX = 0;
                lb.addEventListener('touchstart', (e) => {
                    touchStartX = e.changedTouches[0].screenX;
                }, { passive: true });
                lb.addEventListener('touchend', (e) => {
                    const diff = touchStartX - e.changedTouches[0].screenX;
                    if (Math.abs(diff) > 40) {
                        if (diff > 0) updateImage(currentIndex + 1);
                        else updateImage(currentIndex - 1);
                    }
                }, { passive: true });
            };

            // ============================================================
            // START DOWNLOAD DENGAN AD
            // ============================================================
            function startDownloadWithAd(btn, url) {
                const now = Date.now();
                const last = localStorage.getItem(AD_STORAGE_KEY);
                if (!last || (now - parseInt(last)) > AD_INTERVAL) {
                    localStorage.setItem(AD_STORAGE_KEY, now.toString());
                    if (AD_URL) window.open(AD_URL, '_blank');
                    let sec = 5;
                    btn.textContent = `⏳ ${sec} detik`;
                    btn.classList.add('counting');
                    const timer = setInterval(() => {
                        sec--;
                        if (sec <= 0) {
                            clearInterval(timer);
                            btn.innerHTML = '<i class="fas fa-download"></i> Download APK';
                            btn.classList.remove('counting');
                            window.open(url, '_blank');
                        } else {
                            btn.textContent = `⏳ ${sec} detik`;
                        }
                    }, 1000);
                } else {
                    window.open(url, '_blank');
                }
            }

            // ============================================================
            // SHOW DETAIL
            // ============================================================
            async function showDetail(name) {
                const post = fetchedPosts.find(p => p.name === name);
                if (!post) {
                    console.error('❌ Post tidak ditemukan:', name);
                    return;
                }
                const t = post.metadata.judul || post.metadata.title || post.name.replace(/[-_]/g, ' ');
                const img = fixImageUrl(post.metadata.gambar || post.metadata.image || '');
                const v = post.metadata.versi || post.metadata.version || '?';
                const s = post.metadata.ukuran || post.metadata.size || '?';
                const dev = post.metadata.developer || post.metadata.dev || 'Destaseo';
                const dwn = post.metadata.download || post.metadata.link || '';
                const kategori = post.metadata.kategori || '';
                const tags = post.metadata.tag ? post.metadata.tag.split(',').map(t => t.trim()).filter(t => t) : [];
                const dateRaw = post.metadata.tanggal || post.metadata.date || post.lastModified || '';
                const dateFormatted = formatDate(dateRaw);
                const screenshots = post.metadata.screenshot || post.metadata.screenshots || '';
                const galleryHtml = buildScreenshotGallery(screenshots);
                const hasDownload = dwn && dwn !== '#';
                const downloadBtn = hasDownload ?
                    `<button class="big-download" id="detail-download-btn"><i class="fas fa-download"></i> Download APK</button>` :
                    `<div class="big-download disabled"><i class="fas fa-exclamation-circle"></i> Link Download Tidak Tersedia</div>`;
                const tagsHtml = tags.length > 0 ?
                    `<div class="tags-container">${tags.map(tag => `<span class="tag-badge"><i class="fas fa-tag"></i> ${tag}</span>`).join('')}</div>` :
                    '';

                const recommendations = getRecommendations(post, 4);
                let recHtml = '';
                if (recommendations.length > 0) {
                    recHtml = `<div class="recommendations-section">
                        <h3><i class="fas fa-lightbulb"></i> Rekomendasi untuk Anda</h3>
                        <div class="rec-grid">`;
                    recommendations.forEach(rec => {
                        const recTitle = rec.metadata.judul || rec.metadata.title || rec.name.replace(
                            /[-_]/g, ' ');
                        const recImg = fixImageUrl(rec.metadata.gambar || rec.metadata.image || '');
                        recHtml += `
                            <div class="rec-card" data-name="${rec.name}">
                                ${recImg ? `<img src="${recImg}" alt="${recTitle}" loading="lazy" onerror="this.style.display='none'">` : `<div style="height:90px;background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:2rem;"><i class="fas fa-box"></i></div>`}
                                <div class="rec-title">${recTitle}</div>
                            </div>
                        `;
                    });
                    recHtml += `</div></div>`;
                }

                detailContent.innerHTML = '<div class="spinner"></div>';
                showSection(detailSection);
                setActiveNav('detail');
                window.scrollTo({ top: 0 });

                // Ambil jumlah dilihat dari Abacus
                const viewCount = await getPostViewCount(name);

                const desc = post.metadata.deskripsi || post.metadata.description || `Download mod ${t} premium terbaru. Versi ${v}, ukuran ${s}, developer ${dev}.`;
                updateMetaTags(t + ' • Destaseo Mods', desc, img || LOGO_URL, 'https://destaseomods.web.id/#detail/' + name);

                const articleJson = {
                    "@context": "https://schema.org",
                    "@type": "Article",
                    "headline": t,
                    "description": desc,
                    "image": img || LOGO_URL,
                    "author": {
                        "@type": "Person",
                        "name": dev
                    },
                    "datePublished": dateRaw || new Date().toISOString(),
                    "mainEntityOfPage": {
                        "@type": "WebPage",
                        "@id": "https://destaseomods.web.id/#detail/" + name
                    }
                };
                let script = document.querySelector('#article-ld-json');
                if (!script) {
                    script = document.createElement('script');
                    script.id = 'article-ld-json';
                    script.type = 'application/ld+json';
                    document.head.appendChild(script);
                }
                script.textContent = JSON.stringify(articleJson);

                detailContent.innerHTML = `
                <div class="detail-header">
                    ${img ? `<img src="${img}" class="detail-img" alt="${t}" onerror="this.style.display='none'">` : '<div class="detail-img" style="display:flex;align-items:center;justify-content:center;font-size:3rem;"><i class="fas fa-box"></i></div>'}
                    <h1 class="detail-title">${t}</h1>
                    <div class="detail-meta-grid">
                        <div class="meta-item"><i class="fas fa-code-branch"></i> <strong>Versi</strong> ${v}</div>
                        <div class="meta-item"><i class="fas fa-weight-hanging"></i> <strong>Ukuran</strong> ${s}</div>
                        <div class="meta-item"><i class="fas fa-user"></i> <strong>Developer</strong> ${dev}</div>
                        ${kategori ? `<div class="meta-item"><i class="fas fa-folder"></i> <strong>Kategori</strong> ${kategori}</div>` : ''}
                        ${dateFormatted ? `<div class="meta-item"><i class="far fa-calendar-alt"></i> <strong>Tanggal</strong> ${dateFormatted}</div>` : ''}
                        <div class="meta-item"><i class="fas fa-eye"></i> <strong>Dilihat</strong> ${viewCount} kali</div>
                    </div>
                    ${galleryHtml}
                    ${tagsHtml}
                </div>
                <div class="content-box">${post.html || '<p><i class="far fa-file-alt"></i> Tidak ada deskripsi.</p>'}</div>
                ${downloadBtn}
                ${recHtml}`;

                if (hasDownload) {
                    const dBtn = document.getElementById('detail-download-btn');
                    if (dBtn) dBtn.addEventListener('click', function(e) {
                        e.preventDefault();
                        if (this.classList.contains('counting')) return;
                        startDownloadWithAd(this, dwn);
                    });
                }

                document.querySelectorAll('.rec-card').forEach(card => {
                    card.addEventListener('click', function() {
                        const name = this.dataset.name;
                        if (name) setHash('detail', name);
                    });
                });
            }

            detailBack.addEventListener('click', () => setHash('home'));
            navItems.forEach(i => i.addEventListener('click', () => setHash(i.dataset.page)));
            searchInput.addEventListener('input', () => resetAndApplyFilters());
            window.addEventListener('hashchange', () => {
                const { page, postName } = getHashPage();
                if (page === 'detail' && postName) {
                    if (fetchedPosts.length === 0) renderHome().then(() => navigate('detail', postName));
                    else navigate('detail', postName);
                } else navigate(page);
            });

            // ============================================================
            // SITEMAP GENERATOR
            // ============================================================
            async function generateSitemap() {
                if (window.location.search !== '?sitemap') return;
                const baseUrl = window.location.origin + window.location.pathname.replace(/\/[^/]*$/, '');
                let urls = [baseUrl];
                try {
                    const apiUrl = `https://api.github.com/repos/${GITHUB_REPO}/contents/posts`;
                    const res = await fetch(apiUrl);
                    if (res.ok) {
                        const files = await res.json();
                        const mdFiles = files.filter(f => f.name.endsWith('.md'));
                        mdFiles.forEach(f => {
                            const name = f.name.replace('.md', '');
                            urls.push(`${baseUrl}#detail/${name}`);
                        });
                    }
                } catch (e) {}
                const sitemap = `<?xml version="1.0" encoding="UTF-8"?>
<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
  ${urls.map(u => `<url><loc>${u}</loc><lastmod>${new Date().toISOString().split('T')[0]}</lastmod></url>`).join('\n  ')}
</urlset>`;
                document.body.innerHTML =
                    `<pre style="color:#fff;background:#111;padding:20px;font-family:monospace;">${sitemap.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>`;
                throw new Error('SITEMAP_DISPLAY');
            }

            // ============================================================
            // START APLIKASI
            // ============================================================
            (async () => {
                try {
                    await generateSitemap();
                } catch (e) {
                    if (e.message === 'SITEMAP_DISPLAY') return;
                }
                await renderHome();
                const { page, postName } = getHashPage();
                if (page === 'detail' && postName) navigate('detail', postName);
                else navigate(page);
            })();
        })();
    </script>
</body>
</html>
