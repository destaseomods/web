<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Destaseo Mods • Premium Mod APK</title>
    <meta name="description" content="Destaseo Mods - Situs download mod APK premium terbaik." />
    <link rel="icon" href="https://avatars.githubusercontent.com/u/189899710?v=4" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* ===== RESET ===== */
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #04040e;
            color: #f5f5ff;
            padding-bottom: 80px;
        }
        .container { max-width:820px; margin:0 auto; padding:12px 16px; }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 18px;
            background: rgba(12,12,25,0.65);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 34px;
            margin: 12px auto;
            max-width: 700px;
        }
        .logo-text {
            font-weight: 900;
            font-size: 1.3rem;
            background: linear-gradient(135deg, #c084fc, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hidden { display: none !important; }
        .spinner {
            width:40px; height:40px; margin:40px auto;
            border:3px solid rgba(255,255,255,0.06);
            border-top-color: #3ee0ff;
            border-radius:50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform:rotate(360deg); } }
        .post-grid { display:grid; grid-template-columns:1fr; gap:14px; margin-top:12px; }
        @media (min-width:420px) { .post-grid { grid-template-columns:repeat(2,1fr); } }
        @media (min-width:768px) { .post-grid { grid-template-columns:repeat(2,1fr); } }
        @media (min-width:1024px) { .post-grid { grid-template-columns:repeat(3,1fr); } }

        .post-card {
            background: rgba(15,15,30,0.7);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
        }
        .post-card:hover { transform: translateY(-4px); border-color: rgba(255,255,255,0.2); }
        .card-img {
            height: 130px;
            background: #1e1e35;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b8b8d0;
            font-size: 2.5rem;
            position: relative;
            overflow: hidden;
        }
        .card-img img { width:100%; height:100%; object-fit:cover; }
        .card-body { padding:12px 14px; }
        .card-title { font-weight:800; font-size:0.85rem; }
        .card-meta { font-size:0.7rem; color:#b8b8d0; margin-top:4px; display:flex; gap:6px; flex-wrap:wrap; }
        .badge {
            background: rgba(168,127,255,0.2);
            color: #cfc4ff;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.6rem;
        }
        .badge-premium {
            background: linear-gradient(135deg, #f7b731, #f5a623);
            color: #1a1a2e;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.6rem;
        }
        .badge-vip {
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            color: #fff;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.6rem;
        }
        .badge-noads {
            background: linear-gradient(135deg, #34d399, #059669);
            color: #fff;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.6rem;
        }
        .badge-custom {
            background: rgba(25,25,45,0.8);
            color: #b8b8d0;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.6rem;
        }

        .load-more-btn {
            display:block; margin:20px auto 0; padding:10px 20px;
            background:rgba(15,15,30,0.7); border:1px solid rgba(255,255,255,0.07);
            color:#3ee0ff; border-radius:30px; cursor:pointer;
        }
        .bottom-nav {
            position:fixed; bottom:0; left:0; right:0;
            background:rgba(5,5,15,0.85); backdrop-filter:blur(35px);
            border-top:1px solid rgba(255,255,255,0.07);
            display:flex; justify-content:space-around; align-items:center;
            height:70px; z-index:100;
        }
        .nav-item {
            display:flex; flex-direction:column; align-items:center;
            color:#b8b8d0; font-size:0.6rem; cursor:pointer;
            background:none; border:none; padding:8px 14px; border-radius:24px;
        }
        .nav-item.active { color:#3ee0ff; background:rgba(62,224,255,0.12); }
        .nav-item i { font-size:1.1rem; }
        .error-text { text-align:center; padding:40px 20px; color:#b8b8d0; }
        .empty-text { text-align:center; padding:40px 20px; color:#b8b8d0; }
        .carousel-wrapper {
            background:rgba(15,15,30,0.7); border-radius:20px; overflow:hidden;
            height:180px; position:relative; margin-bottom:12px;
        }
        .carousel-track { position:relative; height:100%; }
        .carousel-slide {
            position:absolute; top:0; left:0; width:100%; height:100%;
            opacity:0; transition:opacity 0.8s ease-in-out;
            cursor:pointer;
        }
        .carousel-slide.active { opacity:1; z-index:1; }
        .carousel-slide img { width:100%; height:100%; object-fit:cover; }
        .carousel-slide .slide-overlay {
            position:absolute; bottom:0; left:0; right:0;
            padding:12px 16px;
            background:linear-gradient(transparent, rgba(0,0,0,0.8));
            display:flex; justify-content:space-between; align-items:flex-end;
        }
        .carousel-slide .slide-title { font-weight:800; font-size:0.9rem; }
        .carousel-counter {
            background:rgba(0,0,0,0.5); padding:3px 10px; border-radius:14px;
            font-size:0.65rem; font-weight:600;
        }
        .carousel-title-top {
            position:absolute; top:12px; left:14px; z-index:5;
            background:rgba(0,0,0,0.5); padding:4px 12px; border-radius:20px;
            font-size:0.7rem; font-weight:700;
        }
    </style>
</head>
<body>
    <!-- Topbar -->
    <div class="topbar">
        <div class="logo-text">Destaseo Mods</div>
        <div>
            <button style="background:rgba(15,15,30,0.7);border:1px solid rgba(255,255,255,0.07);color:#3ee0ff;padding:6px 14px;border-radius:30px;font-size:0.75rem;cursor:pointer;"><i class="fab fa-telegram-plane"></i> Telegram</button>
        </div>
    </div>

    <!-- Main -->
    <main class="container">
        <section id="home-section">
            <div class="carousel-wrapper">
                <div class="carousel-title-top"><i class="fas fa-hashtag"></i> Urutan Populer</div>
                <div class="carousel-track" id="carousel-track"></div>
            </div>
            <div id="post-container" class="post-grid"></div>
            <div id="load-more-container" style="text-align:center;"></div>
        </section>
        <section id="detail-section" class="hidden">
            <button id="detail-back" style="background:none;border:none;color:#3ee0ff;cursor:pointer;margin-bottom:12px;"><i class="fas fa-arrow-left"></i> Kembali</button>
            <div id="detail-content"></div>
        </section>
        <section id="profile-section" class="hidden">
            <div style="background:rgba(15,15,30,0.7);border:1px solid rgba(255,255,255,0.07);border-radius:28px;padding:20px;text-align:center;">
                <div style="width:80px;height:80px;border-radius:50%;background:rgba(25,25,45,0.8);margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;"><i class="fas fa-user"></i></div>
                <h2>Destaseo Mods</h2>
                <p style="color:#b8b8d0;">Premium modder &amp; content creator.</p>
            </div>
        </section>
    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <button class="nav-item active" data-page="home"><i class="fas fa-home"></i><span>Beranda</span></button>
        <button class="nav-item" data-page="search"><i class="fas fa-search"></i><span>Cari</span></button>
        <button class="nav-item" data-page="profile"><i class="fas fa-user-circle"></i><span>Profil</span></button>
    </nav>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('✅ DOM ready');

            // ===== KONFIGURASI =====
            var GITHUB_REPO = "destaseomods/web";
            var CACHE_KEY_LIST = 'destaseo_post_list_v3';
            var CACHE_KEY_CONTENT_PREFIX = 'destaseo_post_content_';
            var CACHE_TIME_LIST = 60 * 1000;
            var CACHE_TIME_CONTENT = 60 * 1000;
            var ITEMS_PER_PAGE = 10;
            var postsData = [],
                fetchedPosts = [];
            var activeKatFilter = null;
            var currentDisplayCount = 0;
            var topPopularPosts = [];

            var postContainer = document.getElementById('post-container');
            var carouselTrack = document.getElementById('carousel-track');
            var loadMoreContainer = document.getElementById('load-more-container');
            var homeSection = document.getElementById('home-section');
            var detailSection = document.getElementById('detail-section');
            var profileSection = document.getElementById('profile-section');
            var detailContent = document.getElementById('detail-content');
            var detailBack = document.getElementById('detail-back');
            var navItems = document.querySelectorAll('.nav-item');

            // ===== UTILITY =====
            function fixImageUrl(url) {
                if (!url) return '';
                if (url.includes('github.com') && !url.includes('raw.githubusercontent.com')) {
                    url = url.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
                }
                return url;
            }

            function getExcerpt(c) {
                if (!c) return '';
                var t = c.replace(/[#*`>\[\]()!|]/g, '').replace(/\n/g, ' ').trim();
                if (t.length > 80) t = t.slice(0, 80) + '...';
                return t;
            }

            function showSection(s) {
                [homeSection, detailSection, profileSection].forEach(function(x) { x.classList.add('hidden'); });
                s.classList.remove('hidden');
            }

            // ===== ROUTING =====
            function getRoute() {
                var path = window.location.pathname;
                if (path === '/' || path === '/index.html') return { page: 'home' };
                var match = path.match(/^\/detail\/(.+)$/);
                if (match) return { page: 'detail', postName: decodeURIComponent(match[1]) };
                if (path === '/search') return { page: 'search' };
                if (path === '/profile') return { page: 'profile' };
                return { page: 'home' };
            }

            function navigateTo(page, postName) {
                var url = (page === 'home') ? '/' :
                    (page === 'search') ? '/search' :
                    (page === 'profile') ? '/profile' :
                    (page === 'detail' && postName) ? '/detail/' + encodeURIComponent(postName) : '/';
                if (window.location.pathname !== url) {
                    window.history.pushState({ page: page, postName: postName }, '', url);
                }
                renderPage(page, postName);
            }

            function renderPage(page, postName) {
                console.log('📄 renderPage:', page, postName);
                if (page === 'home') {
                    showSection(homeSection);
                    if (topPopularPosts.length) renderPopularSection();
                    if (fetchedPosts.length) renderPosts();
                } else if (page === 'search') {
                    showSection(homeSection);
                    // nanti tambah search
                } else if (page === 'profile') {
                    showSection(profileSection);
                } else if (page === 'detail' && postName) {
                    showDetail(postName);
                } else {
                    showSection(homeSection);
                }
                navItems.forEach(function(i) {
                    var p = i.dataset.page;
                    i.classList.toggle('active', (p === page) || (page === 'detail' && p === 'home'));
                });
            }

            // ===== CAROUSEL =====
            var carouselInterval = null;
            var currentSlide = 0;
            var totalSlides = 0;

            function startCarousel() {
                if (carouselInterval) clearInterval(carouselInterval);
                if (totalSlides === 0) return;
                updateCarousel(0);
                carouselInterval = setInterval(function() {
                    currentSlide = (currentSlide + 1) % totalSlides;
                    updateCarousel(currentSlide);
                }, 4000);
            }

            function updateCarousel(i) {
                var slides = document.querySelectorAll('.carousel-slide');
                slides.forEach(function(s, idx) { s.classList.toggle('active', idx === i); });
                document.querySelectorAll('.carousel-counter').forEach(function(c, idx) {
                    c.textContent = (i + 1) + '/' + totalSlides;
                });
            }

            function renderPopularSection() {
                if (!topPopularPosts.length) { carouselTrack.innerHTML = '';
                    totalSlides = 0; return; }
                var pop = topPopularPosts.slice(0, 4);
                totalSlides = pop.length;
                carouselTrack.innerHTML = pop.map(function(p, i) {
                    var img = fixImageUrl(p.metadata.gambar || p.metadata.image || '');
                    var title = p.metadata.judul || p.metadata.title || p.name.replace(/[-_]/g, ' ');
                    return '<div class="carousel-slide' + (i === 0 ? ' active' : '') + '" data-name="' + p.name + '">' +
                        (img ? '<img src="' + img + '" alt="' + title + '">' : '') +
                        '<div class="slide-overlay"><div class="slide-title">' + title + '</div><span class="carousel-counter">' +
                        (i + 1) + '/' + pop.length + '</span></div></div>';
                }).join('');
                document.querySelectorAll('.carousel-slide').forEach(function(s) {
                    s.addEventListener('click', function() {
                        var name = this.dataset.name;
                        if (name) navigateTo('detail', name);
                    });
                });
                startCarousel();
            }

            // ===== RENDER POSTS =====
            function renderPosts() {
                var filtered = getFilteredPosts();
                filtered = sortPosts(filtered);
                currentDisplayCount = Math.min(ITEMS_PER_PAGE, filtered.length);
                displayPosts(filtered.slice(0, currentDisplayCount));
                renderLoadMoreButton(filtered.length);
            }

            function getFilteredPosts() {
                var f = fetchedPosts;
                if (activeKatFilter) f = f.filter(function(p) { return (p.metadata.kategori || '') === activeKatFilter; });
                return f;
            }

            function sortPosts(posts) {
                var sorted = posts.slice();
                sorted.sort(function(a, b) {
                    var da = new Date(a.metadata.tanggal || a.metadata.date || 0);
                    var db = new Date(b.metadata.tanggal || b.metadata.date || 0);
                    return db - da;
                });
                return sorted;
            }

            function displayPosts(posts) {
                if (!posts.length) {
                    postContainer.innerHTML = '<div class="empty-text">🔍 Tidak ada postingan.</div>';
                    return;
                }
                postContainer.innerHTML = posts.map(function(p, i) { return cardHTML(p, i); }).join('');
                attachCardEvents();
            }

            function renderLoadMoreButton(total) {
                if (currentDisplayCount < total) {
                    loadMoreContainer.innerHTML = '<button class="load-more-btn" id="load-more-btn"><i class="fas fa-chevron-down"></i> Muat Lebih Banyak (' +
                        (total - currentDisplayCount) + ')</button>';
                    document.getElementById('load-more-btn').addEventListener('click', loadMorePosts);
                } else {
                    loadMoreContainer.innerHTML = '';
                }
            }

            function loadMorePosts() {
                var filtered = getFilteredPosts();
                filtered = sortPosts(filtered);
                var n = Math.min(currentDisplayCount + ITEMS_PER_PAGE, filtered.length);
                var newPosts = filtered.slice(currentDisplayCount, n);
                currentDisplayCount = n;
                newPosts.forEach(function(p, i) {
                    var card = cardHTML(p, i);
                    postContainer.insertAdjacentHTML('beforeend', card);
                });
                attachCardEvents();
                renderLoadMoreButton(filtered.length);
            }

            function cardHTML(post, index) {
                var t = post.metadata.judul || post.metadata.title || post.name.replace(/[-_]/g, ' ');
                var img = fixImageUrl(post.metadata.gambar || post.metadata.image || '');
                var kategori = post.metadata.kategori || '';
                var ver = post.metadata.versi || post.metadata.version || '';
                var excerpt = getExcerpt(post.content);
                var delay = (index * 0.04) + 's';

                var badges = [];
                if (post.metadata.badges) {
                    badges = (Array.isArray(post.metadata.badges)) ? post.metadata.badges :
                        post.metadata.badges.split(',').map(function(b) { return b.trim(); }).filter(function(b) { return b
                            .length > 0; });
                }

                function getBadgeHTML(text) {
                    var lower = text.toLowerCase();
                    var cls = 'badge-custom';
                    var icon = 'fa-tag';
                    if (lower === 'premium') { cls = 'badge-premium';
                        icon = 'fa-crown'; } else if (lower === 'vip') { cls = 'badge-vip';
                        icon = 'fa-star'; } else if (lower === 'no ads' || lower === 'noads' || lower ===
                        'tanpa iklan') { cls = 'badge-noads';
                        icon = 'fa-ban'; }
                    return '<span class="' + cls + '"><i class="fas ' + icon + '"></i> ' + text + '</span>';
                }
                var badgesHtml = badges.map(getBadgeHTML).join('');

                var imgTag = img ? '<img src="' + img + '" alt="' + t + '" loading="lazy" onerror="this.parentElement.classList.add(\'error\')">' :
                    '';
                var versionBadge = ver ? '<span style="position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.65);padding:2px 8px;border-radius:12px;font-size:0.6rem;font-weight:700;z-index:2;"><i class="fas fa-code-branch"></i> v' +
                    ver + '</span>' : '';

                return '<div class="post-card" data-name="' + post.name + '" style="animation-delay:' + delay + ';">' +
                    '<div class="card-img' + (img ? '' : ' error') + '">' + imgTag +
                    '<span class="placeholder-icon"><i class="fas fa-box-open"></i></span>' + versionBadge + '</div>' +
                    '<div class="card-body">' +
                    '<div class="card-title">' + t + '</div>' +
                    '<div class="card-meta">' +
                    (kategori ? '<span class="badge" data-kat="' + kategori + '"><i class="fas fa-folder"></i> ' +
                        kategori + '</span>' : '') +
                    badgesHtml +
                    '</div>' +
                    (excerpt ? '<p style="font-size:0.68rem;color:#b8b8d0;margin-top:4px;">' + excerpt + '</p>' : '') +
                    '</div></div>';
            }

            function attachCardEvents() {
                document.querySelectorAll('.post-card').forEach(function(c) {
                    c.addEventListener('click', function(e) {
                        if (e.target.closest('.badge') || e.target.closest('.badge-premium') ||
                            e.target.closest('.badge-vip') || e.target.closest('.badge-noads') ||
                            e.target.closest('.badge-custom')) return;
                        var name = this.dataset.name;
                        if (name) navigateTo('detail', name);
                    });
                });
                document.querySelectorAll('.badge, .badge-premium, .badge-vip, .badge-noads, .badge-custom').forEach(
                function(b) {
                    b.addEventListener('click', function(e) {
                        e.stopPropagation();
                        var kat = this.dataset.kat;
                        if (kat) {
                            activeKatFilter = kat;
                            renderPosts();
                        }
                    });
                });
            }

            // ===== FETCH DATA =====
            function getCachedList() {
                try {
                    var raw = localStorage.getItem(CACHE_KEY_LIST);
                    if (!raw) return null;
                    var data = JSON.parse(raw);
                    if (Date.now() - data.t < CACHE_TIME_LIST) return data.posts;
                } catch (e) {}
                return null;
            }

            function getCachedListFallback() {
                try {
                    var raw = localStorage.getItem(CACHE_KEY_LIST);
                    if (!raw) return null;
                    var data = JSON.parse(raw);
                    return data.posts;
                } catch (e) { return null; }
            }

            function setCachedList(posts) {
                try { localStorage.setItem(CACHE_KEY_LIST, JSON.stringify({ t: Date.now(), posts: posts })); } catch (e) {}
            }

            function getCachedContent(name) {
                try {
                    var raw = localStorage.getItem(CACHE_KEY_CONTENT_PREFIX + name);
                    if (!raw) return null;
                    var data = JSON.parse(raw);
                    if (Date.now() - data.t < CACHE_TIME_CONTENT) return data.content;
                } catch (e) {}
                return null;
            }

            function getCachedContentFallback(name) {
                try {
                    var raw = localStorage.getItem(CACHE_KEY_CONTENT_PREFIX + name);
                    if (!raw) return null;
                    var data = JSON.parse(raw);
                    return data.content;
                } catch (e) { return null; }
            }

            function setCachedContent(name, content) {
                try { localStorage.setItem(CACHE_KEY_CONTENT_PREFIX + name, JSON.stringify({ t: Date.now(),
                        content: content })); } catch (e) {}
            }

            async function fetchPostList() {
                var cached = getCachedList();
                if (cached) { postsData = cached; return; }
                var url = 'https://api.github.com/repos/' + GITHUB_REPO + '/contents/posts';
                try {
                    var res = await fetch(url);
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    var files = await res.json();
                    var mdFiles = files.filter(function(f) { return f.name.endsWith('.md'); });
                    if (!mdFiles.length) throw new Error('Tidak ada .md');
                    postsData = mdFiles.map(function(f) { return { name: f.name.replace('.md', ''), download_url: f
                            .download_url }; });
                    setCachedList(postsData);
                } catch (e) {
                    var fallback = getCachedListFallback();
                    if (fallback && fallback.length) { postsData = fallback; return; }
                    throw e;
                }
            }

            function parseFrontmatter(md) {
                var m = md.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
                if (!m) return { metadata: {}, content: md };
                var meta = {};
                m[1].split('\n').forEach(function(line) {
                    var i = line.indexOf(':');
                    if (i > 0) meta[line.slice(0, i).trim()] = line.slice(i + 1).trim().replace(/^["']|["']$/g, '');
                });
                return { metadata: meta, content: m[2] };
            }

            async function fetchPost(p) {
                var cached = getCachedContent(p.name);
                if (cached) {
                    var parsed = parseFrontmatter(cached);
                    var html = (typeof marked !== 'undefined') ? marked.parse(parsed.content) : '<p>Konten (marked tidak tersedia)</p>';
                    return { name: p.name, metadata: parsed.metadata, content: parsed.content, html: html };
                }
                if (!p.download_url) {
                    var fb = getCachedContentFallback(p.name);
                    if (fb) {
                        var parsed2 = parseFrontmatter(fb);
                        var html2 = (typeof marked !== 'undefined') ? marked.parse(parsed2.content) :
                            '<p>Konten (marked tidak tersedia)</p>';
                        return { name: p.name, metadata: parsed2.metadata, content: parsed2.content, html: html2 };
                    }
                    return { name: p.name, metadata: {}, content: '', html: '<p>Konten tidak tersedia.</p>' };
                }
                try {
                    var r = await fetch(p.download_url);
                    if (!r.ok) throw new Error('fail');
                    var md = await r.text();
                    setCachedContent(p.name, md);
                    var parsed3 = parseFrontmatter(md);
                    var html3 = (typeof marked !== 'undefined') ? marked.parse(parsed3.content) :
                        '<p>Konten (marked tidak tersedia)</p>';
                    return { name: p.name, metadata: parsed3.metadata, content: parsed3.content, html: html3 };
                } catch (e) {
                    var fb2 = getCachedContentFallback(p.name);
                    if (fb2) {
                        var parsed4 = parseFrontmatter(fb2);
                        var html4 = (typeof marked !== 'undefined') ? marked.parse(parsed4.content) :
                            '<p>Konten (marked tidak tersedia)</p>';
                        return { name: p.name, metadata: parsed4.metadata, content: parsed4.content, html: html4 };
                    }
                    return { name: p.name, metadata: {}, content: '', html: '<p>Gagal memuat konten.</p>' };
                }
            }

            // ===== VIEW COUNTER (sederhana) =====
            async function getPostViewCount(name) {
                return 0; // sementara
            }

            // ===== SORT POPULAR =====
            async function sortPopular() {
                var viewPromises = fetchedPosts.map(function(p) { return getPostViewCount(p.name); });
                var views = await Promise.all(viewPromises);
                var withViews = fetchedPosts.map(function(p, i) { var o = Object.assign({}, p);
                    o.viewCount = views[i] || 0; return o; });
                withViews.sort(function(a, b) { return (b.viewCount || 0) - (a.viewCount || 0); });
                var hasData = withViews.some(function(p) { return p.viewCount > 0; });
                if (!hasData) {
                    var fallback = fetchedPosts.filter(function(p) { return p.metadata.populer && p.metadata.populer
                            .toLowerCase() === 'true'; });
                    topPopularPosts = fallback.length ? fallback : fetchedPosts.slice(0, 4);
                } else {
                    topPopularPosts = withViews;
                }
                renderPopularSection();
            }

            // ===== SHOW DETAIL =====
            async function showDetail(name) {
                if (!fetchedPosts.length) {
                    await renderHome();
                    return showDetail(name);
                }
                var post = fetchedPosts.find(function(p) { return p.name === name; });
                if (!post) { navigateTo('home'); return; }
                var title = post.metadata.judul || post.metadata.title || post.name.replace(/[-_]/g, ' ');
                var img = fixImageUrl(post.metadata.gambar || post.metadata.image || '');
                var html = post.html || '<p>Deskripsi tidak tersedia.</p>';
                detailContent.innerHTML = '<div style="text-align:center;padding:20px;">' +
                    (img ? '<img src="' + img + '" style="max-width:100px;border-radius:20px;margin-bottom:16px;">' :
                        '') +
                    '<h2>' + title + '</h2>' +
                    '<div style="margin:12px 0;font-size:0.85rem;color:#b8b8d0;">Versi: ' + (post.metadata.versi || '?') +
                    ' | Ukuran: ' + (post.metadata.ukuran || '?') + '</div>' +
                    '<div style="background:rgba(25,25,45,0.8);padding:16px;border-radius:20px;text-align:left;">' + html +
                    '</div>' +
                    (post.metadata.download && post.metadata.download !== '#' ?
                        '<button onclick="window.open(\'' + post.metadata.download +
                        '\',\'_blank\')" style="margin-top:16px;background:linear-gradient(135deg,#a87fff,#3ee0ff);border:none;color:#04040e;font-weight:700;padding:14px;border-radius:18px;width:100%;cursor:pointer;"><i class="fas fa-download"></i> Download APK</button>' :
                        '<div style="margin-top:16px;background:rgba(25,25,45,0.8);padding:14px;border-radius:18px;text-align:center;color:#b8b8d0;border:1px solid rgba(255,255,255,0.07);"><i class="fas fa-exclamation-circle"></i> Link Download Tidak Tersedia</div>') +
                    '</div>';
                showSection(detailSection);
                window.scrollTo({ top: 0 });
            }

            detailBack.addEventListener('click', function() { navigateTo('home'); });

            // ===== RENDER HOME =====
            async function renderHome() {
                try {
                    postContainer.innerHTML = '<div class="spinner"></div>';
                    loadMoreContainer.innerHTML = '';
                    carouselTrack.innerHTML = '';
                    await fetchPostList();
                    if (!postsData.length) {
                        postContainer.innerHTML = '<div class="empty-text">Tidak ada postingan.</div>';
                        return;
                    }
                    fetchedPosts = await Promise.all(postsData.map(function(p) { return fetchPost(p); }));
                    await sortPopular();
                    renderPosts();
                    var route = getRoute();
                    if (route.page === 'detail' && route.postName) {
                        showDetail(route.postName);
                    } else {
                        showSection(homeSection);
                    }
                } catch (e) {
                    console.error('❌ Error renderHome:', e);
                    postContainer.innerHTML = '<div class="error-text">⚠️ Gagal memuat data. Coba refresh. <br><small>' + e
                        .message + '</small></div>';
                }
            }

            // ===== NAVIGATION =====
            navItems.forEach(function(i) {
                i.addEventListener('click', function() {
                    var page = this.dataset.page;
                    if (page === 'home') navigateTo('home');
                    else if (page === 'search') navigateTo('search');
                    else if (page === 'profile') navigateTo('profile');
                });
            });

            window.addEventListener('popstate', function() {
                var route = getRoute();
                renderPage(route.page, route.postName);
            });

            // ===== START =====
            renderHome();
        });
    </script>
</body>
</html>
