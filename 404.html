        :root {

                                .setItem(storageKey, JSON.stringify({ count: c, date: today })); return c; } }
                } catch (e) {}
                var prev = (localData && typeof localData.count === 'number') ? localData.count : 0;
                var n = prev + 1;

                if (m) return { page: 'detail', postName: decodeURIComponent(m[1]) };

                return { page: 'home' };

            function getCachedList() {

            }

            function getCachedListFallback() {
                try {
                    var raw = localStorage.getItem(CACHE_KEY_LIST);

                } catch (e) { return null; }

            function getCachedContent(name) {

            function getCachedContentFallback(name) {
                try {
                    var raw = localStorage.getItem(CACHE_KEY_CONTENT_PREFIX + name);
                    if (!raw) return null;

                    return d.content;
                } catch (e) { return null; }
            }

            function setCachedContent(name, content) {

            async function fetchPostList() {
                var cached = getCachedList();
                if (cached && cached.length) { console.log('📦 List from cache:', cached.length);
                    postsData = cached; return; }

                var url = 'https://api.github.com/repos/' + GITHUB_REPO + '/contents/posts';
                console.log('🌐 Fetching list from GitHub:', url);
                try {
                    var r = await fetch(url);
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    var files = await r.json();
                    var md = files.filter(function(f) { return f.name.endsWith('.md'); });
                    if (!md.length) throw new Error('Tidak ada .md');
                    postsData = md.map(function(f) { return { name: f.name.replace('.md', ''), download_url: f
                            .download_url }; });
                    setCachedList(postsData);
                    console.log('✅ List fetched from GitHub:', postsData.length);
                } catch (e) {
                    console.error('❌ Fetch list error:', e);
                    var fb = getCachedListFallback();
                    if (fb && fb.length) { console.warn('⚠️ Using fallback cache');
                        postsData = fb; return; }
                    throw e;
                }
            }

            function parseFrontmatter(md) {
                var m = md.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
                if (!m) return { metadata: {}, content: md };
                var meta = {};
                m[1].split('\n').forEach(function(line) {
                    var i = line.indexOf(':');
                    if (i > 0) meta[line.slice(0, i).trim()] = line.slice(i + 1).trim().replace(/^["']|["']$/g, '');
                });
                return { metadata: meta, content: m[2] };
            }

            async function fetchPost(p) {
                var cached = getCachedContent(p.name);
                if (cached) {
                    var parsed = parseFrontmatter(cached);
                    var html = (typeof marked !== 'undefined' && marked.parse) ? marked.parse(parsed.content) :
                        '<p>Konten (marked tidak tersedia).</p>';
                    return { name: p.name, metadata: parsed.metadata, content: parsed.content, html: html };
                }
                if (!p.download_url) {
                    var fb = getCachedContentFallback(p.name);
                    if (fb) { var p2 = parseFrontmatter(fb); var h2 = (typeof marked !== 'undefined' && marked.parse) ?
                            marked.parse(p2.content) : '<p>Konten (marked tidak tersedia).</p>'; return { name: p.name,
                            metadata: p2.metadata, content: p2.content, html: h2 }; }
                    return { name: p.name, metadata: {}, content: '', html: '<p>Konten tidak tersedia.</p>' };
                }
                try {
                    var r = await fetch(p.download_url);
                    if (!r.ok) throw new Error('fail');
                    var md = await r.text();
                    setCachedContent(p.name, md);
                    var p3 = parseFrontmatter(md);
                    var h3 = (typeof marked !== 'undefined' && marked.parse) ? marked.parse(p3.content) :
                        '<p>Konten (marked tidak tersedia).</p>';
                    return { name: p.name, metadata: p3.metadata, content: p3.content, html: h3 };
                } catch (e) {
                    console.warn('Fetch content error for', p.name, e);
                    var fb2 = getCachedContentFallback(p.name);
                    if (fb2) { var p4 = parseFrontmatter(fb2); var h4 = (typeof marked !== 'undefined' && marked.parse) ?
                            marked.parse(p4.content) : '<p>Konten (marked tidak tersedia).</p>'; return { name: p.name,
                            metadata: p4.metadata, content: p4.content, html: h4 }; }
                    return { name: p.name, metadata: {}, content: '', html: '<p>Gagal memuat konten.</p>' };
                }
            }

            async function sortPopular() {

                var views = await Promise.all(promises);
                var withViews = fetchedPosts.map(function(p, i) { var o = Object.assign({}, p);
                    o.viewCount = views[i] || 0; return o; });
                withViews.sort(function(a, b) { return (b.viewCount || 0) - (a.viewCount || 0); });
                var hasData = withViews.some(function(p) { return p.viewCount > 0; });
                if (!hasData) {
                    var fallback = fetchedPosts.filter(function(p) { return p.metadata.populer && p.metadata.populer
                            .toLowerCase() === 'true'; });
                    topPopularPosts = fallback.length ? fallback : fetchedPosts.slice(0, 4);
                } else {
                    topPopularPosts = withViews;

                console.log('📊 Top popular:', topPopularPosts.length);
                renderPopularSection();

            function getFilteredPosts() {
                if (!fetchedPosts.length) return [];
                var q = searchInput ? searchInput.value.trim().toLowerCase() : '';
                var f = fetchedPosts;
                if (activeKatFilter) f = f.filter(function(p) { return (p.metadata.kategori || '') === activeKatFilter; });
                if (q) f = f.filter(function(p) {

                });
                return f;

            function sortPosts(posts) {
                var sorted = posts.slice();
                if (!sorted.length) return sorted;
                var getTime = function(p) {
                    var d = p.metadata.tanggal || p.metadata.date || p.lastModified;
                    if (!d) return 0;
                    var t = new Date(d);
                    return isNaN(t.getTime()) ? 0 : t.getTime();
                };
                var val = sortSelect ? sortSelect.value : 'terbaru';
                if (val === 'terbaru') sorted.sort(function(a, b) { return getTime(b) - getTime(a); });
                else if (val === 'terlama') sorted.sort(function(a, b) { return getTime(a) - getTime(b); });
                else if (val === 'az') sorted.sort(function(a, b) {
                    var tA = (a.metadata.judul || a.metadata.title || a.name || '').toLowerCase();
                    var tB = (b.metadata.judul || b.metadata.title || b.name || '').toLowerCase();
                    return tA.localeCompare(tB);
                });
                else if (val === 'za') sorted.sort(function(a, b) {
                    var tA = (a.metadata.judul || a.metadata.title || a.name || '').toLowerCase();
                    var tB = (b.metadata.judul || b.metadata.title || b.name || '').toLowerCase();
                    return tB.localeCompare(tA);
                });
                return sorted;
            }

            function loadMorePosts() {

                filtered = sortPosts(filtered);
                var n = Math.min(currentDisplayCount + ITEMS_PER_PAGE, filtered.length);
                var newPosts = filtered.slice(currentDisplayCount, n);

                newPosts.forEach(function(p, i) {

            function cardHTML(post, index) {
                var t = post.metadata.judul || post.metadata.title || post.name.replace(/[-_]/g, ' ');
                var img = fixImageUrl(post.metadata.gambar || post.metadata.image || '');

                }

                function getBadgeHTML(text) {
                    var lower = text.toLowerCase();

                        icon = 'fa-crown'; } else if (lower === 'vip') { cls = 'badge-vip';
                        icon = 'fa-star'; } else if (lower === 'no ads' || lower === 'noads' || lower ===

                            'badge-unlocked';
                        icon = 'fa-unlock'; }
                    return '<span class="' + cls + '"><i class="fas ' + icon + '"></i> ' + text + '</span>';
                }
                var badgesHtml = badges.map(getBadgeHTML).join('');

                var imgTag = img ?

                    '<div class="card-body">' +

                    (kategori ? '<span class="badge" data-kat="' + kategori + '" role="button"><i class="fas fa-folder"></i> ' +

            function buildScreenshotGallery(str) {
                if (!str) return '';
                var urls = str.split(',').map(function(u) { return fixImageUrl(u.trim()); }).filter(function(u) { return u
                        .length > 0; });
                if (urls.length === 0) return '';
                var lim = urls.slice(0, 10);
                var urlsAttr = urls.map(function(u) { return u.replace(/"/g, '&quot;'); }).join('|||');
                return '<div class="screenshot-scroll" data-all-urls="' + urlsAttr + '">' +
                    lim.map(function(u, i) { return '<img src="' + u +
                        '" alt="Screenshot" loading="lazy" onclick="event.stopPropagation(); openLightbox(this, ' + i +
                        ')">'; }).join('') +
                    '</div>';
            }

            window.openLightbox = function(imgEl, index) {
                var container = imgEl.closest('.screenshot-scroll');
                if (!container) return;
                var allUrlsStr = container.dataset.allUrls || '';
                if (!allUrlsStr) return;
                var allUrls = allUrlsStr.split('|||');
                if (allUrls.length === 0) return;
                var existing = document.querySelector('.lightbox');
                if (existing) existing.remove();

                var lb = document.createElement('div');
                lb.className = 'lightbox';
                lb.innerHTML =
                    '<button class="lightbox-close"><i class="fas fa-times"></i></button>' +
                    '<button class="lightbox-prev"><i class="fas fa-chevron-left"></i></button>' +
                    '<button class="lightbox-next"><i class="fas fa-chevron-right"></i></button>' +
                    '<img src="' + allUrls[index] + '" alt="Screenshot" />' +
                    '<div class="lightbox-counter">' + (index + 1) + ' / ' + allUrls.length + '</div>';
                document.body.appendChild(lb);

                var currentIndex = index;
                var img = lb.querySelector('img');
                var counter = lb.querySelector('.lightbox-counter');

                function updateImage(i) {
                    if (i < 0) i = allUrls.length - 1;
                    if (i >= allUrls.length) i = 0;
                    currentIndex = i;
                    img.src = allUrls[currentIndex];
                    counter.textContent = (currentIndex + 1) + ' / ' + allUrls.length;
                }

                lb.querySelector('.lightbox-close').addEventListener('click', function(e) { e.stopPropagation();
                    lb.remove(); });
                lb.querySelector('.lightbox-prev').addEventListener('click', function(e) { e.stopPropagation();
                    updateImage(currentIndex - 1); });
                lb.querySelector('.lightbox-next').addEventListener('click', function(e) { e.stopPropagation();
                    updateImage(currentIndex + 1); });
                lb.addEventListener('click', function(e) { if (e.target === lb) lb.remove(); });

                function keyHandler(e) {
                    if (e.key === 'Escape') { lb.remove();
                        document.removeEventListener('keydown', keyHandler); }
                    if (e.key === 'ArrowLeft') { e.preventDefault();
                        updateImage(currentIndex - 1); }
                    if (e.key === 'ArrowRight') { e.preventDefault();
                        updateImage(currentIndex + 1); }
                }
                document.addEventListener('keydown', keyHandler);

                var touchStartX = 0;
                lb.addEventListener('touchstart', function(e) { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
                lb.addEventListener('touchend', function(e) {
                    var diff = touchStartX - e.changedTouches[0].screenX;
                    if (Math.abs(diff) > 40) { if (diff > 0) updateImage(currentIndex + 1);
                        else updateImage(currentIndex - 1); }
                }, { passive: true });
            };

            // ============================================================
            // 16. RECOMMENDATIONS
            // ============================================================
            function getRecommendations(currentPost, limit) {
                if (limit === undefined) limit = 4;
                if (!fetchedPosts || fetchedPosts.length === 0) return [];
                var others = fetchedPosts.filter(function(p) { return p.name !== currentPost.name; });
                if (others.length === 0) return [];
                var currentCategory = currentPost.metadata.kategori || '';
                var same = others.filter(function(p) { var cat = p.metadata.kategori || ''; return cat ===
                        currentCategory && cat !== ''; });
                var diff = others.filter(function(p) { var cat = p.metadata.kategori || ''; return cat !==
                        currentCategory || cat === ''; });
                var shuffle = function(arr) { return arr.sort(function() { return Math.random() - 0.5; }); };
                var combined = shuffle(same).concat(shuffle(diff));
                return combined.slice(0, limit);
            }

            // ============================================================
            // 17. AD & IP
            // ============================================================
            async function getUserIP() {
                var key = 'user_ip_cache';
                var exp = 60 * 60 * 1000;
                try {
                    var raw = localStorage.getItem(key);
                    if (raw) { var d = JSON.parse(raw); if (Date.now() - d.t < exp) return d.ip; }
                } catch (_) {}
                try {
                    var ctrl = new AbortController();
                    var t = setTimeout(function() { ctrl.abort(); }, 2000);
                    var r = await fetch('https://api.ipify.org?format=json', { signal: ctrl.signal });
                    clearTimeout(t);
                    if (r.ok) { var d2 = await r.json(); var ip = d2.ip || null; if (ip) { localStorage.setItem(key,
                                JSON.stringify({ ip: ip, t: Date.now() })); return ip; } }
                } catch (e) {}
                return null;
            }

            async function startDownloadWithAd(btn, url) {
                var ip = await getUserIP();
                var storageKey = ip ? 'lastAdClickTimestamp_' + ip : 'lastAdClickTimestamp';
                var now = Date.now();
                var last = localStorage.getItem(storageKey);

                if (!last || (now - parseInt(last)) > AD_INTERVAL) {
                    localStorage.setItem(storageKey, now.toString());
                    if (AD_URL) window.open(AD_URL, '_blank');
                    var sec = 5;
                    btn.textContent = '⏳ ' + sec + ' detik';
                    btn.classList.add('counting');
                    var timer = setInterval(function() {
                        sec--;
                        if (sec <= 0) {
                            clearInterval(timer);
                            btn.innerHTML = '<i class="fas fa-download"></i> Download APK';
                            btn.classList.remove('counting');
                            window.open(url, '_blank');
                        } else {
                            btn.textContent = '⏳ ' + sec + ' detik';
                        }
                    }, 1000);
                } else {
                    window.open(url, '_blank');
                }
            }

            function loadAdScript() {
                if (adScriptLoaded) return;
                var script = document.createElement('script');
                script.src = 'https://cabinetavidgrasp.com/c4/11/28/c4112850e63eed959d261d84abff70ee.js';
                script.async = true;
                document.head.appendChild(script);
                adScriptLoaded = true;
            }

            // ============================================================
            // 18. SHOW DETAIL
            // ============================================================
            async function showDetail(name) {
                if (!fetchedPosts.length) {
                    await renderHome();
                    return showDetail(name);
                }
                var post = fetchedPosts.find(function(p) { return p.name === name; });
                if (!post) { navigateTo('home'); return; }

                var title = post.metadata.judul || post.metadata.title || post.name.replace(/[-_]/g, ' ');
                var img = fixImageUrl(post.metadata.gambar || post.metadata.image || '');
                var ver = post.metadata.versi || post.metadata.version || '?';
                var size = post.metadata.ukuran || post.metadata.size || '?';
                var dev = post.metadata.developer || post.metadata.dev || 'Destaseo';
                var dwn = post.metadata.download || post.metadata.link || '';
                var kategori = post.metadata.kategori || '';
                var tags = post.metadata.tag ? post.metadata.tag.split(',').map(function(t) { return t.trim(); }).filter(
                    function(t) { return t; }) : [];
                var dateRaw = post.metadata.tanggal || post.metadata.date || post.lastModified || '';
                var dateFormatted = formatDate(dateRaw);
                var screenshots = post.metadata.screenshot || post.metadata.screenshots || '';
                var galleryHtml = buildScreenshotGallery(screenshots);
                var hasDownload = dwn && dwn !== '#';

                var viewCount = await getPostViewCount(name, true);

                var desc = post.metadata.deskripsi || post.metadata.description || 'Download mod ' + title +
                    ' premium terbaru. Versi ' + ver + ', ukuran ' + size + ', developer ' + dev + '.';
                var detailUrl = 'https://destaseomods.web.id/detail/' + encodeURIComponent(name);
                updateMetaTags(title + ' • Destaseo Mods', desc, img || LOGO_URL, detailUrl);

                var articleJson = {
                    "@context": "https://schema.org",
                    "@type": "Article",
                    "headline": title,
                    "description": desc,
                    "image": img || LOGO_URL,
                    "author": { "@type": "Person", "name": dev },
                    "datePublished": dateRaw || new Date().toISOString(),
                    "mainEntityOfPage": { "@type": "WebPage", "@id": detailUrl }
                };
                var script = document.querySelector('#article-ld-json');
                if (!script) { script = document.createElement('script');
                    script.id = 'article-ld-json';
                    script.type = 'application/ld+json';
                    document.head.appendChild(script); }
                script.textContent = JSON.stringify(articleJson);

                var tagsHtml = tags.length > 0 ?
                    '<div class="tags-container">' + tags.map(function(tag) { return '<span class="tag-badge"><i class="fas fa-tag"></i> ' +
                            tag + '</span>'; }).join('') + '</div>' :
                    '';

                var recs = getRecommendations(post, 4);
                var recHtml = '';
                if (recs.length > 0) {
                    recHtml = '<div class="recommendations-section"><h3><i class="fas fa-lightbulb"></i> Rekomendasi untuk Anda</h3><div class="rec-grid">';
                    recs.forEach(function(rec) {
                        var rTitle = rec.metadata.judul || rec.metadata.title || rec.name.replace(/[-_]/g, ' ');
                        var rImg = fixImageUrl(rec.metadata.gambar || rec.metadata.image || '');
                        recHtml += '<div class="rec-card" data-name="' + rec.name + '">' +
                            (rImg ? '<img src="' + rImg + '" alt="' + rTitle + '" loading="lazy" onerror="this.style.display=\'none\'">' :
                                '<div style="height:90px;background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:2rem;"><i class="fas fa-box"></i></div>') +
                            '<div class="rec-title">' + rTitle + '</div></div>';
                    });
                    recHtml += '</div></div>';
                }

                var downloadBtn = hasDownload ?
                    '<button class="big-download" id="detail-download-btn"><i class="fas fa-download"></i> Download APK</button>' :
                    '<div class="big-download disabled"><i class="fas fa-exclamation-circle"></i> Link Download Tidak Tersedia</div>';

                if (detailContent) {
                    detailContent.innerHTML =
                        '<div class="detail-header">' +
                        (img ? '<img src="' + img + '" class="detail-img" alt="' + title + '" onerror="this.style.display=\'none\'">' :
                            '<div class="detail-img" style="display:flex;align-items:center;justify-content:center;font-size:3rem;"><i class="fas fa-box"></i></div>') +
                        '<h1 class="detail-title">' + title + '</h1>' +
                        '<div class="detail-meta-grid">' +
                        '<div class="meta-item"><i class="fas fa-code-branch"></i> <strong>Versi</strong> ' + ver +
                        '</div>' +
                        '<div class="meta-item"><i class="fas fa-weight-hanging"></i> <strong>Ukuran</strong> ' + size +
                        '</div>' +
                        '<div class="meta-item"><i class="fas fa-user"></i> <strong>Developer</strong> ' + dev +
                        '</div>' +
                        (kategori ? '<div class="meta-item"><i class="fas fa-folder"></i> <strong>Kategori</strong> ' +
                            kategori + '</div>' : '') +
                        (dateFormatted ?
                            '<div class="meta-item"><i class="far fa-calendar-alt"></i> <strong>Tanggal</strong> ' +
                            dateFormatted + '</div>' : '') +
                        '<div class="meta-item"><i class="fas fa-eye"></i> <strong>Dilihat</strong> ' + viewCount +
                        'x</div>' +
                        '</div>' +
                        galleryHtml +
                        tagsHtml +
                        '</div>' +
                        '<div class="content-box">' + (post.html || '<p><i class="far fa-file-alt"></i> Tidak ada deskripsi.</p>') +
                        '</div>' +
                        downloadBtn +
                        recHtml;
                }

                showSection(detailSection);
                window.scrollTo({ top: 0 });

                loadAdScript();

                if (hasDownload) {
                    var dBtn = document.getElementById('detail-download-btn');
                    if (dBtn) {
                        dBtn.addEventListener('click', async function(e) {
                            e.preventDefault();
                            if (this.classList.contains('counting')) return;
                            await startDownloadWithAd(this, dwn);
                        });
                    }
                }

                document.querySelectorAll('.rec-card').forEach(function(card) {
                    card.addEventListener('click', function() {
                        var name = this.dataset.name;
                        if (name) navigateTo('detail', name);
                    });
                });
            }

            // ============================================================
            // 19. RENDER HOME (LOAD ALL)
            // ============================================================
            async function renderHome() {
                console.log('🔄 renderHome started');
                try {
                    if (postContainer) postContainer.innerHTML = '<div class="spinner"></div>';
                    if (loadMoreContainer) loadMoreContainer.innerHTML = '';
                    if (categoryBar) categoryBar.innerHTML = '';
                    if (carouselTrack) carouselTrack.innerHTML = '';
                    stopCarousel();

                    await fetchPostList();
                    if (!postsData.length) {
                        if (postContainer) postContainer.innerHTML =
                            '<div class="empty-text"><i class="far fa-folder-open"></i> Tidak ada postingan.</div>';
                        return;
                    }
                    console.log('📝 Fetching content for', postsData.length, 'posts...');
                    fetchedPosts = await Promise.all(postsData.map(function(p) { return fetchPost(p); }));
                    console.log('✅ Fetched', fetchedPosts.length, 'posts');

                    await sortPopular();
                    renderCategoryBar();
                    resetAndApplyFilters();

                    var route = getRoute();
                    console.log('📍 Initial route:', route);
                    if (route.page === 'detail' && route.postName) {
                        showDetail(route.postName);
                    } else if (route.page === 'search') {
                        showSearch();
                    } else if (route.page === 'profile') {
                        showProfile();
                    } else {
                        showHome();
                    }
                } catch (err) {
                    console.error('❌ Error renderHome:', err);
                    if (postContainer) {
                        postContainer.innerHTML = '<div class="error-text">⚠️ Gagal memuat data. Coba refresh halaman. <br><small>' +
                            err.message + '</small></div>';
                    }
                }
            }

            // ============================================================
            // 20. EVENT LISTENERS
            // ============================================================
            if (telegramBtn) {
                telegramBtn.addEventListener('click', function(e) { e.stopPropagation();
                    telegramDropdown.classList.toggle('show'); });
            }
            document.addEventListener('click', function() { if (telegramDropdown) telegramDropdown.classList.remove(
                'show'); });
            if (telegramDropdown) {
                telegramDropdown.addEventListener('click', function(e) { e.stopPropagation(); });
            }

            if (qrisDanaBtn) {
                qrisDanaBtn.addEventListener('click', function() { qrisOverlay.classList.remove('hidden'); });
            }
            if (qrisCloseBtn) {
                qrisCloseBtn.addEventListener('click', function() { qrisOverlay.classList.add('hidden'); });
            }
            if (qrisOverlay) {
                qrisOverlay.addEventListener('click', function(e) { if (e.target === qrisOverlay) qrisOverlay.classList
                        .add('hidden'); });
            }
            if (qrisDownloadBtn) {
                qrisDownloadBtn.addEventListener('click', async function() {
                    try {
                        var r = await fetch(QRIS_URL);
                        var b = await r.blob();
                        var u = URL.createObjectURL(b);
                        var a = document.createElement('a');
                        a.href = u;
                        a.download = 'qris-destaseo.png';
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(u);
                    } catch (e) { window.open(QRIS_URL, '_blank'); }
                });
            }

            if (searchInput) {
                searchInput.addEventListener('input', function() { resetAndApplyFilters(); });
            }
            if (sortSelect) {
                sortSelect.addEventListener('change', function() { resetAndApplyFilters(); });
            }

            navItems.forEach(function(i) {
                i.addEventListener('click', function() {
                    var page = this.dataset.page;
                    if (page === 'home') navigateTo('home');
                    else if (page === 'search') navigateTo('search');
                    else if (page === 'profile') navigateTo('profile');
                });
            });

            if (detailBack) {
                detailBack.addEventListener('click', function() { navigateTo('home'); });
            }

            window.addEventListener('popstate', function() {
                var route = getRoute();
                renderPage(route.page, route.postName);
            });

            // ============================================================
            // 21. SITEMAP
            // ============================================================
            async function generateSitemap() {
                if (window.location.search !== '?sitemap') return;
                var baseUrl = 'https://destaseomods.web.id';
                var urls = [baseUrl];
                try {
                    var r = await fetch('https://api.github.com/repos/' + GITHUB_REPO + '/contents/posts');
                    if (r.ok) {
                        var files = await r.json();
                        var md = files.filter(function(f) { return f.name.endsWith('.md'); });
                        md.forEach(function(f) { var name = f.name.replace('.md', '');
                            urls.push(baseUrl + '/detail/' + encodeURIComponent(name)); });
                    }
                } catch (e) {}
                var sitemap = '<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n' +
                    urls.map(function(u) { return '  <url><loc>' + u + '</loc><lastmod>' + new Date().toISOString()
                            .split('T')[0] + '</lastmod></url>'; }).join('\n') +
                    '\n</urlset>';
                document.body.innerHTML =
                    '<pre style="color:#fff;background:#111;padding:20px;font-family:monospace;">' + sitemap.replace(/</
                        g, '&lt;').replace(/>/g, '&gt;') + '</pre>';
                throw new Error('SITEMAP_DISPLAY');
            }

            // ============================================================
            // 22. START
            // ============================================================
            (async function init() {
                try { await generateSitemap(); } catch (e) { if (e.message === 'SITEMAP_DISPLAY') return; }
                await renderHome();
            })();

        });
    </script>
