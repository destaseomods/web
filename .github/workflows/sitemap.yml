# Fix sitemap otomatis
name: Generate Sitemap

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate sitemap.xml
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml

          # Homepage
          echo '  <url>' >> sitemap.xml
          echo '    <loc>https://destaseomods.web.id/</loc>' >> sitemap.xml
          echo '    <lastmod>'$(date -u +'%Y-%m-%d')'</lastmod>' >> sitemap.xml
          echo '    <changefreq>daily</changefreq>' >> sitemap.xml
          echo '  </url>' >> sitemap.xml

          # Posts
          for file in posts/*.md; do
            if [ -f "$file" ]; then
              name=$(basename "$file" .md)
              encoded_name=$(echo "$name" | sed 's/ /%20/g')
              echo '  <url>' >> sitemap.xml
              echo '    <loc>https://destaseomods.web.id/?page=detail&post='$encoded_name'</loc>' >> sitemap.xml
              echo '    <lastmod>'$(date -u +'%Y-%m-%d')'</lastmod>' >> sitemap.xml
              echo '    <changefreq>weekly</changefreq>' >> sitemap.xml
              echo '  </url>' >> sitemap.xml
            fi
          done

          echo '</urlset>' >> sitemap.xml

      - name: Commit and push sitemap.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update sitemap.xml [skip ci]"
            git push
          fi
